<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',system-ui,-apple-system,sans-serif}
:root{
  --sidebar-bg:#EEF2F7;--sidebar-active:#2D3748;--main-bg:#F7F9FC;--white:#FFFFFF;
  --teal:#3A9DB5;--teal-dark:#2A7A8E;--teal-light:#B8D4DC;--teal-mist:#EBF5F8;

  --success:#38A169;--warning:#D69E2E;--danger:#E53E3E;
}
body{background:var(--main-bg);min-height:100vh;color:var(--ink)}
a{color:var(--teal);text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

.portal-wrap{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:var(--sidebar-bg);display:flex;flex-direction:column;padding:20px 0;border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;overflow-y:auto}
.main-area{margin-left:220px;flex:1;min-height:100vh;background:var(--main-bg)}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05);gap:16px}
.content{padding:28px}

.sidebar-logo{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar-logo img{height:32px;width:auto}
.sidebar-logo-text{font-size:13px;font-weight:800;color:var(--ink);letter-spacing:.04em;text-transform:uppercase;margin-top:6px}
.sidebar-logo-sub{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.nav-section{padding:0 12px;margin-bottom:8px}
.nav-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--white);color:var(--ink);box-shadow:var(--shadow)}
.nav-item.active{background:var(--sidebar-active);color:#fff;font-weight:700;box-shadow:0 4px 12px rgba(45,55,72,.25)}
.nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sidebar-bottom{margin-top:auto;padding:12px;border-top:1px solid var(--border)}

/* Property Selector */
.property-selector{display:flex;align-items:center;gap:8px;background:var(--main-bg);border:1.5px solid var(--border);border-radius:10px;padding:6px 12px;cursor:pointer;transition:all .2s;min-width:0;flex:1;max-width:340px}
.property-selector:hover{border-color:var(--teal);box-shadow:0 0 0 3px rgba(58,157,181,.08)}
.property-selector select{border:none;outline:none;background:transparent;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;width:100%;min-width:0}

.card{background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.card-pad{padding:20px 22px}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:18px 20px;box-shadow:var(--shadow);transition:all .2s}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover)}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px}
.stat-val{font-size:26px;font-weight:800;color:var(--ink);line-height:1}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.stat-arrow{display:flex;align-items:center;gap:4px;margin-top:10px;font-size:12px;font-weight:600;color:var(--teal);cursor:pointer}

.badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700}
.badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.btn{border:none;border-radius:10px;padding:10px 20px;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--sidebar-active);color:#fff;box-shadow:0 3px 10px rgba(45,55,72,.25)}
.btn-primary:hover{background:#1a2535;transform:translateY(-1px)}
.btn-teal{background:var(--teal);color:#fff;box-shadow:0 3px 10px rgba(58,157,181,.3)}
.btn-teal:hover{background:var(--teal-dark);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--teal);border:1.5px solid var(--teal)}
.btn-ghost:hover{background:var(--teal-mist)}
.btn-danger{background:#FFF5F5;color:var(--danger);border:1px solid #FED7D7}
.btn-danger:hover{background:#FED7D7}
.btn-sm{padding:6px 14px;font-size:12px}

.finput{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;outline:none;background:var(--white);color:var(--ink);transition:border-color .2s;box-sizing:border-box}
.finput:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(58,157,181,.1)}
.finput::placeholder{color:#A0AEC0}
.input-group{margin-bottom:16px}
.input-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block}

.task-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;background:var(--white);transition:all .2s}
.task-item:hover{border-color:var(--teal-light);transform:translateX(3px)}
.task-check{width:22px;height:22px;border-radius:7px;border:2px solid var(--teal-light);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.task-check:hover{border-color:var(--teal)}
.task-check.done{background:var(--teal);border-color:var(--teal)}

.milestone-step{display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:12px;margin-bottom:4px;transition:all .2s}
.milestone-step:hover{background:var(--teal-mist);transform:translateX(4px)}
.ms-circle{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px}

.date-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:10px;margin-bottom:8px;border:1px solid transparent;transition:all .2s}
.date-item:hover{transform:translateX(3px)}
.date-upcoming{background:#EBF8FF;border-color:#BEE3F8}
.date-overdue{background:#FFF5F5;border-color:#FED7D7}
.date-complete{background:#F0FFF4;border-color:#C6F6D5}

.msg-bubble{border-radius:14px;padding:10px 14px;max-width:75%;font-size:14px;line-height:1.6}
.msg-in{background:var(--teal-mist);color:var(--ink);border-bottom-left-radius:4px}
.msg-out{background:var(--sidebar-active);color:#fff;border-bottom-right-radius:4px}

.contact-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .2s;margin-bottom:10px}
.contact-card:hover{border-color:var(--teal-light);box-shadow:var(--shadow-hover);transform:translateY(-2px)}

.prog-bar{background:var(--border);border-radius:50px;height:8px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal-light),var(--teal));border-radius:50px;transition:width .8s cubic-bezier(.4,0,.2,1)}

.avatar{border-radius:50%;background:linear-gradient(135deg,var(--teal-light),var(--teal));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex-shrink:0;overflow:hidden;transition:transform .2s}
.avatar:hover{transform:scale(1.08)}
.avatar img{width:100%;height:100%;object-fit:cover}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;animation:fadeIn .2s ease}
.modal-box{background:var(--white);border-radius:20px;border:1px solid var(--border);box-shadow:0 24px 64px rgba(0,0,0,.15);max-width:520px;width:100%;padding:36px;animation:slideUp .3s cubic-bezier(.34,1.56,.64,1)}

.tour-highlight{position:fixed;border-radius:12px;box-shadow:0 0 0 4px var(--teal),0 0 0 9999px rgba(0,0,0,.5);transition:all .4s;z-index:2001;pointer-events:none}
.tour-tooltip{position:fixed;background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,.15);padding:20px 24px;max-width:300px;z-index:2002;animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}

.auth-left{flex:0 0 44%;background:linear-gradient(135deg,#1C2B32 0%,#2D4A5A 50%,#3A9DB5 100%);display:flex;flex-direction:column;justify-content:space-between;padding:48px 52px;position:relative;overflow:hidden}
.auth-right{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 32px;background:var(--main-bg)}
.auth-tab{flex:1;padding:10px 0;font-weight:700;font-size:12px;border:none;letter-spacing:.05em;text-transform:uppercase;transition:all .2s;cursor:pointer}

.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}

/* Admin */
.admin-wrap{display:flex;min-height:100vh;background:var(--main-bg)}
.admin-sidebar{width:240px;flex-shrink:0;background:linear-gradient(180deg,#1C2B32 0%,#2D4A5A 100%);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(28,43,50,.2)}
.admin-main{margin-left:240px;flex:1;min-height:100vh;background:var(--main-bg);padding:28px}
.admin-topbar{height:64px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-left:240px}
.admin-nav-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em;padding:4px 8px 8px;display:block}
.admin-nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;transition:all .2s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.admin-nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.admin-nav-item.active{background:rgba(58,157,181,.2);color:#fff;font-weight:700;border-left:3px solid var(--teal);padding-left:9px}
.admin-card{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
.admin-stat{background:var(--white);border-radius:14px;padding:18px 20px;border:1px solid var(--border);transition:all .2s;box-shadow:var(--shadow)}
.admin-stat:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover)}
.admin-row{display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:12px;margin-bottom:8px;background:var(--main-bg);border:1px solid var(--border);transition:all .2s;cursor:pointer}
.admin-row:hover{background:var(--teal-mist);border-color:var(--teal-light);transform:translateX(4px)}
.dark-input{padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;outline:none;background:var(--white);color:var(--ink);width:100%;box-sizing:border-box;font-family:inherit;transition:border-color .2s}
.dark-input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(58,157,181,.1)}
.dark-input::placeholder{color:#A0AEC0}
.admin-tab-bar{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
.admin-tab{background:var(--main-bg);border:1.5px solid var(--border);border-radius:20px;color:var(--muted);font-weight:600;font-size:12px;padding:7px 16px;cursor:pointer;white-space:nowrap;transition:all .2s}
.admin-tab:hover{border-color:var(--teal);color:var(--teal)}
.admin-tab.active{background:var(--sidebar-active);border-color:var(--sidebar-active);color:#fff;font-weight:700}
.admin-label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:block}

.welcome-banner{background:linear-gradient(135deg,#1C2B32 0%,#2D4A5A 60%,#3A9DB5 100%);border-radius:20px;padding:24px 28px;color:#fff;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}

/* Key dates timeline */
.kd-timeline{display:flex;align-items:center;gap:0;margin:20px 0;overflow-x:auto;padding-bottom:8px}
.kd-node{display:flex;flex-direction:column;align-items:center;flex:1;min-width:80px}
.kd-dot{width:14px;height:14px;border-radius:50%;border:3px solid var(--border);background:var(--white);z-index:1;transition:all .2s;flex-shrink:0}
.kd-dot.done{background:var(--teal);border-color:var(--teal)}
.kd-dot.current{background:var(--sidebar-active);border-color:var(--sidebar-active);box-shadow:0 0 0 4px rgba(45,55,72,.15)}
.kd-line{flex:1;height:3px;background:var(--border);margin-top:-8px}
.kd-line.done{background:var(--teal)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes popIn{0%{transform:scale(.8);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.pulse{animation:pulse 2s ease-in-out infinite}
.fade-in{animation:fadeIn .3s ease}

#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1C2B32,#3A9DB5);color:#fff;flex-direction:column;gap:12px;font-size:15px;font-weight:600;letter-spacing:.05em}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}
</style>

const sb=supabase.createClient(SB_URL,SB_KEY);
const EJS_SERVICE="service_ncxuh88",EJS_TEMPLATE="template_gfuunlk",EJS_KEY="1lwiIwaud7k3acOaW";
emailjs.init(EJS_KEY);

async function notifyAdmins(clientName,notificationType,details){
  try{
    const{data:admins}=await sb.from("admins").select("email,name");
    if(!admins||!admins.length)return;
    await emailjs.send(EJS_SERVICE,EJS_TEMPLATE,{
      admin_emails:admins.map(a=>a.email).join(","),client_name:clientName,
      notification_type:notificationType,details,
      timestamp:new Date().toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit",hour12:true}),
    });
  }catch(e){console.error("Email failed:",e);}
}

// ── NOTIFY CLIENT BY EMAIL ────────────────────────────────────────────────────
async function notifyClient(clientEmail,clientName,notificationType,details,propertyAddress){
  try{
    await emailjs.send(EJS_SERVICE,"template_ajgunbg",{
      to_email:clientEmail,to_name:clientName,
      notification_type:notificationType,details,
      property_address:propertyAddress||"Your property",
      portal_link:"https://portal.closeflowtc.com",
      timestamp:new Date().toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit",hour12:true}),
    });
  }catch(e){console.error("Client email failed:",e);}
}

// ── CREATE IN-PORTAL NOTIFICATION ─────────────────────────────────────────────
async function createNotification(clientId,fileId,message,type="info"){
  try{
    await sb.from("notifications").insert({client_id:clientId,file_id:fileId,message,type,is_read:false});
  }catch(e){console.error("Notification insert failed:",e);}
}

// ── CHECK UPCOMING REMINDERS (1 DAY BEFORE) ───────────────────────────────────
async function checkUpcomingReminders(){
  try{
    const tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
    const tomorrowStr=tomorrow.toISOString().slice(0,10);
    const{data:upcoming}=await sb.from("key_dates")
      .select("*, files(address,client_id), clients(name,email)")
      .eq("date",tomorrowStr)
      .is("reminder_sent_date",null);
    if(!upcoming||!upcoming.length)return;
    for(const d of upcoming){
      const clientName=d.clients?.name||"Client";
      const clientEmail=d.clients?.email||"";
      const propertyAddress=d.files?.address||"Your property";
      const message=`Reminder: "${d.label}" is tomorrow — ${fmtDate(d.date)} — ${propertyAddress}`;
      // In-portal notification
      await createNotification(d.client_id,d.file_id,message,"reminder");
      // Email client
      if(clientEmail)await notifyClient(clientEmail,clientName,"📅 Date Reminder — Tomorrow",`"${d.label}" is tomorrow, ${fmtDate(d.date)}. Please make sure everything is in order.`,propertyAddress);
      // Email admins
      await notifyAdmins(clientName,"📅 Date Reminder — Tomorrow",`"${d.label}" is tomorrow (${fmtDate(d.date)}) for ${clientName} — ${propertyAddress}`);
      // Mark sent
      await sb.from("key_dates").update({reminder_sent_date:new Date().toISOString().slice(0,10)}).eq("id",d.id);
    }
  }catch(e){console.error("Reminder check failed:",e);}
}

};
const TOUR_STEPS=[
  {tab:"overview",title:"Your Overview",desc:"File status, progress and what's happening next — all at a glance."},
  {tab:"dates",title:"Key Dates",desc:"All your deadlines, color coded by urgency. Sync to your calendar anytime."},
  {tab:"tasks",title:"My Tasks",desc:"Things your coordinator needs you to complete. Check them off as you go."},
  {tab:"contacts",title:"Key Contacts",desc:"Everyone involved in your closing — title, lender, and more."},
  {tab:"milestones",title:"Milestones",desc:"Track every step from contract to close."},
  {tab:"documents",title:"Documents",desc:"All your files organized by category."},
  {tab:"messages",title:"Messages",desc:"Chat directly with your coordinator anytime."},
  {tab:"account",title:"My Account",desc:"Update your profile, photo, and password."},
];
let SESSION=null,TOUR_ACTIVE=false,TOUR_STEP=0,TOUR_CLIENT_ID=null,ACTIVE_FILE_ID=null;
const app=document.getElementById("app");
const loading=document.getElementById("loading");
function show(html){app.innerHTML=html;app.style.display="block";loading.style.display="none";}
function qs(s){return document.querySelector(s);}
function qsa(s){return document.querySelectorAll(s);}
function on(s,e,f){const el=qs(s);if(el)el.addEventListener(e,f);}
function initials(n){return(n||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();}
function daysUntil(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000);}
function fmtDate(d){if(!d)return"TBD";return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function avatarEl(name,photo,size=38){const fs=Math.round(size*.36);if(photo)return`<div class="avatar" style="width:${size}px;height:${size}px"><img src="${photo}" alt="${name}"/></div>`;return`<div class="avatar" style="width:${size}px;height:${size}px;font-size:${fs}px">${initials(name)}</div>`;}
function badgeEl(status){const c=STATUS[status]||{bg:"#EDF2F7",text:"#4A5568",dot:"#A0AEC0"};return`<span class="badge" style="background:${c.bg};color:${c.text}"><span class="badge-dot" style="background:${c.dot}"></span>${status}</span>`;}
function roleBadge(role){const isSA=role==="superadmin";return`<span class="chip" style="background:${isSA?"#FEFCBF":"#EBF8FF"};color:${isSA?"#744210":"#2B6CB0"}">${isSA?"⭐ Super Admin":"👤 Admin"}</span>`;}

// ── GOOGLE CALENDAR LINK ──────────────────────────────────────────────────────
function googleCalLink(label,date,address){
  if(!date)return"#";
  const dt=date.replace(/-/g,"");
  const title=encodeURIComponent(`${label} — ${address||"CloseFlow TC"}`);
  const details=encodeURIComponent("Key closing date via CloseFlow TC portal | closeflowtc.com");
  return`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dt}/${dt}&details=${details}`;
}

        <div class="input-group"><label class="input-label">Mailing Address</label><input class="finput" id="ob-address" placeholder="123 Main St, City, State, ZIP"/></div>
      </div>

      <!-- Step 2: Time Zone + Comms -->
      <div id="ob-step-2" class="ob-step" style="display:none">
        <p style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Step 2 of 4</p>
        <h3 style="font-size:18px;font-weight:800;color:var(--ink);margin-bottom:4px">Your preferences</h3>
        <p style="font-size:13px;color:var(--muted);margin-bottom:20px">So we reach you the right way at the right time.</p>
        <div class="input-group">
          <label class="input-label">Time Zone <span style="color:var(--danger)">*</span></label>
          <select class="finput" id="ob-timezone">
            <option value="">Select your time zone…</option>
            <option>Eastern (ET)</option><option>Central (CT)</option>
            <option>Mountain (MT)</option><option>Pacific (PT)</option>
            <option>Alaska (AKT)</option><option>Hawaii (HT)</option>

        <div class="input-group">
          <label class="input-label">Preferred Communication <span style="color:var(--danger)">*</span> <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">(select all that apply)</span></label>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            ${["Email","Phone","Text"].map(opt=>`
            <label id="comm-label-${opt.toLowerCase()}" style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;font-size:13px;font-weight:600;color:var(--ink);transition:all .2s;background:var(--white);user-select:none">
              <input type="checkbox" name="ob-comm" value="${opt}" id="ob-comm-${opt.toLowerCase()}" style="accent-color:var(--teal);width:16px;height:16px;cursor:pointer"/>
              ${opt}
            </label>`).join("")}
          </div>
        </div>
      </div>

      <!-- Step 3: Markets -->
      <div id="ob-step-3" class="ob-step" style="display:none">
        <p style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Step 3 of 4</p>
        <h3 style="font-size:18px;font-weight:800;color:var(--ink);margin-bottom:4px">Your markets</h3>
        <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Select all states where you are actively investing.</p>
        <!-- Search filter -->
        <div style="position:relative;margin-bottom:10px">
          <input id="ob-state-search" class="finput" placeholder="🔍  Search states…" style="padding-left:14px"/>
        </div>
        <!-- Selected tags -->
        <div id="ob-selected-states" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:0"></div>
        <!-- State checkboxes -->
        <div id="ob-state-list" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;max-height:220px;overflow-y:auto;padding:4px;border:1.5px solid var(--border);border-radius:10px;background:var(--white)">
          ${US_STATES.map(s=>`
          <label style="display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:var(--ink);transition:background .15s" onmouseover="this.style.background='var(--teal-mist)'" onmouseout="this.style.background='transparent'">
            <input type="checkbox" class="ob-state-cb" value="${s}" style="accent-color:var(--teal);width:14px;height:14px;cursor:pointer;flex-shrink:0"/> ${s}
          </label>`).join("")}

        <p id="ob-state-count" style="font-size:11px;color:var(--muted);margin-top:8px">0 states selected</p>
        <p id="ob-state-error" style="display:none;font-size:12px;color:var(--danger);margin-top:6px">Please select at least one state.</p>
      </div>

      <!-- Step 4: Title -->
      <div id="ob-step-4" class="ob-step" style="display:none">
        <p style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Step 4 of 4</p>
        <h3 style="font-size:18px;font-weight:800;color:var(--ink);margin-bottom:4px">Title preferences</h3>
        <p style="font-size:13px;color:var(--muted);margin-bottom:20px">Do you have a preferred title company or attorney we should work with?</p>
        <div class="input-group"><label class="input-label">Preferred Title Company / Attorney</label><input class="finput" id="ob-title" placeholder="Name and state, or leave blank to use ours"/></div>
        <div style="background:#F0FFF4;border:1px solid #C6F6D5;border-radius:10px;padding:12px 14px;font-size:12px;color:#276749;line-height:1.6">✅ If you leave this blank, CloseFlow TC will coordinate with our vetted title partners on your behalf.</div>
      </div>

      <!-- Error message -->
      <div id="ob-error" style="display:none;margin-top:12px;padding:10px 14px;background:#FFF5F5;border:1px solid #FED7D7;border-radius:10px;font-size:12px;color:var(--danger)"></div>
    </div>

    <!-- Footer -->
    <div style="padding:16px 32px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-top:1px solid var(--border);margin-top:8px">
      <button id="ob-back" class="btn btn-ghost btn-sm" style="visibility:hidden">← Back</button>
      <button id="ob-next" class="btn btn-primary" style="min-width:140px;justify-content:center">Next →</button>
    </div>
  </div>`;
  document.body.appendChild(el);

  let currentStep=1;
  const totalSteps=4;

  // State search filter
  setTimeout(()=>{
    const searchInput=document.getElementById("ob-state-search");
    const stateList=document.getElementById("ob-state-list");
    if(searchInput&&stateList){
      searchInput.addEventListener("input",()=>{
        const v=searchInput.value.toLowerCase();
        stateList.querySelectorAll("label").forEach(lbl=>{
          lbl.style.display=lbl.textContent.toLowerCase().includes(v)?"flex":"none";
        });
      });
    }
    // State checkboxes — update tags + count
    document.querySelectorAll(".ob-state-cb").forEach(cb=>{
      cb.addEventListener("change",updateStateTags);
    });
    // Comm checkbox labels — highlight on check
    ["email","phone","text"].forEach(opt=>{
      const cb=document.getElementById(`ob-comm-${opt}`);
      const lbl=document.getElementById(`comm-label-${opt}`);
      if(cb&&lbl){
        cb.addEventListener("change",()=>{
          lbl.style.borderColor=cb.checked?"var(--teal)":"var(--border)";
          lbl.style.background=cb.checked?"var(--teal-mist)":"var(--white)";
        });
      }
    });
  },100);

  function updateStateTags(){
    const selected=[...document.querySelectorAll(".ob-state-cb:checked")].map(c=>c.value);
    const tagsEl=document.getElementById("ob-selected-states");
    const countEl=document.getElementById("ob-state-count");
    if(tagsEl)tagsEl.innerHTML=selected.map(s=>`<span style="background:var(--teal-mist);color:var(--teal-dark);border:1px solid var(--teal-light);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">${s}</span>`).join("");
    if(countEl)countEl.textContent=`${selected.length} state${selected.length===1?"":"s"} selected`;
  }

  function getSelectedStates(){
    return[...document.querySelectorAll(".ob-state-cb:checked")].map(c=>c.value);
  }

  function getSelectedComms(){
    return[...document.querySelectorAll("input[name='ob-comm']:checked")].map(c=>c.value);
  }

  function updateProgress(){
    const pct=((currentStep-1)/totalSteps)*100;
    const bar=document.getElementById("ob-progress");
    if(bar)bar.style.width=pct+"%";
    const back=document.getElementById("ob-back");
    if(back)back.style.visibility=currentStep>1?"visible":"hidden";
    const next=document.getElementById("ob-next");
    if(next)next.textContent=currentStep===totalSteps?"Complete Setup ✓":"Next →";
  }

  function showStep(n){
    for(let i=1;i<=totalSteps;i++){
      const s=document.getElementById(`ob-step-${i}`);
      if(s)s.style.display=i===n?"block":"none";
    }
    currentStep=n;
    updateProgress();
    const err=document.getElementById("ob-error");
    if(err)err.style.display="none";
  }

  function validate(){
    const err=document.getElementById("ob-error");
    const showErr=(msg)=>{if(err){err.style.display="block";err.textContent=msg;}};
    if(currentStep===1){
      const biz=document.getElementById("ob-business")?.value.trim();
      if(!biz){showErr("Please enter your business or entity name.");return false;}
    }
    if(currentStep===2){
      const tz=document.getElementById("ob-timezone")?.value;
      const comms=getSelectedComms();
      if(!tz){showErr("Please select your time zone.");return false;}
      if(!comms.length){showErr("Please select at least one communication preference.");return false;}
    }
    if(currentStep===3){
      const states=getSelectedStates();
      if(!states.length){
        const se=document.getElementById("ob-state-error");
        if(se)se.style.display="block";
        showErr("Please select at least one state.");
        return false;
      }
    }
    return true;
  }

  const nextBtn=document.getElementById("ob-next");
  const backBtn=document.getElementById("ob-back");

  nextBtn.addEventListener("click",async()=>{
    if(!validate())return;
    if(currentStep<totalSteps){showStep(currentStep+1);return;}
    // Collect all data
    const business_name=document.getElementById("ob-business")?.value.trim()||"";
    const address=document.getElementById("ob-address")?.value.trim()||"";
    const time_zone=document.getElementById("ob-timezone")?.value||"";
    const comm_preference=getSelectedComms().join(", ");
    const market_radius=getSelectedStates().join(", ");
    const preferred_title=document.getElementById("ob-title")?.value.trim()||"";
    nextBtn.textContent="Saving…";nextBtn.disabled=true;
    await sb.from("clients").update({
      business_name,address,time_zone,comm_preference,
      market_radius,preferred_title,onboarding_complete:true
    }).eq("id",clientId);
    await notifyAdmins(
      SESSION?.client?.name||"New Client",
      "✅ Onboarding Complete",
      `Business: ${business_name} | Markets: ${market_radius} | Timezone: ${time_zone} | Comm: ${comm_preference} | Title Pref: ${preferred_title||"None"}`
    );
    const bar=document.getElementById("ob-progress");
    if(bar)bar.style.width="100%";
    nextBtn.textContent="✓ All set!";
    nextBtn.style.background="var(--success)";
    setTimeout(()=>{el.remove();onComplete();},700);
  });

  backBtn.addEventListener("click",()=>{if(currentStep>1)showStep(currentStep-1);});
  updateProgress();
}

}

async function doLogin(){
  const email=qs("#f-email")?.value.trim(),pass=qs("#f-pass")?.value;
  const{data:adminData}=await sb.from("admins").select("*").eq("email",email).eq("password",pass).single();
  if(adminData){SESSION={role:"admin",admin:adminData};await checkUpcomingReminders();await renderAdmin();return;}
  const{data,error}=await sb.from("clients").select("*").eq("email",email).eq("password",pass).single();
  if(error||!data){renderLogin("login","Incorrect email or password.");return;}
  SESSION={role:"client",client:data};
  const{data:files}=await sb.from("files").select("*").eq("client_id",data.id).order("created_at");
  ACTIVE_FILE_ID=(files&&files.length)?files[0].id:null;
  await checkUpcomingReminders();
  if(!data.onboarding_complete){showOnboardingModal(data.id,()=>renderClient(data.id,ACTIVE_FILE_ID));return;}
  await renderClient(data.id,ACTIVE_FILE_ID);
}
async function doRegister(){
  const name=qs("#f-name")?.value.trim(),email=qs("#f-email")?.value.trim();
  const phone=qs("#f-phone")?.value.trim()||"",pass=qs("#f-pass")?.value;
  const confirm=qs("#f-confirm")?.value,code=qs("#f-code")?.value.trim().toUpperCase();
  if(!name||!email||!pass){renderLogin("register","Please fill in all required fields.");return;}
  if(pass!==confirm){renderLogin("register","Passwords don't match.");return;}
  if(code!==INVITE){renderLogin("register","Invalid invite code. Contact your coordinator.");return;}
  const{data:exists}=await sb.from("clients").select("id").eq("email",email).single();
  if(exists){renderLogin("register","An account with this email already exists.");return;}
  const{data:client,error}=await sb.from("clients").insert({name,email,password:pass,phone,address:"",photo_url:"",has_seen_welcome:false}).select().single();
  if(error){renderLogin("register","Something went wrong. Please try again.");return;}
  const{data:newFile}=await sb.from("files").insert({client_id:client.id,address:"",status:"Pending",milestone:0,closing_date:"",coordinator:"Danielle McCarter"}).select().single();
  await sb.from("messages").insert({client_id:client.id,from_name:"CloseFlow TC",text:`Welcome, ${name}! Your account is ready. Your coordinator will be in touch shortly.`,date:new Date().toISOString().slice(0,10),is_admin:true});
  SESSION={role:"client",client};
  ACTIVE_FILE_ID=newFile?.id||null;
  showOnboardingModal(client.id,()=>renderClient(client.id,ACTIVE_FILE_ID));
}

      activeFileId?sb.from("key_dates").select("*").eq("file_id",activeFileId).order("date"):{data:[]},
      activeFileId?sb.from("contacts").select("*").eq("file_id",activeFileId):{data:[]},

        {icon:"✅",val:closed,label:"Closed Files",bg:"#FEFCBF",tc:"#D69E2E",trend:"This quarter"},
        {icon:"🧑‍💼",val:(admins||[]).length,label:"Team Members",bg:"#FAF5FF",tc:"#805AD5",trend:"Coordinators"},

  const adminBellBg=adminUnread>0?"var(--teal-mist)":"var(--main-bg)";
  const adminBellBorder=adminUnread>0?"var(--teal)":"var(--border)";
  const adminBellBadge=adminUnread>0?`<div style="position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--danger);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--white)">${adminUnread>9?"9+":adminUnread}</div>`:"";
  const adminBellHtml=`<div style="position:relative;cursor:pointer" id="admin-notif-bell">
    <div style="width:36px;height:36px;border-radius:10px;background:${adminBellBg};border:1.5px solid ${adminBellBorder};display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s" onmouseover="this.style.background='var(--teal-mist)'" onmouseout="this.style.background='${adminBellBg}'">🔔</div>
    ${adminBellBadge}
  </div>`;
  const adminNavItems=[{id:"overview",icon:"📊",label:"Dashboard"},...(isSuperAdmin?[{id:"team",icon:"👥",label:"Team Management"}]:[])];

  show(`<div class="admin-wrap">
    <div class="admin-sidebar">
      <div style="padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)">${logoEl(true)}</div>
      <div style="padding:12px 10px;flex:1;overflow-y:auto">
        <span class="admin-nav-label" style="margin-top:8px">Navigation</span>
        ${adminNavItems.map(n=>`<button data-nav="${n.id}" class="admin-nav-item ${tab===n.id?"active":""}"><span style="font-size:15px">${n.icon}</span>${n.label}</button>`).join("")}
        <div style="height:1px;background:rgba(255,255,255,.07);margin:12px 0"></div>
        <span class="admin-nav-label">Clients (${allClients.length})</span>
        ${allClients.map(c=>{const sc=STATUS[c.status||"Pending"]||{dot:"#aaa"};const isActive=c.id===activeClientId&&tab!=="overview"&&tab!=="team";return`<button class="sidebar-client-btn admin-nav-item ${isActive?"active":""}" data-cid="${c.id}" style="border-left:${isActive?"3px solid var(--teal)":"3px solid transparent"};padding-left:${isActive?"9px":"12px"}"><div style="width:7px;height:7px;border-radius:50%;background:${sc.dot};flex-shrink:0"></div><div style="min-width:0"><p style="font-size:13px;color:${isActive?"#fff":"rgba(255,255,255,.65)"};font-weight:${isActive?700:500};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name}</p><p style="font-size:10px;color:rgba(255,255,255,.3);margin-top:1px">${c.status||"Pending"}</p></div></button>`;}).join("")}
      </div>
      <div style="padding:12px 14px;border-top:1px solid rgba(255,255,255,.07)">
        <div style="background:rgba(58,157,181,.15);border:1px solid rgba(58,157,181,.25);border-radius:10px;padding:12px;text-align:center">
          <p style="font-size:9px;color:rgba(255,255,255,.4);font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px">Invite Code</p>
          <p style="font-size:18px;font-weight:900;color:#fff;letter-spacing:4px">${INVITE}</p>
        </div>
      </div>
    </div>
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="display:flex;align-items:center;gap:8px;background:var(--main-bg);border:1px solid var(--border);border-radius:10px;padding:7px 14px;min-width:220px">
          <span style="color:var(--muted);font-size:14px">🔍</span>
          <input placeholder="Search clients..." style="border:none;outline:none;background:transparent;font-size:13px;color:var(--ink);width:100%" onkeyup="const v=this.value.toLowerCase();document.querySelectorAll('.client-row[data-cid]').forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(v)?'flex':'none'})"/>
        </div>
        <span style="background:#EBF8FF;color:#2B6CB0;font-size:10px;font-weight:800;padding:4px 12px;border-radius:20px;border:1px solid #BEE3F8">${isSuperAdmin?"⭐ SUPER ADMIN":"👤 ADMIN"}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        ${adminBellHtml}
        ${avatarEl(currentAdmin?.name||"Admin","",36)}
        <div><p style="font-weight:700;font-size:13px;color:var(--ink)">${currentAdmin?.name||"Admin"}</p><p style="font-size:10px;color:var(--muted)">${isSuperAdmin?"Super Admin":"Coordinator"}</p></div>
        <button id="admin-signout" style="background:var(--main-bg);color:var(--ink);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer" onmouseover="this.style.background='var(--border)'" onmouseout="this.style.background='var(--main-bg)'">Sign Out</button>
      </div>
    </div>
    <div class="admin-main fade-in">
      ${client&&tab!=="overview"&&tab!=="team"?`
        <div class="admin-card" style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
          ${avatarEl(client.name,client.photo_url||"",52)}
          <div style="flex:1">
            <h2 style="font-weight:900;font-size:20px;color:var(--ink)">${client.name}</h2>
            <p style="font-size:13px;color:var(--muted);margin-top:2px">${client.email}${client.phone?` · ${client.phone}`:""}</p>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            ${badgeEl(f.status)}
            <span style="font-size:12px;color:var(--muted)">${clientFiles.length} ${clientFiles.length===1?"property":"properties"}</span>
          </div>
        </div>
        <div class="admin-tab-bar">${adminTabs.map(t=>`<button data-atab="${t.id}" class="admin-tab ${t.id===tab?"active":""}">${t.label}</button>`).join("")}</div>`:""}
      ${mainContent}
    </div>
  </div>`);

  // Events
  on("#admin-signout","click",()=>{SESSION=null;renderLogin();});
  if(tab==="overview"){
    const ctx=qs("#admin-donut");
    if(ctx)new Chart(ctx,{type:"doughnut",data:{labels:["Active","Pending","On Hold","Closed"],datasets:[{data:[active||1,pending,onHold,closed],backgroundColor:["#3A9DB5","#D69E2E","#E53E3E","#38A169"],borderWidth:0,hoverOffset:4}]},options:{cutout:"72%",plugins:{legend:{display:false}},animation:{animateScale:true}}});
  }
  qsa("[data-nav]").forEach(btn=>btn.addEventListener("click",()=>{if(btn.dataset.nav==="team")renderAdmin(null,null,"team");else renderAdmin(null,null,"overview");}));
  qsa(".sidebar-client-btn[data-cid]").forEach(btn=>btn.addEventListener("click",()=>renderAdmin(btn.dataset.cid,null,"client")));
  qsa(".client-row[data-cid]").forEach(row=>row.addEventListener("click",()=>renderAdmin(row.dataset.cid,null,"client")));
  qsa("[data-atab]").forEach(btn=>btn.addEventListener("click",()=>renderAdmin(activeClientId,activeFileId,btn.dataset.atab)));
  on("#admin-file-select","change",e=>renderAdmin(activeClientId,e.target.value,tab));

  // Add property
  on("#add-property-btn","click",()=>{const f2=qs("#add-prop-form");if(f2)f2.style.display="block";});
  on("#cancel-new-prop","click",()=>{const f2=qs("#add-prop-form");if(f2)f2.style.display="none";});
  on("#save-new-prop","click",async()=>{
    const address=qs("#new-prop-address")?.value.trim();
    const closing_date=qs("#new-prop-closing")?.value||"";
    const coordinator=qs("#new-prop-coord")?.value||"Danielle McCarter";
    const status=qs("#new-prop-status")?.value||"Pending";
    const msg=qs("#new-prop-msg");
    if(!address){if(msg){msg.style.display="block";msg.style.background="#FFF5F5";msg.style.color="var(--danger)";msg.textContent="Please enter a property address.";}return;}
    const{data:newFile}=await sb.from("files").insert({client_id:activeClientId,address,closing_date,status,milestone:0,coordinator}).select().single();
    if(msg){msg.style.display="block";msg.style.background="#F0FFF4";msg.style.color="#276749";msg.textContent="✓ Property added!";}
    setTimeout(()=>renderAdmin(activeClientId,newFile?.id,"client"),800);
  });

  on("#save-file","click",async()=>{
    const address=qs("#f-address")?.value||"";
    const closing_date=qs("#f-closing")?.value||"";
    const status=qs("#f-status")?.value||"Pending";
    const milestone=parseInt(qs("#f-milestone")?.value||0);
    const coordinator=qs("#f-coord")?.value||"Danielle McCarter";
    const prev=file;
    await sb.from("files").update({address,closing_date,status,milestone,coordinator}).eq("id",activeFileId);
    // Notify if closing date or status changed
    if(client&&prev){
      if(closing_date&&closing_date!==prev.closing_date){
        const msg=`Your closing date has been updated to ${fmtDate(closing_date)} — ${address||"your property"}`;
        await createNotification(activeClientId,activeFileId,msg,"update");
        await notifyClient(client.email,client.name,"📅 Closing Date Updated",`Your closing date has been updated to ${fmtDate(closing_date)}.`,address);
        await notifyAdmins(client.name,"📅 Closing Date Updated",`Closing date changed to ${fmtDate(closing_date)} for ${client.name} — ${address||"TBD"}`);
      }
      if(status!==prev.status){
        const msg=`Your file status has been updated to "${status}" — ${address||"your property"}`;
        await createNotification(activeClientId,activeFileId,msg,"update");
        await notifyClient(client.email,client.name,"📋 File Status Updated",`Your file status has been updated to "${status}".`,address);
      }
    }
    const msg=qs("#save-msg");if(msg){msg.style.display="block";setTimeout(()=>msg.style.display="none",2000);}
  });
  on("#reset-pw","click",async()=>{const pw=qs("#new-pw")?.value.trim();const msg=qs("#pw-reset-msg");if(!pw){if(msg){msg.style.display="block";msg.style.color="#FC8181";msg.textContent="Please enter a new password.";}return;}await sb.from("clients").update({password:pw}).eq("id",activeClientId);if(msg){msg.style.display="block";msg.style.color="#68D391";msg.textContent="✓ Password reset!";}if(qs("#new-pw"))qs("#new-pw").value="";});
  on("#add-task","click",async()=>{const text=qs("#task-input")?.value.trim();if(!text)return;await sb.from("tasks").insert({client_id:activeClientId,file_id:activeFileId,text,done:false});await renderAdmin(activeClientId,activeFileId,"tasks");});
  on("#task-input","keydown",async e=>{if(e.key==="Enter"){const text=e.target.value.trim();if(!text)return;await sb.from("tasks").insert({client_id:activeClientId,file_id:activeFileId,text,done:false});await renderAdmin(activeClientId,activeFileId,"tasks");}});
  qsa(".del-task").forEach(btn=>btn.addEventListener("click",async()=>{await sb.from("tasks").delete().eq("id",btn.dataset.tid);await renderAdmin(activeClientId,activeFileId,"tasks");}));
  // Admin notification bell
  on("#admin-notif-bell","click",async()=>{
    const existing=document.getElementById("admin-notif-panel");if(existing){existing.remove();return;}
    const{data:allNotifs}=await sb.from("notifications").select("*, clients(name)").order("created_at",{ascending:false}).limit(40);
    await sb.from("notifications").update({is_read:true}).eq("is_read",false);
    const panel=document.createElement("div");
    panel.id="admin-notif-panel";
    panel.style.cssText="position:fixed;top:72px;right:20px;width:360px;max-height:440px;background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,.15);z-index:500;overflow:hidden;animation:slideUp .2s ease";
    const nl=allNotifs||[];
    panel.innerHTML=`<div style="padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <p style="font-weight:700;font-size:14px;color:var(--ink)">🔔 All Notifications</p>
      <button onclick="document.getElementById('admin-notif-panel').remove()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1">×</button>
    </div>
    <div style="overflow-y:auto;max-height:370px">
      ${nl.length===0?`<div style="padding:32px;text-align:center;color:var(--muted)"><p style="font-size:28px;margin-bottom:8px">🔔</p><p style="font-size:13px">No notifications yet.</p></div>`
      :nl.map(n=>{
        const ic=n.type==="reminder"?"📅":n.type==="update"?"✏️":"ℹ️";
        const dt=new Date(n.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit",hour12:true});
        const clientLabel=n.clients?.name?`<span style="font-size:10px;font-weight:700;background:var(--teal-mist);color:var(--teal-dark);padding:2px 8px;border-radius:20px;margin-left:6px">${n.clients.name}</span>`:"";
        return`<div style="padding:12px 18px;border-bottom:1px solid var(--border);transition:background .2s" onmouseover="this.style.background='var(--main-bg)'" onmouseout="this.style.background='transparent'">
          <div style="display:flex;align-items:flex-start;gap:10px">
            <span style="font-size:16px;flex-shrink:0;margin-top:1px">${ic}</span>
            <div style="flex:1">
              <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:3px">
                <p style="font-size:13px;color:var(--ink);line-height:1.5">${n.message}</p>
                ${clientLabel}
              </div>
              <p style="font-size:10px;color:var(--muted)">${dt}</p>
            </div>
          </div>
        </div>`;}).join("")}
    </div>`;
    document.body.appendChild(panel);
    setTimeout(()=>document.addEventListener("click",function h(e){if(!panel.contains(e.target)&&!document.getElementById("admin-notif-bell")?.contains(e.target)){panel.remove();document.removeEventListener("click",h);}},true),100);
  });

  on("#add-date","click",async()=>{
    const label=qs("#date-label")?.value.trim();
    const date=qs("#date-val")?.value;
    if(!label||!date)return;
    await sb.from("key_dates").insert({client_id:activeClientId,file_id:activeFileId,label,date});
    // Notify both sides immediately
    if(client){
      const msg=`New key date added: "${label}" on ${fmtDate(date)} — ${f.address||"your property"}`;
      await createNotification(activeClientId,activeFileId,msg,"update");
      await notifyClient(client.email,client.name,"📅 New Key Date Added",`A new key date has been added: "${label}" on ${fmtDate(date)}.`,f.address);
      await notifyAdmins(client.name,"📅 Key Date Added",`"${label}" on ${fmtDate(date)} added for ${client.name} — ${f.address||"TBD"}`);
    }
    await renderAdmin(activeClientId,activeFileId,"dates");
  });
  qsa(".del-date").forEach(btn=>btn.addEventListener("click",async()=>{await sb.from("key_dates").delete().eq("id",btn.dataset.did);await renderAdmin(activeClientId,activeFileId,"dates");}));
  on("#add-contact","click",async()=>{const role=qs("#c-role")?.value.trim();const name=qs("#c-name")?.value.trim();const phone=qs("#c-phone")?.value.trim();const email=qs("#c-email")?.value.trim();if(!role||!name)return;await sb.from("contacts").insert({client_id:activeClientId,file_id:activeFileId,role,name,phone,email});await renderAdmin(activeClientId,activeFileId,"contacts");});
  qsa(".del-contact").forEach(btn=>btn.addEventListener("click",async()=>{await sb.from("contacts").delete().eq("id",btn.dataset.coid);await renderAdmin(activeClientId,activeFileId,"contacts");}));
  on("#add-doc","click",async()=>{const name=qs("#doc-name")?.value.trim();const url=qs("#doc-url")?.value.trim();const category=qs("#doc-cat")?.value.trim()||"General";if(!name||!url)return;await sb.from("documents").insert({client_id:activeClientId,file_id:activeFileId,name,url,category,date:new Date().toISOString().slice(0,10)});await renderAdmin(activeClientId,activeFileId,"documents");});
  qsa(".del-doc").forEach(btn=>btn.addEventListener("click",async()=>{await sb.from("documents").delete().eq("id",btn.dataset.docid);await renderAdmin(activeClientId,activeFileId,"documents");}));
  on("#admin-send","click",async()=>{const input=qs("#admin-msg");const text=input?.value.trim();if(!text)return;await sb.from("messages").insert({client_id:activeClientId,from_name:"CloseFlow TC",text,date:new Date().toISOString().slice(0,10),is_admin:true});input.value="";await renderAdmin(activeClientId,activeFileId,"messages");});
  on("#admin-msg","keydown",async e=>{if(e.key!=="Enter")return;const text=e.target.value.trim();if(!text)return;await sb.from("messages").insert({client_id:activeClientId,from_name:"CloseFlow TC",text,date:new Date().toISOString().slice(0,10),is_admin:true});e.target.value="";await renderAdmin(activeClientId,activeFileId,"messages");});
  const aml=qs("#admin-msg-list");if(aml)aml.scrollTop=aml.scrollHeight;
  on("#add-admin","click",async()=>{const name=qs("#new-admin-name")?.value.trim();const email=qs("#new-admin-email")?.value.trim();const pass=qs("#new-admin-pass")?.value;const role=qs("#new-admin-role")?.value||"admin";const msg=qs("#team-msg");if(!name||!email||!pass){if(msg){msg.style.display="block";msg.style.background="#FFF5F5";msg.style.color="var(--danger)";msg.textContent="Please fill in all fields.";}return;}const{data:exists}=await sb.from("admins").select("id").eq("email",email).single();if(exists){if(msg){msg.style.display="block";msg.style.background="#FFF5F5";msg.style.color="var(--danger)";msg.textContent="An admin with this email already exists.";}return;}const{error}=await sb.from("admins").insert({name,email,password:pass,role});if(error){if(msg){msg.style.display="block";msg.style.background="#FFF5F5";msg.style.color="var(--danger)";msg.textContent="Something went wrong.";}return;}await renderAdmin(null,null,"team");});
  qsa(".role-select").forEach(sel=>sel.addEventListener("change",async()=>{await sb.from("admins").update({role:sel.value}).eq("id",sel.dataset.aid);await renderAdmin(null,null,"team");}));
  qsa(".del-admin").forEach(btn=>btn.addEventListener("click",async()=>{if(!confirm("Remove this team member?"))return;await sb.from("admins").delete().eq("id",btn.dataset.aid);await renderAdmin(null,null,"team");}));
}

renderLogin();
</script>
</body>
</html>
