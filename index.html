  function confirmDeleteClient(cid,cname){
    const overlay=document.createElement("div");
    overlay.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px";

      <div style="text-align:center;margin-bottom:20px">
        <div style="width:56px;height:56px;border-radius:50%;background:#FFF5F5;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px">🗑</div>
        <h3 style="font-size:18px;font-weight:800;color:var(--ink);margin-bottom:8px">Delete ${cname||"this client"}?</h3>
        <p style="font-size:13px;color:var(--muted);line-height:1.6">This will permanently delete the client and all their data — files, documents, tasks, messages, and dates. This cannot be undone.</p>
      </div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button id="cancel-delete" class="btn btn-ghost">Cancel</button>
        <button id="confirm-delete" class="btn btn-danger" style="background:var(--danger);color:#fff">Yes, Delete</button>
      </div>
      <p class="delete-error" style="display:none;margin-top:12px;font-size:12px;color:var(--danger);text-align:center;padding:8px;background:#FFF5F5;border-radius:8px"></p>
    </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector("#cancel-delete").addEventListener("click",()=>overlay.remove());
    overlay.querySelector("#confirm-delete").addEventListener("click",async()=>{
      const btn=overlay.querySelector("#confirm-delete");
      btn.textContent="Deleting…";btn.disabled=true;
      try{
        // Get all file IDs for this client first
        const{data:clientFiles}=await sb.from("files").select("id").eq("client_id",cid);
        const fileIds=(clientFiles||[]).map(f=>f.id);
        // Delete all file-level related data
        if(fileIds.length){
          await sb.from("tasks").delete().in("file_id",fileIds);
          await sb.from("key_dates").delete().in("file_id",fileIds);
          await sb.from("contacts").delete().in("file_id",fileIds);
          await sb.from("documents").delete().in("file_id",fileIds);
          await sb.from("activity_log").delete().in("file_id",fileIds);
          await sb.from("internal_notes").delete().in("file_id",fileIds);
          await sb.from("client_requests").delete().in("file_id",fileIds);
          await sb.from("notifications").delete().in("file_id",fileIds);
        }
        // Delete all client-level related data
        await sb.from("files").delete().eq("client_id",cid);
        await sb.from("messages").delete().eq("client_id",cid);
        await sb.from("notifications").delete().eq("client_id",cid);
        await sb.from("feedback").delete().eq("client_id",cid);
        // Finally delete the client record
        const{error}=await sb.from("clients").delete().eq("id",cid);
        if(error)throw error;
        overlay.remove();
        await renderAdmin(null,null,"overview");
      }catch(err){
        console.error("Delete failed:",err);
        btn.textContent="Yes, Delete";btn.disabled=false;
        const errEl=overlay.querySelector(".delete-error");
        if(errEl){errEl.textContent=`Delete failed: ${err.message}. Check Supabase RLS policies.`;errEl.style.display="block";}
      }
    });
  }

      await sb.from("activity_log").insert({file_id:activeFileId,admin_name:currentAdmin?.name||"Admin",action:"added a task",details:text.slice(0,80)});
    }
    await renderAdmin(activeClientId,activeFileId,"tasks");
  });
  on("#task-input","keydown",async e=>{if(e.key==="Enter"){const text=e.target.value.trim();if(!text)return;await sb.from("tasks").insert({client_id:activeClientId,file_id:activeFileId,text,done:false,status:"pending",doc_url:"",doc_name:""});await renderAdmin(activeClientId,activeFileId,"tasks");}});
  qsa(".del-task").forEach(btn=>btn.addEventListener("click",async()=>{await sb.from("tasks").delete().eq("id",btn.dataset.tid);await renderAdmin(activeClientId,activeFileId,"tasks");}));

  // Approve task (mark complete + notify client)
  qsa(".approve-task-btn").forEach(btn=>{
    btn.addEventListener("click",async()=>{
      const tid=btn.dataset.tid;
      btn.disabled=true;btn.textContent="Approving…";
      await sb.from("tasks").update({status:"complete",done:true}).eq("id",tid);
      if(client){
        const taskText=tasks?.find(t=>t.id===tid)?.text||"";
        await createNotification(activeClientId,activeFileId,`Your document for "${taskText}" has been approved. Task marked complete.`,"update");
        await notifyClient(client.email,client.name,"✅ Task Approved",`Your document has been reviewed and approved by your CloseFlow TC coordinator. Task "${taskText}" is now complete.`,f.address);
        await sb.from("activity_log").insert({file_id:activeFileId,admin_name:currentAdmin?.name||"Admin",action:"approved a task",details:taskText.slice(0,80)});
      }
      await renderAdmin(activeClientId,activeFileId,"tasks");
    });
  });

  // Reject task (send back to client)
  qsa(".reject-task-btn").forEach(btn=>{
    btn.addEventListener("click",async()=>{
      const tid=btn.dataset.tid;
      btn.disabled=true;btn.textContent="Sending back…";
      await sb.from("tasks").update({status:"pending",doc_url:"",doc_name:"",done:false}).eq("id",tid);
      if(client){
        const taskText=tasks?.find(t=>t.id===tid)?.text||"";
        await createNotification(activeClientId,activeFileId,`Your coordinator needs a different document for "${taskText}". Please check your tasks and re-upload.`,"reminder");
        await notifyClient(client.email,client.name,"📎 Document Needs Revision",`Your coordinator reviewed your document for "${taskText}" and needs you to re-upload. Please log in to your portal to submit a new document.`,f.address);
      }
      await renderAdmin(activeClientId,activeFileId,"tasks");
    });
  });
  // Admin notification bell
  on("#admin-notif-bell","click",async()=>{
    const existing=document.getElementById("admin-notif-panel");if(existing){existing.remove();return;}
    const{data:freshNotifs}=await sb.from("notifications").select("*, clients(name)").order("created_at",{ascending:false}).limit(40);
    const nl=freshNotifs||[];
    const panel=document.createElement("div");
    panel.id="admin-notif-panel";
    panel.style.cssText="position:fixed;top:72px;right:20px;width:380px;max-height:480px;background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,.15);z-index:500;overflow:hidden;animation:slideDown .25s cubic-bezier(.4,0,.2,1)";
    function buildPanel(){
      const unread=nl.filter(n=>!n.is_read);
      return`<div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--white);position:sticky;top:0;z-index:1">
        <div style="display:flex;align-items:center;gap:8px">
          <p style="font-weight:700;font-size:14px;color:var(--ink)">🔔 All Notifications</p>
          ${unread.length>0?`<span style="background:var(--danger);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px">${unread.length}</span>`:""}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${unread.length>0?`<button id="admin-mark-all-read" style="font-size:11px;font-weight:700;color:var(--teal);background:var(--teal-mist);border:none;border-radius:6px;padding:4px 10px;cursor:pointer">Mark all read</button>`:""}
          <button onclick="document.getElementById('admin-notif-panel').remove()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1">×</button>
        </div>
      </div>
      <div style="overflow-y:auto;max-height:400px">
        ${nl.length===0?`<div style="padding:32px;text-align:center;color:var(--muted)"><p style="font-size:28px;margin-bottom:8px">🔔</p><p style="font-size:13px">No notifications yet.</p></div>`
        :nl.map(n=>{
          const ic=n.type==="reminder"?"📅":n.type==="update"?"✏️":n.type==="issue"?"🐞":"ℹ️";
          const bg=n.is_read?"var(--white)":"var(--teal-mist)";
          const dt=new Date(n.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit",hour12:true});
          const clientLabel=n.clients?.name?`<span style="font-size:10px;font-weight:700;background:var(--teal-mist);color:var(--teal-dark);padding:2px 8px;border-radius:20px">${n.clients.name}</span>`:"";
          // Smart routing for admins
          const msg=(n.message||"").toLowerCase();
          const adminDest=n.type==="issue"?"issues":msg.includes("message")?"messages-all":msg.includes("document")||msg.includes("upload")?"client":msg.includes("feedback")||msg.includes("rating")?"feedback":msg.includes("request")?"requests":msg.includes("task")&&n.client_id?"client":(n.type==="reminder"||msg.includes("key date")||msg.includes("closing date"))?"calendar":"client";
          return`<div class="admin-notif-row" data-nid="${n.id}" data-read="${n.is_read}" data-dest="${adminDest}" data-cid="${n.client_id||""}" data-fid="${n.file_id||""}" style="padding:12px 18px;border-bottom:1px solid var(--border);background:${bg};transition:all .2s;cursor:pointer" onmouseover="this.style.background='var(--main-bg)'" onmouseout="this.style.background='${bg}'">
            <div style="display:flex;align-items:flex-start;gap:10px">
              <span style="font-size:16px;flex-shrink:0;margin-top:2px">${ic}</span>
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:4px">
                  <p style="font-size:13px;color:var(--ink);line-height:1.5">${n.message}</p>
                  ${clientLabel}
                </div>
                <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px">
                  <p style="font-size:10px;color:var(--muted)">${dt}</p>
                  <div style="display:flex;align-items:center;gap:6px">
                    ${!n.is_read?`<span style="font-size:9px;font-weight:700;background:var(--teal);color:#fff;padding:2px 7px;border-radius:20px">NEW</span>`:""}
                    <button class="admin-notif-toggle" data-nid="${n.id}" data-read="${n.is_read}" style="font-size:10px;font-weight:700;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:2px 8px;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='var(--teal)';this.style.color='var(--teal)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">${n.is_read?"Mark unread":"Mark read"}</button>
                  </div>
                </div>
              </div>
            </div>
          </div>`;}).join("")}
      </div>`;
    }
    panel.innerHTML=buildPanel();
    document.body.appendChild(panel);
    function wireToggles(){
      // Row click — navigate
      panel.querySelectorAll(".admin-notif-row").forEach(row=>{
        row.onclick=async(e)=>{
          if(e.target.classList.contains("admin-notif-toggle"))return;
          const nid=row.dataset.nid;
          const dest=row.dataset.dest||"overview";
          const cid=row.dataset.cid||null;
          const fid=row.dataset.fid||null;
          await sb.from("notifications").update({is_read:true}).eq("id",nid);
          panel.remove();
          // Global tabs go straight there; client tabs need cid
          const globalTabs=["overview","clients","deals","tasks-all","requests","calendar","contacts-all","messages-all","reports","issues","team","feedback","invite-codes","settings"];
          if(globalTabs.includes(dest)){
            renderAdmin(null,null,dest);
          }else if(cid){
            renderAdmin(cid,fid||null,"client");
          }else{
            renderAdmin(null,null,"overview");
          }
        };
      });
      // Mark read/unread toggle
      panel.querySelectorAll(".admin-notif-toggle").forEach(btn=>{
        btn.onclick=async(e)=>{
          e.stopPropagation();
          const nid=btn.dataset.nid;
          const isRead=btn.dataset.read==="true";
          await sb.from("notifications").update({is_read:!isRead}).eq("id",nid);
          const n=nl.find(x=>x.id===nid);if(n)n.is_read=!isRead;
          panel.innerHTML=buildPanel();
          wireMarkAll();
          wireToggles();
        };
      });
    }
    function wireMarkAll(){
      const markAllBtn=panel.querySelector("#admin-mark-all-read");
      if(markAllBtn){
        markAllBtn.onclick=async(e)=>{
          e.stopPropagation();
          await sb.from("notifications").update({is_read:true}).eq("is_read",false);
          nl.forEach(n=>n.is_read=true);
          panel.innerHTML=buildPanel();
          wireMarkAll();
          wireToggles();
        };
      }
    }
    wireToggles();
    wireMarkAll();
    setTimeout(()=>document.addEventListener("click",function h(e){if(!panel.contains(e.target)&&!document.getElementById("admin-notif-bell")?.contains(e.target)){panel.remove();document.removeEventListener("click",h);}},true),100);
  });

  on("#add-date","click",async()=>{
    const label=qs("#date-label")?.value.trim();
    const date=qs("#date-val")?.value;
    if(!label||!date)return;
    btnLoad("add-date",true,"Adding…");
    await sb.from("key_dates").insert({client_id:activeClientId,file_id:activeFileId,label,date});
    if(client){
      const msg2=`New key date added: "${label}" on ${fmtDate(date)} — ${f.address||"your property"}`;
      await createNotification(activeClientId,activeFileId,msg2,"update");
      await notifyClient(client.email,client.name,"📅 New Key Date Added",`A new key date has been added: "${label}" on ${fmtDate(date)}.`,f.address);
      await notifyAdmins(client.name,"📅 Key Date Added",`"${label}" on ${fmtDate(date)} added for ${client.name} — ${f.address||"TBD"}`);
    }
    await renderAdmin(activeClientId,activeFileId,"dates");
  });
  qsa(".del-date").forEach(btn=>btn.addEventListener("click",async()=>{await sb.from("key_dates").delete().eq("id",btn.dataset.did);await renderAdmin(activeClientId,activeFileId,"dates");}));
  on("#add-contact","click",async()=>{
    const role=qs("#c-role")?.value.trim();const name=qs("#c-name")?.value.trim();
    const phone=qs("#c-phone")?.value.trim();const email=qs("#c-email")?.value.trim();
    const contact_type=qs("#c-type")?.value||"other";
    if(!role||!name)return;
    if(window.EDITING_CONTACT){
      btnLoad("add-contact",true,"Saving…");
      await sb.from("contacts").update({role,name,phone,email,contact_type}).eq("id",window.EDITING_CONTACT);
      window.EDITING_CONTACT=null;
    }else{
      btnLoad("add-contact",true,"Adding…");
      await sb.from("contacts").insert({client_id:activeClientId,file_id:activeFileId,role,name,phone,email,contact_type});
    }
    await renderAdmin(activeClientId,activeFileId,"contacts");
  });
  qsa(".edit-contact").forEach(btn=>btn.addEventListener("click",()=>{
    window.EDITING_CONTACT=btn.dataset.coid;
    const set=(id,v)=>{const el=qs(id);if(el)el.value=v||"";};
    set("#c-name",btn.dataset.cname);set("#c-role",btn.dataset.crole);
    set("#c-phone",btn.dataset.cphone);set("#c-email",btn.dataset.cemail);
    set("#c-type",btn.dataset.ctype);
    const addBtn=qs("#add-contact");if(addBtn)addBtn.textContent="Save Changes";
    qs("#c-name")?.scrollIntoView({behavior:"smooth",block:"center"});
    qs("#c-name")?.focus();
  }));
  qsa(".del-contact").forEach(btn=>btn.addEventListener("click",async()=>{await sb.from("contacts").delete().eq("id",btn.dataset.coid);await renderAdmin(activeClientId,activeFileId,"contacts");}));
  on("#add-doc","click",async()=>{
    const name=qs("#doc-name")?.value.trim();const url=qs("#doc-url")?.value.trim();
    const category=qs("#doc-cat")?.value.trim()||"General";
    if(!name||!url)return;
    btnLoad("add-doc",true,"Adding…");
    await sb.from("documents").insert({client_id:activeClientId,file_id:activeFileId,name,url,category,date:new Date().toISOString().slice(0,10)});
    await renderAdmin(activeClientId,activeFileId,"documents");
  });
  qsa(".del-doc").forEach(btn=>btn.addEventListener("click",async()=>{await sb.from("documents").delete().eq("id",btn.dataset.docid);await renderAdmin(activeClientId,activeFileId,"documents");}));
  on("#admin-send","click",async()=>{
    const input=qs("#admin-msg");const text=input?.value.trim();if(!text)return;
    btnLoad("admin-send",true,"Sending…");
    await sb.from("messages").insert({client_id:activeClientId,from_name:"CloseFlow TC",text,date:new Date().toISOString().slice(0,10),is_admin:true});
    if(activeFileId)await sb.from("activity_log").insert({file_id:activeFileId,admin_name:currentAdmin?.name||"Admin",action:"sent a message",details:text.slice(0,80)});
    input.value="";await renderAdmin(activeClientId,activeFileId,"messages");
  });
  on("#admin-msg","keydown",async e=>{if(e.key!=="Enter")return;const text=e.target.value.trim();if(!text)return;await sb.from("messages").insert({client_id:activeClientId,from_name:"CloseFlow TC",text,date:new Date().toISOString().slice(0,10),is_admin:true});e.target.value="";await renderAdmin(activeClientId,activeFileId,"messages");});
  const aml=qs("#admin-msg-list");if(aml)aml.scrollTop=aml.scrollHeight;
  on("#add-admin","click",async()=>{
    const name=qs("#new-admin-name")?.value.trim();const email=qs("#new-admin-email")?.value.trim();
    const pass=qs("#new-admin-pass")?.value;const role=qs("#new-admin-role")?.value||"admin";
    const msg=qs("#team-msg");
    if(!name||!email||!pass){if(msg){msg.style.display="block";msg.style.background="#FFF5F5";msg.style.color="var(--danger)";msg.textContent="Please fill in all fields.";}return;}
    const{data:exists}=await sb.from("admins").select("id").eq("email",email).single();
    if(exists){if(msg){msg.style.display="block";msg.style.background="#FFF5F5";msg.style.color="var(--danger)";msg.textContent="An admin with this email already exists.";}return;}
    btnLoad("add-admin",true,"Adding…");
    const{error}=await sb.from("admins").insert({name,email,password:pass,role});
    if(error){if(msg){msg.style.display="block";msg.style.background="#FFF5F5";msg.style.color="var(--danger)";msg.textContent="Something went wrong.";}btnLoad("add-admin",false,null,"Add Team Member");return;}
    await renderAdmin(null,null,"team");
  });
  qsa(".role-select").forEach(sel=>sel.addEventListener("change",async()=>{await sb.from("admins").update({role:sel.value}).eq("id",sel.dataset.aid);await renderAdmin(null,null,"team");}));
  qsa(".del-admin").forEach(btn=>btn.addEventListener("click",async()=>{if(!confirm("Remove this team member?"))return;await sb.from("admins").delete().eq("id",btn.dataset.aid);await renderAdmin(null,null,"team");}));
}

// ── APP INIT ──────────────────────────────────────────────────────────────────
async function bootApp(){
  // Check for password reset token in URL first
  const urlParams=new URLSearchParams(window.location.search);
  const resetToken=urlParams.get("reset");
  if(resetToken){await showResetPasswordForm(resetToken);return;}

  const restored=await loadSession();
  if(restored&&SESSION){
    if(SESSION.role==="admin"){
      await checkUpcomingReminders();
      await renderAdmin();
      return;
    }
    if(SESSION.role==="client"&&SESSION.client){
      const{data:files}=await sb.from("files").select("*").eq("client_id",SESSION.client.id).order("created_at");
      if(!ACTIVE_FILE_ID&&files&&files.length)ACTIVE_FILE_ID=files[0].id;
      await checkUpcomingReminders();
      await renderClient(SESSION.client.id,ACTIVE_FILE_ID);
      return;
    }
  }
  renderLogin();
}

bootApp();
</script>
</body>
