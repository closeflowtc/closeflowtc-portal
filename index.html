<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CloseFlow TC | Client Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',system-ui,-apple-system,sans-serif}
:root{
  --sidebar-bg:#EEF2F7;
  --sidebar-active:#2D3748;
  --main-bg:#F7F9FC;
  --white:#FFFFFF;
  --teal:#3A9DB5;
  --teal-dark:#2A7A8E;
  --teal-light:#B8D4DC;
  --teal-mist:#EBF5F8;
  --ink:#1C2B32;
  --muted:#718096;
  --border:#E2E8F0;
  --shadow:0 2px 12px rgba(0,0,0,.07);
  --shadow-hover:0 8px 28px rgba(58,157,181,.18);
  --success:#38A169;--warning:#D69E2E;--danger:#E53E3E;
}
body{background:var(--main-bg);min-height:100vh;color:var(--ink)}
a{color:var(--teal);text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

/* ── LAYOUT ── */
.portal-wrap{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:var(--sidebar-bg);
  display:flex;flex-direction:column;padding:20px 0;
  border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;overflow-y:auto}
.main-area{margin-left:220px;flex:1;min-height:100vh;background:var(--main-bg)}
.topbar{background:var(--white);border-bottom:1px solid var(--border);
  padding:0 28px;height:64px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;
  box-shadow:0 1px 4px rgba(0,0,0,.05)}
.content{padding:28px}

/* ── SIDEBAR ── */
.sidebar-logo{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar-logo img{height:32px;width:auto}
.sidebar-logo-text{font-size:13px;font-weight:800;color:var(--ink);letter-spacing:.04em;text-transform:uppercase;margin-top:6px}
.sidebar-logo-sub{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.nav-section{padding:0 12px;margin-bottom:8px}
.nav-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.1em;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;
  font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;
  transition:all .2s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--white);color:var(--ink);box-shadow:var(--shadow)}
.nav-item.active{background:var(--sidebar-active);color:#fff;font-weight:700;
  box-shadow:0 4px 12px rgba(45,55,72,.25)}
.nav-item.active .nav-icon{filter:brightness(10)}
.nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;transition:transform .2s}
.nav-item:hover .nav-icon{transform:scale(1.15)}
.sidebar-bottom{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.invite-chip{background:var(--white);border:1px solid var(--border);border-radius:12px;
  padding:12px;text-align:center}
.invite-chip-label{font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
.invite-chip-code{font-size:18px;font-weight:900;color:var(--teal);letter-spacing:3px}

/* ── CARDS ── */
.card{background:var(--white);border-radius:16px;border:1px solid var(--border);
  box-shadow:var(--shadow);overflow:hidden;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.card-pad{padding:20px 22px}

/* ── STAT CARDS ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--white);border-radius:16px;border:1px solid var(--border);
  padding:18px 20px;box-shadow:var(--shadow);transition:all .2s;cursor:default}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover)}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:20px;margin-bottom:12px;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.stat-card:hover .stat-icon{transform:scale(1.12) rotate(-5deg)}
.stat-val{font-size:26px;font-weight:800;color:var(--ink);line-height:1}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.stat-arrow{display:flex;align-items:center;gap:4px;margin-top:10px;font-size:12px;font-weight:600;color:var(--teal)}
.stat-arrow:hover{text-decoration:underline;cursor:pointer}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;
  padding:4px 12px;font-size:11px;font-weight:700}
.badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── BUTTONS ── */
.btn{border:none;border-radius:10px;padding:10px 20px;font-weight:700;font-size:13px;
  cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--sidebar-active);color:#fff;box-shadow:0 3px 10px rgba(45,55,72,.25)}
.btn-primary:hover{background:#1a2535;transform:translateY(-1px);box-shadow:0 5px 16px rgba(45,55,72,.35)}
.btn-teal{background:var(--teal);color:#fff;box-shadow:0 3px 10px rgba(58,157,181,.3)}
.btn-teal:hover{background:var(--teal-dark);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--teal);border:1.5px solid var(--teal)}
.btn-ghost:hover{background:var(--teal-mist)}
.btn-danger{background:#FFF5F5;color:var(--danger);border:1px solid #FED7D7}
.btn-danger:hover{background:#FED7D7}
.btn-sm{padding:6px 14px;font-size:12px}

/* ── INPUTS ── */
.finput{width:100%;padding:10px 14px;border-radius:10px;
  border:1.5px solid var(--border);font-size:14px;outline:none;
  background:var(--white);color:var(--ink);transition:border-color .2s;box-sizing:border-box}
.finput:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(58,157,181,.1)}
.finput::placeholder{color:#A0AEC0}
.input-group{margin-bottom:16px}
.input-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:5px;display:block}

/* ── TASKS ── */
.task-item{display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-radius:10px;border:1px solid var(--border);margin-bottom:8px;
  background:var(--white);transition:all .2s}
.task-item:hover{border-color:var(--teal-light);box-shadow:0 2px 8px rgba(58,157,181,.1);transform:translateX(3px)}
.task-check{width:22px;height:22px;border-radius:7px;border:2px solid var(--teal-light);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.task-check:hover{border-color:var(--teal);transform:scale(1.1)}
.task-check.done{background:var(--teal);border-color:var(--teal)}

/* ── MILESTONES ── */
.milestone-step{display:flex;align-items:center;gap:14px;padding:12px 14px;
  border-radius:12px;margin-bottom:4px;transition:all .2s}
.milestone-step:hover{background:var(--teal-mist);transform:translateX(4px)}
.ms-circle{width:32px;height:32px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.milestone-step:hover .ms-circle{transform:scale(1.1) rotate(-5deg)}

/* ── DATE ITEMS ── */
.date-item{display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-radius:10px;margin-bottom:8px;
  border:1px solid transparent;transition:all .2s}
.date-item:hover{transform:translateX(3px)}
.date-upcoming{background:#EBF8FF;border-color:#BEE3F8}
.date-overdue{background:#FFF5F5;border-color:#FED7D7}
.date-complete{background:#F0FFF4;border-color:#C6F6D5}

/* ── MESSAGES ── */
.msg-bubble{border-radius:14px;padding:10px 14px;max-width:75%;
  font-size:14px;line-height:1.6;transition:transform .15s}
.msg-bubble:hover{transform:scale(1.01)}
.msg-in{background:var(--teal-mist);color:var(--ink);border-bottom-left-radius:4px}
.msg-out{background:var(--sidebar-active);color:#fff;border-bottom-right-radius:4px}

/* ── CONTACT CARDS ── */
.contact-card{background:var(--white);border:1px solid var(--border);border-radius:12px;
  padding:16px;transition:all .2s;margin-bottom:10px}
.contact-card:hover{border-color:var(--teal-light);box-shadow:var(--shadow-hover);transform:translateY(-2px)}

/* ── PROGRESS BAR ── */
.prog-bar{background:var(--border);border-radius:50px;height:8px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal-light),var(--teal));
  border-radius:50px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* ── AVATAR ── */
.avatar{border-radius:50%;background:linear-gradient(135deg,var(--teal-light),var(--teal));
  display:flex;align-items:center;justify-content:center;color:#fff;
  font-weight:800;flex-shrink:0;overflow:hidden;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s}
.avatar:hover{transform:scale(1.08);box-shadow:0 4px 14px rgba(58,157,181,.35)}
.avatar img{width:100%;height:100%;object-fit:cover}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;
  animation:fadeIn .2s ease}
.modal-box{background:var(--white);border-radius:20px;border:1px solid var(--border);
  box-shadow:0 24px 64px rgba(0,0,0,.15);max-width:520px;width:100%;padding:36px;
  animation:slideUp .3s cubic-bezier(.34,1.56,.64,1)}

/* ── TOUR ── */
.tour-highlight{position:fixed;border-radius:12px;
  box-shadow:0 0 0 4px var(--teal),0 0 0 9999px rgba(0,0,0,.5);
  transition:all .4s cubic-bezier(.34,1.56,.64,1);z-index:2001;pointer-events:none}
.tour-tooltip{position:fixed;background:var(--white);border-radius:16px;
  border:1px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,.15);
  padding:20px 24px;max-width:300px;z-index:2002;
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
.tour-dot{width:8px;height:8px;border-radius:50%;transition:all .2s}

/* ── AUTH ── */
.auth-left{flex:0 0 44%;background:linear-gradient(135deg,#1C2B32 0%,#2D4A5A 50%,#3A9DB5 100%);
  display:flex;flex-direction:column;justify-content:space-between;
  padding:48px 52px;position:relative;overflow:hidden}
.auth-right{flex:1;display:flex;align-items:center;justify-content:center;
  padding:40px 32px;background:var(--main-bg)}
.auth-tab{flex:1;padding:10px 0;font-weight:700;font-size:12px;border:none;
  letter-spacing:.05em;text-transform:uppercase;transition:all .2s;cursor:pointer}

/* ── CHIP ── */
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;
  border-radius:20px;font-size:11px;font-weight:700}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes popIn{0%{transform:scale(.8);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.pulse{animation:pulse 2s ease-in-out infinite}
.fade-in{animation:fadeIn .3s ease}

#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:linear-gradient(135deg,#1C2B32,#3A9DB5);color:#fff;
  flex-direction:column;gap:12px;font-size:15px;font-weight:600;letter-spacing:.05em}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}

/* ── TOPBAR USER ── */
.topbar-user{display:flex;align-items:center;gap:10px}
.signout-btn{background:var(--sidebar-bg);color:var(--ink);border:1px solid var(--border);
  border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;
  transition:all .2s}
.signout-btn:hover{background:var(--border)}

/* ── DONUT CHART WRAPPER ── */
.chart-wrap{position:relative;width:140px;height:140px;margin:0 auto}
.chart-center{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;pointer-events:none}
.chart-val{font-size:28px;font-weight:900;color:var(--ink)}
.chart-sub{font-size:11px;color:var(--muted);font-weight:500}

/* ── GRID LAYOUTS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* ── WELCOME BANNER ── */
.welcome-banner{background:linear-gradient(135deg,#1C2B32 0%,#2D4A5A 60%,#3A9DB5 100%);
  border-radius:20px;padding:24px 28px;color:#fff;margin-bottom:24px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}

/* ── ADMIN DARK PANEL ── */
.admin-panel{background:linear-gradient(160deg,#0f1e26 0%,#1a3040 100%);min-height:100vh}
.admin-sidebar{width:220px;background:linear-gradient(180deg,#0a1820 0%,#142030 100%);
  border-right:1px solid rgba(255,255,255,.06);position:fixed;top:0;left:0;height:100vh;
  overflow-y:auto;display:flex;flex-direction:column;padding:20px 0}
.admin-main{margin-left:220px;padding:28px;min-height:100vh;background:linear-gradient(160deg,#0f1e26 0%,#172838 100%)}
.admin-topbar{height:56px;background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;
  position:sticky;top:0;z-index:100}
.admin-nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;
  border-radius:10px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);
  cursor:pointer;transition:all .2s;margin-bottom:2px;border:none;
  background:none;width:100%;text-align:left}
.admin-nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.admin-nav-item.active{background:rgba(58,157,181,.2);color:#fff;font-weight:700;
  border-left:3px solid var(--teal)}
.admin-card{background:rgba(255,255,255,.05);border-radius:16px;
  border:1px solid rgba(255,255,255,.08);padding:24px}
.admin-stat{background:rgba(255,255,255,.07);border-radius:14px;padding:18px 20px;
  border:1px solid rgba(255,255,255,.1);transition:all .2s}
.admin-stat:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.2);background:rgba(255,255,255,.1)}
.admin-row{display:flex;align-items:center;gap:14px;padding:14px 16px;
  border-radius:12px;margin-bottom:8px;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.07);transition:all .2s;cursor:pointer}
.admin-row:hover{background:rgba(58,157,181,.12);border-color:rgba(58,157,181,.25);transform:translateX(4px)}
.dark-input{padding:10px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.12);
  font-size:13px;outline:none;background:rgba(255,255,255,.08);color:#fff;
  width:100%;box-sizing:border-box;font-family:inherit;transition:border-color .2s}
.dark-input:focus{border-color:var(--teal)}
.dark-input::placeholder{color:rgba(255,255,255,.3)}
.admin-tab{background:none;border:none;border-bottom:2px solid transparent;
  color:rgba(255,255,255,.4);font-weight:400;font-size:13px;padding:8px 16px;
  cursor:pointer;white-space:nowrap;transition:all .2s}
.admin-tab:hover{color:rgba(255,255,255,.7)}
.admin-tab.active{color:#fff;font-weight:700;border-bottom-color:var(--teal)}
.admin-label{font-size:10px;font-weight:800;color:rgba(255,255,255,.35);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;display:block}
</style>
</head>

<script>

const STATUS={
  Active:{bg:"#C6F6D5",text:"#276749",dot:"#38A169"},
  Pending:{bg:"#FEFCBF",text:"#744210",dot:"#D69E2E"},
  "On Hold":{bg:"#FED7D7",text:"#742A2A",dot:"#E53E3E"},
  Closed:{bg:"#BEE3F8",text:"#2A4365",dot:"#3182CE"},
};
const TOUR_STEPS=[
  {tab:"overview",title:"Your Overview",desc:"See your file status, days to close, progress and what's happening next — all at a glance."},
  {tab:"dates",title:"Key Dates",desc:"All your important deadlines in one place. Color coded so you never miss a thing."},
  {tab:"tasks",title:"My Tasks",desc:"Things your coordinator needs you to complete. Check them off as you go."},

const app=document.getElementById("app");

function show(html){app.innerHTML=html;app.style.display="block";loading.style.display="none";}
function qs(s){return document.querySelector(s);}
function qsa(s){return document.querySelectorAll(s);}
function on(s,e,f){const el=qs(s);if(el)el.addEventListener(e,f);}
function initials(n){return(n||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();}
function daysUntil(d){if(!d)return null;const diff=new Date(d)-new Date();return Math.ceil(diff/86400000);}
function fmtDate(d){if(!d)return"TBD";return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}

function avatarEl(name,photo,size=38){
  const fs=Math.round(size*.36);
  if(photo)return`<div class="avatar" style="width:${size}px;height:${size}px"><img src="${photo}" alt="${name}"/></div>`;
  return`<div class="avatar" style="width:${size}px;height:${size}px;font-size:${fs}px">${initials(name)}</div>`;
}
function badgeEl(status){
  const c=STATUS[status]||{bg:"#EDF2F7",text:"#4A5568",dot:"#A0AEC0"};
  return`<span class="badge" style="background:${c.bg};color:${c.text}"><span class="badge-dot" style="background:${c.dot}"></span>${status}</span>`;
}
function roleBadge(role){
  const isSA=role==="superadmin";

}
function logoEl(light=false){

    <div>
      <div style="font-size:14px;font-weight:800;color:${tc};letter-spacing:.05em;text-transform:uppercase;line-height:1.1">CloseFlow TC</div>
      <div style="font-size:8px;color:${sub};letter-spacing:.12em;text-transform:uppercase;margin-top:1px;font-weight:500">Where Every Closing Flows</div>
    </div>
  </div>`;
}
function var_ink(){return"#1C2B32";}

// ── WELCOME MODAL ─────────────────────────────────────────────────────────────
function showWelcomeModal(clientName,clientId,onSkip,onTour){

function startTour(clientId,renderFn){TOUR_ACTIVE=true;TOUR_STEP=0;TOUR_CLIENT_ID=clientId;renderFn(clientId,TOUR_STEPS[0].tab,true);}
function renderTourOverlay(step,total,renderFn){
  const ex=document.getElementById("tour-overlay");if(ex)ex.remove();
  const s=TOUR_STEPS[step];
  const navBtns=document.querySelectorAll(".client-nav-btn");
  const activeBtn=Array.from(navBtns).find(b=>b.dataset.tab===s.tab);
  let hStyle="display:none";
  if(activeBtn){const r=activeBtn.getBoundingClientRect();hStyle=`top:${r.top-4}px;left:${r.left-6}px;width:${r.width+12}px;height:${r.height+8}px`;}
  const el=document.createElement("div");el.id="tour-overlay";el.style.cssText="position:fixed;inset:0;z-index:2000;pointer-events:none";
  el.innerHTML=`<div class="tour-highlight" style="${hStyle}"></div>
  <div class="tour-tooltip" style="bottom:80px;left:50%;transform:translateX(-50%)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">Step ${step+1} of ${total}</span>
      <button id="end-tour" style="background:none;border:none;color:var(--muted);font-size:20px;padding:0;cursor:pointer;line-height:1;transition:transform .2s" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">×</button>
    </div>
    <h3 style="font-size:15px;font-weight:800;color:var(--ink);margin-bottom:6px">${s.title}</h3>
    <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:14px">${s.desc}</p>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;gap:5px">
        ${TOUR_STEPS.map((_,i)=>`<div class="tour-dot" style="background:${i===step?"var(--teal)":"var(--border)"};width:${i===step?"20px":"8px"};height:8px;border-radius:50px"></div>`).join("")}
      </div>
      <div style="display:flex;gap:8px">
        ${step>0?`<button class="btn btn-ghost btn-sm" id="tour-back">← Back</button>`:""}
        ${step<total-1?`<button class="btn btn-primary btn-sm" id="tour-next">Next →</button>`:`<button class="btn btn-teal btn-sm" id="tour-done">Finish 🎉</button>`}
      </div>
    </div>
  </div>`;
  document.body.appendChild(el);
  document.getElementById("end-tour")?.addEventListener("click",()=>{TOUR_ACTIVE=false;el.remove();});
  document.getElementById("tour-next")?.addEventListener("click",()=>{TOUR_STEP++;el.remove();renderFn(TOUR_CLIENT_ID,TOUR_STEPS[TOUR_STEP].tab,false,true);});
  document.getElementById("tour-back")?.addEventListener("click",()=>{TOUR_STEP--;el.remove();renderFn(TOUR_CLIENT_ID,TOUR_STEPS[TOUR_STEP].tab,false,true);});
  document.getElementById("tour-done")?.addEventListener("click",()=>{TOUR_ACTIVE=false;el.remove();const c=document.createElement("div");c.style.cssText="position:fixed;inset:0;pointer-events:none;z-index:3000;display:flex;align-items:center;justify-content:center";c.innerHTML=`<div style="font-size:80px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)">🎉</div>`;document.body.appendChild(c);setTimeout(()=>c.remove(),1500);});
}

async function doLogin(){
  const email=qs("#f-email")?.value.trim(),pass=qs("#f-pass")?.value;
  const{data:adminData}=await sb.from("admins").select("*").eq("email",email).eq("password",pass).single();
  if(adminData){SESSION={role:"admin",admin:adminData};await renderAdmin();return;}
  const{data,error}=await sb.from("clients").select("*").eq("email",email).eq("password",pass).single();
  if(error||!data){renderLogin("login","Incorrect email or password.");return;}
  SESSION={role:"client",client:data};await renderClient(data.id);
}
async function doRegister(){
  const name=qs("#f-name")?.value.trim(),email=qs("#f-email")?.value.trim();
  const phone=qs("#f-phone")?.value.trim()||"",pass=qs("#f-pass")?.value;
  const confirm=qs("#f-confirm")?.value,code=qs("#f-code")?.value.trim().toUpperCase();
  if(!name||!email||!pass){renderLogin("register","Please fill in all required fields.");return;}
  if(pass!==confirm){renderLogin("register","Passwords don't match.");return;}
  if(code!==INVITE){renderLogin("register","Invalid invite code. Contact your coordinator.");return;}
  const{data:exists}=await sb.from("clients").select("id").eq("email",email).single();
  if(exists){renderLogin("register","An account with this email already exists.");return;}
  const{data:client,error}=await sb.from("clients").insert({name,email,password:pass,phone,address:"",photo_url:"",has_seen_welcome:false}).select().single();
  if(error){renderLogin("register","Something went wrong. Please try again.");return;}
  await sb.from("files").insert({client_id:client.id,address:"",status:"Pending",milestone:0,closing_date:"",coordinator:"Danielle McCarter"});
  await sb.from("messages").insert({client_id:client.id,from_name:"CloseFlow TC",text:`Welcome, ${name}! Your account is ready. Your coordinator will be in touch shortly.`,date:new Date().toISOString().slice(0,10),is_admin:true});
  SESSION={role:"client",client};await renderClient(client.id);
}

            <span style="color:rgba(255,255,255,.5);font-size:13px">✉ ${client.email}</span>
            ${client.phone?`<span style="color:rgba(255,255,255,.5);font-size:13px">📞 ${client.phone}</span>`:""}
            ${client.address?`<span style="color:rgba(255,255,255,.5);font-size:13px">📍 ${client.address}</span>`:""}
          </div>
        </div>
        ${badgeEl(f.status)}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div><label class="admin-label">Property Address</label><input class="dark-input" id="f-address" value="${f.address||""}" placeholder="123 Main St"/></div>
        <div><label class="admin-label">Closing Date</label><input class="dark-input" id="f-closing" type="date" value="${f.closing_date||""}"/></div>
        <div><label class="admin-label">Status</label>
          <select class="dark-input" id="f-status">${FILE_STATUSES.map(s=>`<option value="${s}" ${f.status===s?"selected":""}>${s}</option>`).join("")}</select></div>
        <div><label class="admin-label">Milestone</label>
          <select class="dark-input" id="f-milestone">${MILESTONES.map((m,i)=>`<option value="${i}" ${f.milestone===i?"selected":""}>${i+1}. ${m}</option>`).join("")}</select></div>
        <div style="grid-column:1/-1"><label class="admin-label">Coordinator</label><input class="dark-input" id="f-coord" value="${f.coordinator||"Danielle McCarter"}"/></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:18px;align-items:center">
        <button class="btn btn-teal" id="save-file">Save Changes</button>
        <div id="save-msg" style="display:none;font-size:12px;color:#68D391;font-weight:700">✓ Saved!</div>
      </div>
      <div style="margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,.08)">
        <p class="admin-label" style="margin-bottom:12px">Reset Client Password</p>
        <div style="display:flex;gap:8px">
          <input class="dark-input" id="new-pw" type="text" placeholder="Set new password for client" style="flex:1"/>
          <button class="btn btn-ghost btn-sm" id="reset-pw" style="white-space:nowrap;color:#fff;border-color:rgba(255,255,255,.2)">Reset</button>
        </div>
        <div id="pw-reset-msg" style="display:none;font-size:12px;margin-top:8px"></div>
      </div>
    </div>`;
  }

  else if(tab==="tasks"&&client){
    const tl=tasks||[];
    mainContent=`<div class="admin-card">
      <p class="admin-label" style="margin-bottom:16px">Client Tasks</p>
      <div style="display:flex;gap:8px;margin-bottom:18px">
        <input class="dark-input" id="task-input" placeholder="Add a task for the client…" style="flex:1"/>
        <button class="btn btn-teal btn-sm" id="add-task">+ Add</button>
      </div>
      ${tl.length===0?`<p style="color:rgba(255,255,255,.3)">No tasks yet.</p>`
      :tl.map(t=>`<div class="admin-row" style="cursor:default">
        <div style="width:18px;height:18px;border-radius:5px;border:2px solid ${t.done?"var(--teal)":"rgba(255,255,255,.3)"};background:${t.done?"var(--teal)":"transparent"};display:flex;align-items:center;justify-content:center;flex-shrink:0">${t.done?`<svg width="10" height="10" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`:""}</div>
        <p style="flex:1;font-size:13px;color:${t.done?"rgba(255,255,255,.35)":"#fff"};text-decoration:${t.done?"line-through":"none"}">${t.text}</p>
        <button data-tid="${t.id}" class="del-task" style="background:none;border:none;color:rgba(255,80,80,.6);font-size:20px;cursor:pointer;transition:transform .2s" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">×</button>
      </div>`).join("")}
    </div>`;
  }

  else if(tab==="dates"&&client){
    const dl=dates||[];
    mainContent=`<div class="admin-card">
      <p class="admin-label" style="margin-bottom:16px">Key Dates</p>
      <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">
        <input class="dark-input" id="date-label" placeholder="e.g. Inspection Deadline" style="flex:2;min-width:140px"/>
        <input class="dark-input" id="date-val" type="date" style="flex:1;min-width:140px"/>
        <button class="btn btn-teal btn-sm" id="add-date">+ Add</button>
      </div>
      ${dl.length===0?`<p style="color:rgba(255,255,255,.3)">No key dates added yet.</p>`
      :dl.map(d=>{const days=daysUntil(d.date);const ind=days===null?"":days<0?`⚠️ ${Math.abs(days)}d overdue`:days===0?"Today!":days<=3?`⚠️ ${days}d`:`${days}d away`;
      return`<div class="admin-row" style="cursor:default">
        <div style="flex:1"><p style="font-size:13px;color:#fff;font-weight:600">${d.label}</p><p style="font-size:11px;color:rgba(255,255,255,.4);margin-top:2px">${fmtDate(d.date)} ${ind?`· <span style="color:${days<0?"#FC8181":"#F6E05E"}">${ind}</span>`:""}</p></div>
        <button data-did="${d.id}" class="del-date" style="background:none;border:none;color:rgba(255,80,80,.6);font-size:20px;cursor:pointer;transition:transform .2s" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">×</button>
      </div>`;}).join("")}
    </div>`;
  }

  else if(tab==="contacts"&&client){
    const cl=contacts||[];
    mainContent=`<div class="admin-card">
      <p class="admin-label" style="margin-bottom:16px">Key Contacts</p>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:8px;margin-bottom:18px;align-items:end">
        <input class="dark-input" id="c-role" placeholder="Role"/>
        <input class="dark-input" id="c-name" placeholder="Name"/>
        <input class="dark-input" id="c-phone" placeholder="Phone"/>
        <input class="dark-input" id="c-email" placeholder="Email"/>
        <button class="btn btn-teal btn-sm" id="add-contact">+ Add</button>
      </div>
      ${cl.length===0?`<p style="color:rgba(255,255,255,.3)">No contacts added yet.</p>`
      :cl.map(c=>`<div class="admin-row" style="cursor:default">
        <div style="flex:1"><p style="font-size:13px;color:#fff;font-weight:600">${c.name} <span style="color:rgba(255,255,255,.35);font-weight:400">· ${c.role}</span></p><p style="font-size:11px;color:rgba(255,255,255,.4);margin-top:2px">${c.phone||""} ${c.email?`· ${c.email}`:""}</p></div>
        <button data-coid="${c.id}" class="del-contact" style="background:none;border:none;color:rgba(255,80,80,.6);font-size:20px;cursor:pointer;transition:transform .2s" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">×</button>
      </div>`).join("")}
    </div>`;
  }

  else if(tab==="documents"&&client){
    const dl=docs||[];
    mainContent=`<div class="admin-card">
      <p class="admin-label" style="margin-bottom:16px">Documents</p>
      <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">
        <input class="dark-input" id="doc-name" placeholder="Document name" style="flex:2;min-width:130px"/>
        <input class="dark-input" id="doc-cat" placeholder="Category" style="flex:1;min-width:110px"/>
        <input class="dark-input" id="doc-url" placeholder="https://link-to-doc..." style="flex:3;min-width:180px"/>
        <button class="btn btn-teal btn-sm" id="add-doc">+ Add</button>
      </div>
      ${dl.length===0?`<p style="color:rgba(255,255,255,.3)">No documents yet.</p>`
      :dl.map(doc=>`<div class="admin-row" style="cursor:default">
        <span style="font-size:18px;transition:transform .2s" onmouseover="this.style.transform='scale(1.2) rotate(-5deg)'" onmouseout="this.style.transform='scale(1)'">📄</span>
        <div style="flex:1"><p style="font-weight:600;font-size:13px;color:#fff">${doc.name} <span style="color:rgba(255,255,255,.3);font-size:11px">· ${doc.category||"General"}</span></p><a href="${doc.url}" style="font-size:11px;color:var(--teal-light)">${doc.url}</a></div>
        <button data-docid="${doc.id}" class="del-doc" style="background:none;border:none;color:rgba(255,80,80,.6);font-size:20px;cursor:pointer;transition:transform .2s" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">×</button>
      </div>`).join("")}
    </div>`;
  }

  else if(tab==="messages"&&client){
    mainContent=`<div class="admin-card">
      <p class="admin-label" style="margin-bottom:16px">Messages with ${client.name}</p>
      <div id="admin-msg-list" style="max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:16px;padding-right:4px">
        ${(msgs||[]).map(m=>`<div style="display:flex;flex-direction:column;align-items:${m.is_admin?"flex-end":"flex-start"}">
          <p style="font-size:10px;color:rgba(255,255,255,.3);margin-bottom:4px;font-weight:600">${m.from_name} · ${m.date}</p>
          <div style="border-radius:12px;padding:10px 14px;max-width:78%;font-size:13px;line-height:1.6;background:${m.is_admin?"var(--teal)":"rgba(255,255,255,.1)"};color:#fff;border-bottom-right-radius:${m.is_admin?"4px":"12px"};border-bottom-left-radius:${m.is_admin?"12px":"4px"}">${m.text}</div>
        </div>`).join("")}
      </div>
      <div style="display:flex;gap:8px">
        <input class="dark-input" id="admin-msg" placeholder="Send a message…" style="flex:1;padding:11px 14px;border-radius:12px;font-size:14px"/>
        <button class="btn btn-teal" id="admin-send">Send</button>
      </div>
    </div>`;
  }

  const adminNavItems=[
    {id:"overview",icon:"📊",label:"Dashboard"},
    ...(isSuperAdmin?[{id:"team",icon:"👥",label:"Team Management"}]:[]),
  ];

  show(`<div class="admin-panel" style="display:flex;flex-direction:column">
    <!-- Admin Topbar -->
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;gap:12px">
        ${logoEl(true)}
        <span style="background:rgba(58,157,181,.2);color:var(--teal-light);font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;border:1px solid rgba(58,157,181,.3)">${isSuperAdmin?"⭐ SUPER ADMIN":"👤 ADMIN"}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        ${avatarEl(currentAdmin?.name||"Admin","",32)}
        <span style="color:rgba(255,255,255,.7);font-size:13px;font-weight:500">${currentAdmin?.name||"Admin"}</span>
        <button id="admin-signout" class="signout-btn" style="background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.13)">Sign Out</button>
      </div>
    </div>
    <div style="display:flex;flex:1;min-height:0">
      <!-- Admin Sidebar -->
      <div class="admin-sidebar">
        <div style="padding:0 14px 16px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:12px">
          <img src="https://assets.cdn.filesafe.space/EugpQeU0mFvhfus3Pw1y/media/69379341e03e9d121662162b.png" style="height:30px;width:auto" alt="CloseFlow TC"/>
        </div>
        <div style="padding:0 10px">
          ${adminNavItems.map(n=>`<button data-nav="${n.id}" class="admin-nav-item ${tab===n.id?"active":""}">
            <span style="font-size:15px">${n.icon}</span>${n.label}
          </button>`).join("")}
          <div style="height:1px;background:rgba(255,255,255,.06);margin:10px 0"></div>
          <p style="font-size:10px;font-weight:700;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.1em;padding:6px 4px 8px">Clients (${allClients.length})</p>
          ${allClients.map(c=>{const sc=STATUS[c.status||"Pending"]||{dot:"#aaa"};
          return`<button class="admin-nav-item sidebar-btn ${c.id===activeId&&tab!=="overview"&&tab!=="team"?"active":""}" data-cid="${c.id}">
            <div style="width:7px;height:7px;border-radius:50%;background:${sc.dot};flex-shrink:0"></div>
            <div style="min-width:0"><p style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name}</p><p style="font-size:10px;opacity:.5;margin-top:1px">${c.status||"Pending"}</p></div>
          </button>`;}).join("")}
        </div>
        <div style="margin-top:auto;padding:12px 14px;border-top:1px solid rgba(255,255,255,.06)">
          <div style="background:rgba(58,157,181,.12);border:1px solid rgba(58,157,181,.2);border-radius:10px;padding:12px;text-align:center">
            <p style="font-size:9px;color:rgba(255,255,255,.35);font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">Invite Code</p>
            <p style="font-size:18px;font-weight:900;color:#fff;letter-spacing:3px">${INVITE}</p>
          </div>
        </div>
      </div>
      <!-- Admin Main -->
      <div class="admin-main fade-in">
        ${client&&tab!=="overview"&&tab!=="team"?`
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:24px">
            ${avatarEl(client.name,client.photo_url||"",46)}
            <div>
              <h2 style="font-weight:900;font-size:20px;color:#fff">${client.name}</h2>
              <p style="font-size:13px;color:rgba(255,255,255,.4);margin-top:2px">${client.email}${client.phone?` · ${client.phone}`:""}</p>
            </div>
            <div style="margin-left:auto">${badgeEl(f.status)}</div>
          </div>
          <div style="display:flex;gap:0;margin-bottom:22px;border-bottom:1px solid rgba(255,255,255,.07);overflow-x:auto">
            ${adminTabs.map(t=>`<button data-atab="${t.id}" class="admin-tab ${t.id===tab?"active":""}">${t.label}</button>`).join("")}
          </div>`:""}
        ${mainContent}
      </div>
    </div>
  </div>`);

  on("#admin-signout","click",()=>{SESSION=null;renderLogin();});
  qsa("[data-nav]").forEach(btn=>btn.addEventListener("click",()=>{if(btn.dataset.nav==="team")renderAdmin(null,"team");else renderAdmin(null,"overview");}));
  qsa(".sidebar-btn[data-cid]").forEach(btn=>btn.addEventListener("click",()=>renderAdmin(btn.dataset.cid,"client")));
  qsa("[data-atab]").forEach(btn=>btn.addEventListener("click",()=>renderAdmin(activeId,btn.dataset.atab)));
  qsa(".client-row[data-cid]").forEach(row=>row.addEventListener("click",()=>renderAdmin(row.dataset.cid,"client")));

  on("#save-file","click",async()=>{const address=qs("#f-address")?.value||"";const closing_date=qs("#f-closing")?.value||"";const status=qs("#f-status")?.value||"Pending";const milestone=parseInt(qs("#f-milestone")?.value||0);const coordinator=qs("#f-coord")?.value||"Danielle McCarter";await sb.from("files").update({address,closing_date,status,milestone,coordinator}).eq("client_id",activeId);const msg=qs("#save-msg");if(msg){msg.style.display="block";setTimeout(()=>msg.style.display="none",2000);}});
  on("#reset-pw","click",async()=>{const pw=qs("#new-pw")?.value.trim();const msg=qs("#pw-reset-msg");if(!pw){if(msg){msg.style.display="block";msg.style.color="#FC8181";msg.textContent="Please enter a new password.";}return;}await sb.from("clients").update({password:pw}).eq("id",activeId);if(msg){msg.style.display="block";msg.style.color="#68D391";msg.textContent="✓ Password reset!";}if(qs("#new-pw"))qs("#new-pw").value="";});
  on("#add-task","click",async()=>{const text=qs("#task-input")?.value.trim();if(!text)return;await sb.from("tasks").insert({client_id:activeId,text,done:false});await renderAdmin(activeId,"tasks");});
  on("#task-input","keydown",async e=>{if(e.key==="Enter"){const text=e.target.value.trim();if(!text)return;await sb.from("tasks").insert({client_id:activeId,text,done:false});await renderAdmin(activeId,"tasks");}});
  qsa(".del-task").forEach(btn=>btn.addEventListener("click",async()=>{await sb.from("tasks").delete().eq("id",btn.dataset.tid);await renderAdmin(activeId,"tasks");}));
  on("#add-date","click",async()=>{const label=qs("#date-label")?.value.trim();const date=qs("#date-val")?.value;if(!label||!date)return;await sb.from("key_dates").insert({client_id:activeId,label,date});await renderAdmin(activeId,"dates");});
  qsa(".del-date").forEach(btn=>btn.addEventListener("click",async()=>{await sb.from("key_dates").delete().eq("id",btn.dataset.did);await renderAdmin(activeId,"dates");}));
  on("#add-contact","click",async()=>{const role=qs("#c-role")?.value.trim();const name=qs("#c-name")?.value.trim();const phone=qs("#c-phone")?.value.trim();const email=qs("#c-email")?.value.trim();if(!role||!name)return;await sb.from("contacts").insert({client_id:activeId,role,name,phone,email});await renderAdmin(activeId,"contacts");});
  qsa(".del-contact").forEach(btn=>btn.addEventListener("click",async()=>{await sb.from("contacts").delete().eq("id",btn.dataset.coid);await renderAdmin(activeId,"contacts");}));
  on("#add-doc","click",async()=>{const name=qs("#doc-name")?.value.trim();const url=qs("#doc-url")?.value.trim();const category=qs("#doc-cat")?.value.trim()||"General";if(!name||!url)return;await sb.from("documents").insert({client_id:activeId,name,url,category,date:new Date().toISOString().slice(0,10)});await renderAdmin(activeId,"documents");});
  qsa(".del-doc").forEach(btn=>btn.addEventListener("click",async()=>{await sb.from("documents").delete().eq("id",btn.dataset.docid);await renderAdmin(activeId,"documents");}));
  on("#admin-send","click",async()=>{const input=qs("#admin-msg");const text=input?.value.trim();if(!text)return;await sb.from("messages").insert({client_id:activeId,from_name:"CloseFlow TC",text,date:new Date().toISOString().slice(0,10),is_admin:true});input.value="";await renderAdmin(activeId,"messages");});
  on("#admin-msg","keydown",async e=>{if(e.key!=="Enter")return;const text=e.target.value.trim();if(!text)return;await sb.from("messages").insert({client_id:activeId,from_name:"CloseFlow TC",text,date:new Date().toISOString().slice(0,10),is_admin:true});e.target.value="";await renderAdmin(activeId,"messages");});
  const ml=qs("#admin-msg-list");if(ml)ml.scrollTop=ml.scrollHeight;

  on("#add-admin","click",async()=>{const name=qs("#new-admin-name")?.value.trim();const email=qs("#new-admin-email")?.value.trim();const pass=qs("#new-admin-pass")?.value;const role=qs("#new-admin-role")?.value||"admin";const msg=qs("#team-msg");if(!name||!email||!pass){if(msg){msg.style.display="block";msg.style.background="rgba(255,80,80,.15)";msg.style.color="#FC8181";msg.textContent="Please fill in all fields.";}return;}const{data:exists}=await sb.from("admins").select("id").eq("email",email).single();if(exists){if(msg){msg.style.display="block";msg.style.background="rgba(255,80,80,.15)";msg.style.color="#FC8181";msg.textContent="An admin with this email already exists.";}return;}const{error}=await sb.from("admins").insert({name,email,password:pass,role});if(error){if(msg){msg.style.display="block";msg.style.background="rgba(255,80,80,.15)";msg.style.color="#FC8181";msg.textContent="Something went wrong.";}return;}await renderAdmin(null,"team");});
  qsa(".role-select").forEach(sel=>{sel.addEventListener("change",async()=>{await sb.from("admins").update({role:sel.value}).eq("id",sel.dataset.aid);await renderAdmin(null,"team");});});
  qsa(".del-admin").forEach(btn=>{btn.addEventListener("click",async()=>{if(!confirm("Remove this team member?"))return;await sb.from("admins").delete().eq("id",btn.dataset.aid);await renderAdmin(null,"team");});});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderLogin();
</script>
</body>
</html>
