<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CloseFlow TC | Client Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
:root{
  --steel:#4A9DB5;--dark:#3A7A8E;--ink:#1C2B32;--slate:#6AB5C8;
  --frost:#F2F6F8;--mist:#C8E4ED;--smoke:#8DB8C8;--bg:#E8F2F6;
  --grad-hero:linear-gradient(135deg,#2A5F72 0%,#3A8AA0 55%,#4AAEC8 100%);
  --grad-btn:linear-gradient(135deg,#4A9DB5 0%,#3A7A8E 100%);
  --grad-mist:linear-gradient(135deg,#F2F6F8 0%,#d8eef5 100%);
  --grad-dark:linear-gradient(160deg,#2A5060 0%,#3A7080 100%);
  --grad-sidebar:linear-gradient(180deg,#264858 0%,#2e5e70 100%);
  --shadow:0 4px 24px rgba(28,43,50,.13);
  --success:#0fa374;--warning:#e8a020;--danger:#cc3333;
}
body{background:var(--bg);min-height:100vh;transition:background .3s,color .3s}
body.dark{
  --bg:#0f1e26;--frost:#162530;--ink:#e8f2f6;--smoke:#6ab5c8;
  --mist:#1e3a4a;--grad-mist:linear-gradient(135deg,#1a3040,#1e3a4a);
}
body.dark .card{background:linear-gradient(145deg,#162530,#1a2e3a)!important;border-color:rgba(74,124,142,.2)!important}
body.dark .finput{background:#1a2e3a!important;color:#e8f2f6!important;border-color:rgba(74,124,142,.3)!important}
body.dark .stat-card{background:linear-gradient(135deg,#1a3040,#1e3a4a)!important}
body.dark .task-item{background:linear-gradient(135deg,#1a3040,#1e3a4a)!important;border-color:rgba(74,124,142,.2)!important}
body.dark .contact-card{background:linear-gradient(135deg,#1a3040,#1e3a4a)!important}
body.dark .date-upcoming{background:linear-gradient(135deg,#1a3a4a,#1e4455)!important;border-color:rgba(74,124,142,.3)!important}
body.dark .date-overdue{background:linear-gradient(135deg,#3a1a1a,#451e1e)!important;border-color:rgba(204,51,51,.3)!important}
body.dark .modal-box{background:linear-gradient(145deg,#162530,#1a2e3a)!important;border-color:rgba(74,124,142,.2)!important}
a{color:var(--steel);text-decoration:none}
input,select,textarea{font-family:inherit}
button{font-family:inherit;cursor:pointer}

.pbtn{background:var(--grad-btn);color:#fff;border:none;border-radius:10px;
  padding:11px 22px;font-weight:700;font-size:14px;
  box-shadow:0 3px 14px rgba(46,95,112,.4);
  transition:transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,opacity .2s}
.pbtn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(46,95,112,.5)}
.pbtn:active{transform:scale(.97)}
.pbtn.sm{padding:7px 14px;font-size:12px}
.pbtn.ghost{background:transparent;color:var(--steel);border:1.5px solid var(--steel);box-shadow:none}
.pbtn.ghost:hover{background:rgba(74,124,142,.08)}
.pbtn.danger{background:linear-gradient(135deg,#e05555,#b02020)}
.pbtn.success{background:linear-gradient(135deg,#0fa374,#0a7a58)}

.card{background:linear-gradient(145deg,#fff,var(--frost));border-radius:16px;
  border:1px solid rgba(74,124,142,.12);box-shadow:var(--shadow);overflow:hidden;
  transition:background .3s}

.slabel{font-size:10px;font-weight:800;color:var(--smoke);text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:8px;display:block}

.finput{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid rgba(74,124,142,.2);
  font-size:14px;outline:none;background:var(--frost);color:var(--ink);
  transition:border-color .2s,background .3s;box-sizing:border-box}
.finput:focus{border-color:var(--steel)}

.badge{border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;
  display:inline-flex;align-items:center;gap:5px}

.avatar-circle{border-radius:50%;background:var(--grad-btn);
  display:flex;align-items:center;justify-content:center;color:#fff;
  font-weight:800;flex-shrink:0;box-shadow:0 2px 10px rgba(74,124,142,.35);overflow:hidden;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s}
.avatar-circle:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(74,124,142,.45)}

.stat-card{border-radius:14px;padding:18px 20px;border:1px solid rgba(74,124,142,.12);
  box-shadow:0 2px 10px rgba(74,124,142,.08);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,background .3s}
.stat-card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(74,124,142,.22)}

.contact-card{background:var(--grad-mist);border-radius:12px;padding:16px;
  border:1px solid rgba(74,124,142,.12);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,background .3s}
.contact-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(74,124,142,.15)}

.task-item{display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-radius:10px;border:1px solid rgba(74,124,142,.1);margin-bottom:8px;
  background:var(--grad-mist);
  transition:transform .15s,box-shadow .15s,border-color .15s,background .3s}
.task-item:hover{transform:translateX(4px);border-color:rgba(74,124,142,.3);box-shadow:0 4px 12px rgba(74,124,142,.1)}

.task-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--steel);
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.task-check.done{background:var(--steel);border-color:var(--steel)}
.task-check:hover{transform:scale(1.15)}

.date-item{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-radius:10px;margin-bottom:8px;border:1px solid transparent;
  transition:transform .2s,box-shadow .2s}
.date-item:hover{transform:translateX(3px)}
.date-upcoming{background:linear-gradient(135deg,#d6eef5,#b8dce8);border-color:rgba(74,124,142,.2)}
.date-overdue{background:linear-gradient(135deg,#fde8e8,#f8c8c8);border-color:rgba(204,51,51,.2)}
.date-complete{background:rgba(74,124,142,.06);border-color:rgba(74,124,142,.1)}

.topnav{background:var(--grad-hero);box-shadow:0 4px 20px rgba(28,43,50,.2)}
.topnav-inner{max-width:960px;margin:0 auto;padding:0 24px}
.nav-tabs button{background:none;border:none;border-bottom:2.5px solid transparent;
  color:rgba(255,255,255,.45);font-weight:400;font-size:13px;padding:10px 16px;
  transition:all .2s;white-space:nowrap}
.nav-tabs button:hover{color:rgba(255,255,255,.75);transform:translateY(-1px)}
.nav-tabs button.active{color:#fff;font-weight:700;border-bottom-color:#fff}

.dark-input{padding:10px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.12);
  font-size:13px;outline:none;background:rgba(255,255,255,.08);color:#fff;
  width:100%;box-sizing:border-box;font-family:inherit;transition:border-color .2s}
.dark-input:focus{border-color:var(--steel)}

.photo-upload{width:80px;height:80px;border-radius:50%;background:var(--grad-mist);
  border:2px dashed var(--steel);display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;flex-shrink:0;position:relative;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s}
.photo-upload:hover{transform:scale(1.06);box-shadow:0 4px 16px rgba(74,124,142,.3)}
.photo-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.photo-upload img{width:100%;height:100%;object-fit:cover}

.progress-bar{background:rgba(74,124,142,.12);border-radius:50px;height:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#6AB5C8,#4A9DB5);
  border-radius:50px;transition:width .7s ease}

.msg-bubble{border-radius:14px;padding:11px 15px;max-width:76%;font-size:14px;line-height:1.6;
  transition:transform .15s}
.msg-bubble:hover{transform:scale(1.01)}

/* Theme toggle */
.theme-toggle{width:48px;height:26px;border-radius:50px;position:relative;cursor:pointer;
  border:none;transition:background .3s;flex-shrink:0;padding:0}
.theme-toggle-thumb{width:20px;height:20px;border-radius:50%;position:absolute;
  top:3px;transition:transform .3s cubic-bezier(.34,1.56,.64,1),background .3s;background:#fff}
body:not(.dark) .theme-toggle{background:rgba(255,255,255,.25)}
body:not(.dark) .theme-toggle-thumb{transform:translateX(3px)}
body.dark .theme-toggle{background:rgba(74,124,142,.6)}
body.dark .theme-toggle-thumb{transform:translateX(25px)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;
  animation:fadeIn .25s ease}
.modal-box{background:linear-gradient(145deg,#fff,var(--frost));border-radius:20px;
  border:1px solid rgba(74,124,142,.15);box-shadow:0 24px 64px rgba(0,0,0,.25);
  max-width:520px;width:100%;padding:36px;animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);
  transition:background .3s}

/* Tour tooltip */
.tour-overlay{position:fixed;inset:0;z-index:2000;pointer-events:none}
.tour-highlight{position:fixed;border-radius:12px;box-shadow:0 0 0 4px var(--steel),0 0 0 9999px rgba(0,0,0,.55);
  transition:all .4s cubic-bezier(.34,1.56,.64,1);z-index:2001;pointer-events:none}
.tour-tooltip{position:fixed;background:linear-gradient(145deg,#fff,var(--frost));
  border-radius:16px;border:1px solid rgba(74,124,142,.2);
  box-shadow:0 12px 40px rgba(0,0,0,.25);padding:20px 24px;max-width:320px;width:100%;
  z-index:2002;pointer-events:all;animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
body.dark .tour-tooltip{background:linear-gradient(145deg,#162530,#1a2e3a)!important}
.tour-step-dot{width:8px;height:8px;border-radius:50%;transition:all .2s}

/* Sidebar client row */
.sidebar-btn{width:100%;text-align:left;background:none;border:none;
  border-left:3px solid transparent;padding:11px 18px;transition:all .15s}
.sidebar-btn:hover{background:rgba(255,255,255,.05)!important}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes popIn{0%{transform:scale(.8);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.pulse{animation:pulse 2s ease-in-out infinite}

#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:var(--grad-hero);color:#fff;font-size:16px;font-weight:600;
  letter-spacing:.05em;flex-direction:column;gap:12px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span>Connecting to CloseFlow TC...</span></div>
<div id="app" style="display:none"></div>

<script>
const SB_URL="https://zlxydrczpjteskkxrmzs.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpseHlkcmN6cGp0ZXNra3hybXpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTUzODMsImV4cCI6MjA5MTMzMTM4M30.m7Hf6aNyo6ZwhdHRv21-nMRBYhckIkVDPFtOzTBJKYE";
const sb=supabase.createClient(SB_URL,SB_KEY);
const INVITE="FLOW2026";
const MILESTONES=["Deal Submitted","Title Ordered","Title Search Complete","Clear to Close","HUD Sent for Approval","Closing Scheduled","Closed"];
const FILE_STATUSES=["Active","Pending","On Hold","Closed"];
const STATUS_COLORS={
  Active:{bg:"linear-gradient(135deg,#d6eef5,#b8dce8)",text:"#2E5F70",dot:"#4A9DB5"},
  Pending:{bg:"linear-gradient(135deg,#f5eed6,#ecdbb8)",text:"#6b5200",dot:"#d4a020"},
  "On Hold":{bg:"linear-gradient(135deg,#f5d6d6,#e8b8b8)",text:"#6b1a1a",dot:"#cc3333"},
  Closed:{bg:"linear-gradient(135deg,#d6e8f5,#b8cfe8)",text:"#1a3a6b",dot:"#2a6ec8"},
};
const TOUR_STEPS=[
  {tab:"overview",title:"Your Overview",desc:"See your file status, days to close, progress and what's happening next — all at a glance."},
  {tab:"dates",title:"Key Dates",desc:"All your important deadlines in one place. Color coded so you never miss a thing."},
  {tab:"tasks",title:"My Tasks",desc:"Things your coordinator needs you to do. Check them off as you complete them."},
  {tab:"contacts",title:"Key Contacts",desc:"Everyone involved in your closing — title company, lender, inspector and more."},
  {tab:"milestones",title:"Milestones",desc:"Track every step from contract to close. See exactly where you are in the process."},
  {tab:"documents",title:"Documents",desc:"All your files organized by category. View and download anytime."},
  {tab:"messages",title:"Messages",desc:"Chat directly with your coordinator. Ask questions, get updates, stay connected."},
  {tab:"account",title:"My Account",desc:"Update your profile photo, contact info and password anytime."},
];

let SESSION=null;
let TOUR_ACTIVE=false;
let TOUR_STEP=0;
let TOUR_CLIENT_ID=null;

const app=document.getElementById("app");
const loading=document.getElementById("loading");
function show(html){app.innerHTML=html;app.style.display="block";loading.style.display="none";}
function qs(s){return document.querySelector(s);}
function qsa(s){return document.querySelectorAll(s);}
function on(s,e,f){const el=qs(s);if(el)el.addEventListener(e,f);}
function initials(n){return(n||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();}
function daysUntil(d){if(!d)return null;const diff=new Date(d)-new Date();return Math.ceil(diff/86400000);}
function fmtDate(d){if(!d)return"TBD";return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}

// ── THEME ─────────────────────────────────────────────────────────────────────
function getTheme(){return localStorage.getItem("ctc_theme")||"light";}
function applyTheme(t){document.body.classList.toggle("dark",t==="dark");localStorage.setItem("ctc_theme",t);}
function toggleTheme(cb){applyTheme(getTheme()==="dark"?"light":"dark");if(cb)cb();}
applyTheme(getTheme());

// ── HELPERS ───────────────────────────────────────────────────────────────────
function avatarEl(name,photo,size=38){
  const fs=Math.round(size*.34);
  if(photo)return`<div class="avatar-circle" style="width:${size}px;height:${size}px"><img src="${photo}" alt="${name}"/></div>`;
  return`<div class="avatar-circle" style="width:${size}px;height:${size}px;font-size:${fs}px">${initials(name)}</div>`;
}
function badgeEl(status){
  const c=STATUS_COLORS[status]||{bg:"#eee",text:"#555",dot:"#aaa"};
  return`<span class="badge" style="background:${c.bg};color:${c.text}"><span style="width:5px;height:5px;border-radius:50%;background:${c.dot};display:inline-block"></span>${status}</span>`;
}
function roleBadge(role){
  const isSA=role==="superadmin";
  return`<span class="badge" style="background:${isSA?"linear-gradient(135deg,#fde8a8,#fac767)":"linear-gradient(135deg,#d6eef5,#b8dce8)"};color:${isSA?"#6b5200":"#2E5F70"}">${isSA?"⭐ Super Admin":"👤 Admin"}</span>`;
}
function logoEl(light=false){
  const tc=light?"#fff":"#1C2B32";
  const sub=light?"rgba(255,255,255,.5)":"#8DB8C8";
  return`<div style="display:flex;align-items:center;gap:11px">
    <img src="https://assets.cdn.filesafe.space/EugpQeU0mFvhfus3Pw1y/media/69379341e03e9d121662162b.png" style="height:36px;width:auto;object-fit:contain" alt="CloseFlow TC"/>
    <div>
      <div style="font-size:15px;font-weight:800;color:${tc};letter-spacing:.06em;text-transform:uppercase;line-height:1.1">CloseFlow TC</div>
      <div style="font-size:8px;color:${sub};letter-spacing:.14em;text-transform:uppercase;margin-top:2px;font-weight:500">Where Every Closing Flows</div>
    </div>
  </div>`;
}
function themeToggleEl(){
  const dark=getTheme()==="dark";
  return`<button class="theme-toggle" id="theme-btn" title="${dark?"Light mode":"Dark mode"}">
    <div class="theme-toggle-thumb"></div>
  </button>
  <span style="font-size:14px">${dark?"🌙":"☀️"}</span>`;
}

// ── WELCOME MODAL ─────────────────────────────────────────────────────────────
function showWelcomeModal(clientName,clientId,onSkip,onTour){
  const overlay=document.createElement("div");
  overlay.className="modal-overlay";
  overlay.id="welcome-overlay";
  overlay.innerHTML=`
    <div class="modal-box" style="text-align:center">
      <img src="https://assets.cdn.filesafe.space/EugpQeU0mFvhfus3Pw1y/media/69379341e03e9d121662162b.png" style="height:52px;margin-bottom:16px"/>
      <h2 style="font-size:24px;font-weight:900;color:var(--ink);letter-spacing:-.5px;margin-bottom:8px">Welcome, ${clientName}! 🎉</h2>
      <p style="font-size:14px;color:var(--smoke);line-height:1.7;margin-bottom:24px;max-width:380px;margin-left:auto;margin-right:auto">
        Your CloseFlow TC Client Portal is ready. This is your personal hub for tracking your transaction from contract to close — all in one place.
      </p>
      <div style="background:var(--grad-mist);border-radius:12px;padding:16px;margin-bottom:24px;text-align:left">
        ${[["📊","Overview","See your file status and progress"],["📅","Key Dates","Track all your important deadlines"],["✅","Tasks","Know exactly what you need to do"],["💬","Messages","Chat directly with your coordinator"]].map(([icon,title,desc])=>`
          <div style="display:flex;align-items:center;gap:12px;padding:6px 0">
            <span style="font-size:18px;width:24px;text-align:center">${icon}</span>
            <div><p style="font-weight:700;font-size:13px;color:var(--ink)">${title}</p><p style="font-size:12px;color:var(--smoke)">${desc}</p></div>
          </div>`).join("")}
      </div>
      <div style="display:flex;gap:12px;justify-content:center">
        <button class="pbtn ghost" id="skip-tour" style="border-radius:12px;padding:11px 24px">Skip for Now</button>
        <button class="pbtn pulse" id="start-tour" style="border-radius:12px;padding:11px 24px;font-size:14px">Take the Tour ✨</button>
      </div>
      <p style="font-size:11px;color:var(--smoke);margin-top:14px">You can always restart the tour from My Account</p>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById("skip-tour").onclick=async()=>{
    await sb.from("clients").update({has_seen_welcome:true}).eq("id",clientId);
    overlay.remove();onSkip();
  };
  document.getElementById("start-tour").onclick=async()=>{
    await sb.from("clients").update({has_seen_welcome:true}).eq("id",clientId);
    overlay.remove();onTour();
  };
}

// ── GUIDED TOUR ───────────────────────────────────────────────────────────────
function startTour(clientId,renderFn){
  TOUR_ACTIVE=true;TOUR_STEP=0;TOUR_CLIENT_ID=clientId;
  renderFn(clientId,TOUR_STEPS[0].tab,true);
}

function renderTourOverlay(step,total,renderFn){
  const existing=document.getElementById("tour-overlay");if(existing)existing.remove();
  const s=TOUR_STEPS[step];
  const overlay=document.createElement("div");
  overlay.id="tour-overlay";overlay.className="tour-overlay";

  const navEl=document.querySelector(".nav-tabs");
  const activeBtn=navEl?Array.from(navEl.querySelectorAll("button")).find(b=>b.dataset.tab===s.tab):null;
  let hStyle="top:0;left:0;width:0;height:0";
  if(activeBtn){
    const r=activeBtn.getBoundingClientRect();
    hStyle=`top:${r.top-4}px;left:${r.left-6}px;width:${r.width+12}px;height:${r.height+8}px`;
  }

  const tipLeft=step<4?"left:50%;transform:translateX(-50%)":"left:50%;transform:translateX(-50%)";
  overlay.innerHTML=`
    <div class="tour-highlight" style="${hStyle}"></div>
    <div class="tour-tooltip" style="bottom:80px;${tipLeft}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span style="font-size:11px;font-weight:800;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em">Step ${step+1} of ${total}</span>
        <button id="end-tour" style="background:none;border:none;color:var(--smoke);font-size:18px;padding:0;line-height:1;transition:transform .2s" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">×</button>
      </div>
      <h3 style="font-size:16px;font-weight:800;color:var(--ink);margin-bottom:8px">${s.title}</h3>
      <p style="font-size:13px;color:var(--smoke);line-height:1.6;margin-bottom:16px">${s.desc}</p>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;gap:5px">
          ${TOUR_STEPS.map((_,i)=>`<div class="tour-step-dot" style="background:${i===step?"var(--steel)":"rgba(74,124,142,.25)"};width:${i===step?"20px":"8px"};height:8px;border-radius:50px"></div>`).join("")}
        </div>
        <div style="display:flex;gap:8px">
          ${step>0?`<button class="pbtn ghost sm" id="tour-back" style="border-radius:8px">← Back</button>`:""}
          ${step<total-1
            ?`<button class="pbtn sm" id="tour-next" style="border-radius:8px">Next →</button>`
            :`<button class="pbtn success sm" id="tour-done" style="border-radius:8px">Finish! 🎉</button>`}
        </div>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById("end-tour")?.addEventListener("click",()=>{TOUR_ACTIVE=false;overlay.remove();});
  document.getElementById("tour-next")?.addEventListener("click",()=>{
    TOUR_STEP++;overlay.remove();
    renderFn(TOUR_CLIENT_ID,TOUR_STEPS[TOUR_STEP].tab,false,true);
  });
  document.getElementById("tour-back")?.addEventListener("click",()=>{
    TOUR_STEP--;overlay.remove();
    renderFn(TOUR_CLIENT_ID,TOUR_STEPS[TOUR_STEP].tab,false,true);
  });
  document.getElementById("tour-done")?.addEventListener("click",()=>{
    TOUR_ACTIVE=false;overlay.remove();
    const confetti=document.createElement("div");
    confetti.style.cssText="position:fixed;inset:0;pointer-events:none;z-index:3000;display:flex;align-items:center;justify-content:center";

async function doLogin(){
  const email=qs("#f-email")?.value.trim();
  const pass=qs("#f-pass")?.value;
  // Check admins table first
  const{data:adminData}=await sb.from("admins").select("*").eq("email",email).eq("password",pass).single();
  if(adminData){SESSION={role:"admin",admin:adminData};await renderAdmin();return;}
  // Then check clients
  const{data,error}=await sb.from("clients").select("*").eq("email",email).eq("password",pass).single();
  if(error||!data){renderLogin("login","Incorrect email or password.");return;}
  SESSION={role:"client",client:data};
  await renderClient(data.id);
}

async function doRegister(){
  const name=qs("#f-name")?.value.trim();
  const email=qs("#f-email")?.value.trim();
  const phone=qs("#f-phone")?.value.trim()||"";
  const pass=qs("#f-pass")?.value;
  const confirm=qs("#f-confirm")?.value;
  const code=qs("#f-code")?.value.trim().toUpperCase();
  if(!name||!email||!pass){renderLogin("register","Please fill in all required fields.");return;}
  if(pass!==confirm){renderLogin("register","Passwords don't match.");return;}
  if(code!==INVITE){renderLogin("register","Invalid invite code. Contact your coordinator.");return;}
  const{data:exists}=await sb.from("clients").select("id").eq("email",email).single();
  if(exists){renderLogin("register","An account with this email already exists.");return;}
  const{data:client,error}=await sb.from("clients").insert({name,email,password:pass,phone,address:"",photo_url:"",has_seen_welcome:false}).select().single();
  if(error){renderLogin("register","Something went wrong. Please try again.");return;}
  await sb.from("files").insert({client_id:client.id,address:"",status:"Pending",milestone:0,closing_date:"",coordinator:"Danielle McCarter"});
  await sb.from("messages").insert({client_id:client.id,from_name:"CloseFlow TC",text:`Welcome, ${name}! Your account is ready. Your coordinator will be in touch shortly.`,date:new Date().toISOString().slice(0,10),is_admin:true});
  SESSION={role:"client",client};
  await renderClient(client.id);
}

  qsa(".nav-tabs button").forEach(btn=>btn.addEventListener("click",()=>renderClient(clientId,btn.dataset.tab)));

  on("#send-msg","click",async()=>{const input=qs("#msg-input");const text=input?.value.trim();if(!text)return;await sb.from("messages").insert({client_id:clientId,from_name:client.name,text,date:new Date().toISOString().slice(0,10),is_admin:false});input.value="";await renderClient(clientId,"messages");});
  on("#msg-input","keydown",async e=>{if(e.key!=="Enter")return;const text=e.target.value.trim();if(!text)return;await sb.from("messages").insert({client_id:clientId,from_name:client.name,text,date:new Date().toISOString().slice(0,10),is_admin:false});e.target.value="";await renderClient(clientId,"messages");});

    SESSION.client={...SESSION.client,name,phone,address,email};
  });

    const curr=qs("#pw-current")?.value;const nw=qs("#pw-new")?.value;const conf=qs("#pw-confirm")?.value;
    const msg=qs("#pw-msg");
    if(!curr||!nw||!conf){if(msg){msg.style.display="block";msg.style.background="#fdf0f0";msg.style.color="#b03030";msg.textContent="Please fill in all fields.";}return;}
    if(curr!==client.password){if(msg){msg.style.display="block";msg.style.background="#fdf0f0";msg.style.color="#b03030";msg.textContent="Current password is incorrect.";}return;}
    if(nw!==conf){if(msg){msg.style.display="block";msg.style.background="#fdf0f0";msg.style.color="#b03030";msg.textContent="Passwords don't match.";}return;}
    await sb.from("clients").update({password:nw}).eq("id",clientId);
    if(msg){msg.style.display="block";msg.style.background="#e1f5ee";msg.style.color="#0a5c42";msg.textContent="✓ Password updated!";}

}

      <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">
        <input style="${DIS};flex:2;min-width:140px" id="date-label" placeholder="e.g. Inspection Deadline"/>
        <input style="${DIS};flex:1;min-width:140px" id="date-val" type="date"/>
        <button class="pbtn sm" id="add-date" style="border-radius:10px;white-space:nowrap">+ Add</button>
      </div>
      ${dl.length===0?`<p style="color:rgba(255,255,255,.25);font-size:13px">No key dates added yet.</p>`
      :dl.map(d=>{const days=daysUntil(d.date);const ind=days===null?"":days<0?`⚠️ ${Math.abs(days)}d overdue`:days===0?"Today!":days<=3?`⚠️ ${days}d away`:`${days}d away`;
      return`<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:8px;background:rgba(255,255,255,.06);border-radius:10px;border:1px solid rgba(255,255,255,.07);transition:transform .15s" onmouseover="this.style.transform='translateX(3px)'" onmouseout="this.style.transform='none'">
        <div style="flex:1"><p style="font-size:13px;color:#fff;font-weight:600">${d.label}</p><p style="font-size:11px;color:rgba(255,255,255,.4);margin-top:2px">${fmtDate(d.date)} ${ind?`· <span style="color:${days<0?"#f08080":"#fac067"}">${ind}</span>`:""}</p></div>
        <button data-did="${d.id}" class="del-date" style="background:none;border:none;color:rgba(255,80,80,.6);font-size:18px;padding:0 4px;transition:transform .2s" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">×</button>
      </div>`;}).join("")}
    </div>`;
  }

  else if(tab==="contacts"&&client){
    const cl=contacts||[];
    mainContent=`<div style="background:rgba(255,255,255,.05);border-radius:16px;border:1px solid rgba(255,255,255,.08);padding:24px">
      <p style="font-size:11px;font-weight:800;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px">Key Contacts</p>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:8px;margin-bottom:18px;align-items:end">
        <input style="${DIS}" id="c-role" placeholder="Role"/>
        <input style="${DIS}" id="c-name" placeholder="Name"/>
        <input style="${DIS}" id="c-phone" placeholder="Phone"/>
        <input style="${DIS}" id="c-email" placeholder="Email"/>
        <button class="pbtn sm" id="add-contact" style="border-radius:10px;white-space:nowrap">+ Add</button>
      </div>
      ${cl.length===0?`<p style="color:rgba(255,255,255,.25);font-size:13px">No contacts added yet.</p>`
      :cl.map(c=>`<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:8px;background:rgba(255,255,255,.06);border-radius:10px;border:1px solid rgba(255,255,255,.07);transition:transform .15s" onmouseover="this.style.transform='translateX(3px)'" onmouseout="this.style.transform='none'">
        <div style="flex:1"><p style="font-size:13px;color:#fff;font-weight:600">${c.name} <span style="color:rgba(255,255,255,.35);font-weight:400;font-size:12px">· ${c.role}</span></p><p style="font-size:11px;color:rgba(255,255,255,.4);margin-top:2px">${c.phone||""} ${c.email?`· ${c.email}`:""}</p></div>
        <button data-coid="${c.id}" class="del-contact" style="background:none;border:none;color:rgba(255,80,80,.6);font-size:18px;padding:0 4px;transition:transform .2s" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">×</button>
      </div>`).join("")}
    </div>`;
  }

  else if(tab==="documents"&&client){
    const dl=docs||[];
    mainContent=`<div style="background:rgba(255,255,255,.05);border-radius:16px;border:1px solid rgba(255,255,255,.08);padding:24px">
      <p style="font-size:11px;font-weight:800;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px">Documents</p>
      <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">
        <input style="${DIS};flex:2;min-width:130px" id="doc-name" placeholder="Document name"/>
        <input style="${DIS};flex:1;min-width:120px" id="doc-cat" placeholder="Category"/>
        <input style="${DIS};flex:3;min-width:180px" id="doc-url" placeholder="https://link-to-doc..."/>
        <button class="pbtn sm" id="add-doc" style="border-radius:10px;white-space:nowrap">+ Add</button>
      </div>
      ${dl.length===0?`<p style="color:rgba(255,255,255,.25);font-size:13px">No documents yet.</p>`
      :dl.map(doc=>`<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:8px;background:rgba(255,255,255,.06);border-radius:10px;border:1px solid rgba(255,255,255,.07);transition:transform .15s" onmouseover="this.style.transform='translateX(3px)'" onmouseout="this.style.transform='none'">
        <span style="font-size:18px;transition:transform .2s" onmouseover="this.style.transform='scale(1.2) rotate(-5deg)'" onmouseout="this.style.transform='scale(1)'">📄</span>
        <div style="flex:1"><p style="font-weight:600;font-size:13px;color:#fff">${doc.name} <span style="color:rgba(255,255,255,.3);font-size:11px">· ${doc.category||"General"}</span></p><a href="${doc.url}" style="font-size:11px;color:var(--slate)">${doc.url}</a></div>
        <button data-docid="${doc.id}" class="del-doc" style="background:none;border:none;color:rgba(255,80,80,.6);font-size:18px;padding:0 4px;transition:transform .2s" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">×</button>
      </div>`).join("")}
    </div>`;
  }

  else if(tab==="messages"&&client){
    mainContent=`<div style="background:rgba(255,255,255,.05);border-radius:16px;border:1px solid rgba(255,255,255,.08);padding:24px">
      <p style="font-size:11px;font-weight:800;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px">Messages with ${client.name}</p>
      <div id="admin-msg-list" style="max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:16px;padding-right:4px">
        ${(msgs||[]).map(m=>`<div style="display:flex;flex-direction:column;align-items:${m.is_admin?"flex-end":"flex-start"}">
          <p style="font-size:10px;color:rgba(255,255,255,.3);margin-bottom:4px;font-weight:600">${m.from_name} · ${m.date}</p>
          <div class="msg-bubble" style="background:${m.is_admin?"var(--grad-btn)":"rgba(255,255,255,.1)"};color:#fff;border-radius:12px;border-bottom-right-radius:${m.is_admin?"4px":"12px"};border-bottom-left-radius:${m.is_admin?"12px":"4px"};box-shadow:${m.is_admin?"0 3px 12px rgba(46,95,112,.35)":"none"}">${m.text}</div>
        </div>`).join("")}
      </div>
      <div style="display:flex;gap:8px">
        <input style="${DIS};flex:1;padding:11px 14px;border-radius:12px;font-size:14px" id="admin-msg" placeholder="Send a message…"/>
        <button class="pbtn" id="admin-send" style="border-radius:12px">Send</button>
      </div>
    </div>`;
  }

  show(`<div style="min-height:100vh;background:var(--grad-dark);display:flex;flex-direction:column;transition:background .3s">
    <div style="background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;flex-shrink:0">
      <div style="display:flex;align-items:center;gap:12px">
        ${logoEl(true)}
        <span style="background:rgba(74,124,142,.3);color:var(--mist);font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:.08em;border:1px solid rgba(74,124,142,.3)">${isSuperAdmin?"⭐ SUPER ADMIN":"👤 ADMIN"}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        ${themeToggleEl()}
        ${avatarEl(currentAdmin?.name||"Admin","",32)}
        <span style="color:rgba(255,255,255,.7);font-size:13px">${currentAdmin?.name||"Admin"}</span>
        <button id="admin-signout" style="background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.13);border-radius:8px;padding:5px 14px;font-size:12px;font-weight:600;transition:transform .2s" onmouseover="this.style.transform='scale(1.04)'" onmouseout="this.style.transform='scale(1)'">Sign Out</button>
      </div>
    </div>
    <div style="display:flex;flex:1;min-height:0">
      <div style="width:240px;flex-shrink:0;background:var(--grad-sidebar);border-right:1px solid rgba(255,255,255,.06);padding:20px 0;overflow-y:auto">
        <p style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);padding:0 18px 10px">Navigation</p>
        <button data-nav="overview" style="width:100%;text-align:left;background:${tab==="overview"?"rgba(74,124,142,.2)":"none"};border:none;border-left:3px solid ${tab==="overview"?"var(--steel)":"transparent"};padding:11px 18px;cursor:pointer;transition:all .15s" onmouseover="this.style.background='rgba(255,255,255,.05)'" onmouseout="this.style.background='${tab==="overview"?"rgba(74,124,142,.2)":"none"}'">
          <p style="font-weight:600;font-size:13px;color:rgba(255,255,255,.7)">📊 Dashboard</p>
        </button>
        ${isSuperAdmin?`<button data-nav="team" style="width:100%;text-align:left;background:${tab==="team"?"rgba(74,124,142,.2)":"none"};border:none;border-left:3px solid ${tab==="team"?"var(--steel)":"transparent"};padding:11px 18px;cursor:pointer;transition:all .15s" onmouseover="this.style.background='rgba(255,255,255,.05)'" onmouseout="this.style.background='${tab==="team"?"rgba(74,124,142,.2)":"none"}'">
          <p style="font-weight:600;font-size:13px;color:rgba(255,255,255,.7)">👥 Team Management</p>
        </button>`:""}
        <div style="height:1px;background:rgba(255,255,255,.06);margin:8px 0"></div>
        <p style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);padding:0 18px 10px">Clients (${allClients.length})</p>
        ${allClients.map(c=>{const sc=STATUS_COLORS[c.status||"Pending"]||{dot:"#aaa"};
        return`<button class="sidebar-btn" data-cid="${c.id}" style="width:100%;text-align:left;background:${c.id===activeId&&tab!=="overview"&&tab!=="team"?"rgba(74,124,142,.2)":"none"};border:none;border-left:3px solid ${c.id===activeId&&tab!=="overview"&&tab!=="team"?"var(--steel)":"transparent"};padding:11px 18px;cursor:pointer;transition:all .15s">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:7px;height:7px;border-radius:50%;background:${sc.dot};flex-shrink:0"></div>
            <div><p style="font-weight:600;font-size:13px;color:${c.id===activeId&&tab!=="overview"&&tab!=="team"?"#fff":"rgba(255,255,255,.6)"}">${c.name}</p><p style="font-size:11px;color:rgba(255,255,255,.28);margin-top:1px">${c.status||"Pending"}</p></div>
          </div>
        </button>`;}).join("")}
        <div style="margin:16px 14px 0;padding:14px;background:rgba(74,124,142,.15);border-radius:12px;border:1px solid rgba(74,124,142,.25)">
          <p style="font-size:10px;color:rgba(255,255,255,.35);font-weight:800;letter-spacing:.08em;margin-bottom:6px">INVITE CODE</p>
          <p style="font-size:20px;font-weight:900;color:#fff;letter-spacing:3px">${INVITE}</p>
          <p style="font-size:10px;color:rgba(255,255,255,.3);margin-top:4px">Share with new clients</p>
        </div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:28px">
        ${client&&tab!=="overview"&&tab!=="team"?`
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:24px">
            ${avatarEl(client.name,client.photo_url||"",46)}
            <div>
              <h2 style="font-weight:900;font-size:21px;color:#fff;letter-spacing:-.5px">${client.name}</h2>
              <p style="font-size:13px;color:rgba(255,255,255,.4);margin-top:2px">${client.email}${client.phone?` · ${client.phone}`:""}</p>
            </div>
            <div style="margin-left:auto">${badgeEl(f.status)}</div>
          </div>
          <div style="display:flex;gap:0;margin-bottom:22px;border-bottom:1px solid rgba(255,255,255,.07);overflow-x:auto">
            ${adminTabs.map(t=>`<button data-atab="${t.id}" style="background:none;border:none;border-bottom:${t.id===tab?"2px solid var(--steel)":"2px solid transparent"};color:${t.id===tab?"#fff":"rgba(255,255,255,.35)"};font-weight:${t.id===tab?700:400};font-size:13px;padding:8px 16px;cursor:pointer;white-space:nowrap;transition:all .2s" onmouseover="this.style.color='rgba(255,255,255,.7)'" onmouseout="this.style.color='${t.id===tab?"#fff":"rgba(255,255,255,.35)"}'"">${t.label}</button>`).join("")}
          </div>`:""}
        ${mainContent}
      </div>
    </div>
  </div>`);

  on("#admin-signout","click",()=>{SESSION=null;renderLogin();});
  on("#theme-btn","click",()=>toggleTheme(()=>renderAdmin(activeId,tab)));

  qsa("[data-nav]").forEach(btn=>btn.addEventListener("click",()=>{
    if(btn.dataset.nav==="team")renderAdmin(null,"team");
    else renderAdmin(null,"overview");
  }));

  qsa(".sidebar-btn[data-cid]").forEach(btn=>btn.addEventListener("click",()=>renderAdmin(btn.dataset.cid,"client")));
  qsa("[data-atab]").forEach(btn=>btn.addEventListener("click",()=>renderAdmin(activeId,btn.dataset.atab)));
  qsa(".client-row[data-cid]").forEach(row=>row.addEventListener("click",()=>renderAdmin(row.dataset.cid,"client")));

  on("#save-file","click",async()=>{
    const address=qs("#f-address")?.value||"";const closing_date=qs("#f-closing")?.value||"";
    const status=qs("#f-status")?.value||"Pending";const milestone=parseInt(qs("#f-milestone")?.value||0);
    const coordinator=qs("#f-coord")?.value||"Danielle McCarter";
    await sb.from("files").update({address,closing_date,status,milestone,coordinator}).eq("client_id",activeId);
    const msg=qs("#save-msg");if(msg){msg.style.display="block";setTimeout(()=>msg.style.display="none",2000);}
  });

  on("#reset-pw","click",async()=>{
    const pw=qs("#new-pw")?.value.trim();const msg=qs("#pw-reset-msg");
    if(!pw){if(msg){msg.style.display="block";msg.style.color="#f08080";msg.textContent="Please enter a new password.";}return;}
    await sb.from("clients").update({password:pw}).eq("id",activeId);
    if(msg){msg.style.display="block";msg.style.color="#0fa374";msg.textContent="✓ Password reset!";}
    if(qs("#new-pw"))qs("#new-pw").value="";
  });

  on("#add-task","click",async()=>{const text=qs("#task-input")?.value.trim();if(!text)return;await sb.from("tasks").insert({client_id:activeId,text,done:false});await renderAdmin(activeId,"tasks");});
  on("#task-input","keydown",async e=>{if(e.key==="Enter"){const text=e.target.value.trim();if(!text)return;await sb.from("tasks").insert({client_id:activeId,text,done:false});await renderAdmin(activeId,"tasks");}});
  qsa(".del-task").forEach(btn=>btn.addEventListener("click",async()=>{await sb.from("tasks").delete().eq("id",btn.dataset.tid);await renderAdmin(activeId,"tasks");}));

  on("#add-date","click",async()=>{const label=qs("#date-label")?.value.trim();const date=qs("#date-val")?.value;if(!label||!date)return;await sb.from("key_dates").insert({client_id:activeId,label,date});await renderAdmin(activeId,"dates");});
  qsa(".del-date").forEach(btn=>btn.addEventListener("click",async()=>{await sb.from("key_dates").delete().eq("id",btn.dataset.did);await renderAdmin(activeId,"dates");}));

  on("#add-contact","click",async()=>{const role=qs("#c-role")?.value.trim();const name=qs("#c-name")?.value.trim();const phone=qs("#c-phone")?.value.trim();const email=qs("#c-email")?.value.trim();if(!role||!name)return;await sb.from("contacts").insert({client_id:activeId,role,name,phone,email});await renderAdmin(activeId,"contacts");});
  qsa(".del-contact").forEach(btn=>btn.addEventListener("click",async()=>{await sb.from("contacts").delete().eq("id",btn.dataset.coid);await renderAdmin(activeId,"contacts");}));

  on("#add-doc","click",async()=>{const name=qs("#doc-name")?.value.trim();const url=qs("#doc-url")?.value.trim();const category=qs("#doc-cat")?.value.trim()||"General";if(!name||!url)return;await sb.from("documents").insert({client_id:activeId,name,url,category,date:new Date().toISOString().slice(0,10)});await renderAdmin(activeId,"documents");});
  qsa(".del-doc").forEach(btn=>btn.addEventListener("click",async()=>{await sb.from("documents").delete().eq("id",btn.dataset.docid);await renderAdmin(activeId,"documents");}));

  on("#admin-send","click",async()=>{const input=qs("#admin-msg");const text=input?.value.trim();if(!text)return;await sb.from("messages").insert({client_id:activeId,from_name:"CloseFlow TC",text,date:new Date().toISOString().slice(0,10),is_admin:true});input.value="";await renderAdmin(activeId,"messages");});
  on("#admin-msg","keydown",async e=>{if(e.key!=="Enter")return;const text=e.target.value.trim();if(!text)return;await sb.from("messages").insert({client_id:activeId,from_name:"CloseFlow TC",text,date:new Date().toISOString().slice(0,10),is_admin:true});e.target.value="";await renderAdmin(activeId,"messages");});
  const ml=qs("#admin-msg-list");if(ml)ml.scrollTop=ml.scrollHeight;

  // Team management
  on("#add-admin","click",async()=>{
    const name=qs("#new-admin-name")?.value.trim();const email=qs("#new-admin-email")?.value.trim();
    const pass=qs("#new-admin-pass")?.value;const role=qs("#new-admin-role")?.value||"admin";
    const msg=qs("#team-msg");
    if(!name||!email||!pass){if(msg){msg.style.display="block";msg.style.background="rgba(255,80,80,.15)";msg.style.color="#f08080";msg.textContent="Please fill in all fields.";}return;}
    const{data:exists}=await sb.from("admins").select("id").eq("email",email).single();
    if(exists){if(msg){msg.style.display="block";msg.style.background="rgba(255,80,80,.15)";msg.style.color="#f08080";msg.textContent="An admin with this email already exists.";}return;}
    const{error}=await sb.from("admins").insert({name,email,password:pass,role});
    if(error){if(msg){msg.style.display="block";msg.style.background="rgba(255,80,80,.15)";msg.style.color="#f08080";msg.textContent="Something went wrong. Please try again.";}return;}
    await renderAdmin(null,"team");
  });

  qsa(".role-select").forEach(sel=>{
    sel.addEventListener("change",async()=>{
      await sb.from("admins").update({role:sel.value}).eq("id",sel.dataset.aid);
      await renderAdmin(null,"team");
    });
  });

  qsa(".del-admin").forEach(btn=>{
    btn.addEventListener("click",async()=>{
      if(!confirm("Are you sure you want to remove this team member?"))return;
      await sb.from("admins").delete().eq("id",btn.dataset.aid);
      await renderAdmin(null,"team");
    });
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderLogin();
</script>
</body>
</html>
