<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CloseFlow TC | Client Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',system-ui,-apple-system,sans-serif}
:root{
  --sidebar-bg:#EEF2F7;--sidebar-active:#2D3748;--main-bg:#F7F9FC;--white:#FFFFFF;
  --teal:#3A9DB5;--teal-dark:#2A7A8E;--teal-light:#B8D4DC;--teal-mist:#EBF5F8;
  --ink:#1C2B32;--muted:#718096;--border:#E2E8F0;
  --shadow:0 2px 12px rgba(0,0,0,.07);--shadow-hover:0 8px 28px rgba(58,157,181,.18);
  --success:#38A169;--warning:#D69E2E;--danger:#E53E3E;
}
body{background:var(--main-bg);min-height:100vh;color:var(--ink);overflow-x:hidden;max-width:100vw}
a{color:var(--teal);text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

.portal-wrap{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:var(--sidebar-bg);display:flex;flex-direction:column;padding:20px 0;border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;overflow-y:auto}
.main-area{margin-left:220px;flex:1;min-height:100vh;background:var(--main-bg)}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05);gap:16px}
.content{padding:28px}

.sidebar-logo{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar-logo img{height:32px;width:auto}
.sidebar-logo-text{font-size:13px;font-weight:800;color:var(--ink);letter-spacing:.04em;text-transform:uppercase;margin-top:6px}
.sidebar-logo-sub{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.nav-section{padding:0 12px;margin-bottom:8px}
.nav-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--white);color:var(--ink);box-shadow:var(--shadow)}
.nav-item.active{background:var(--sidebar-active);color:#fff;font-weight:700;box-shadow:0 4px 12px rgba(45,55,72,.25)}
.nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sidebar-bottom{margin-top:auto;padding:12px;border-top:1px solid var(--border)}

/* Property Selector */
.property-selector{display:flex;align-items:center;gap:8px;background:var(--main-bg);border:1.5px solid var(--border);border-radius:10px;padding:6px 12px;cursor:pointer;transition:all .2s;min-width:0;flex:1;max-width:340px}
.property-selector:hover{border-color:var(--teal);box-shadow:0 0 0 3px rgba(58,157,181,.08)}
.property-selector select{border:none;outline:none;background:transparent;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;width:100%;min-width:0}

.card{background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.card-pad{padding:20px 22px}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:18px 20px;box-shadow:var(--shadow);transition:all .2s}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover)}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px}
.stat-val{font-size:26px;font-weight:800;color:var(--ink);line-height:1}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.stat-arrow{display:flex;align-items:center;gap:4px;margin-top:10px;font-size:12px;font-weight:600;color:var(--teal);cursor:pointer}

.badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700}
.badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.btn{border:none;border-radius:10px;padding:10px 20px;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--sidebar-active);color:#fff;box-shadow:0 3px 10px rgba(45,55,72,.25)}
.btn-primary:hover{background:#1a2535;transform:translateY(-1px)}
.btn-teal{background:var(--teal);color:#fff;box-shadow:0 3px 10px rgba(58,157,181,.3)}
.btn-teal:hover{background:var(--teal-dark);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--teal);border:1.5px solid var(--teal)}
.btn-ghost:hover{background:var(--teal-mist)}
.btn-danger{background:#FFF5F5;color:var(--danger);border:1px solid #FED7D7}
.btn-danger:hover{background:#FED7D7}
.btn-sm{padding:6px 14px;font-size:12px}

.finput{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;outline:none;background:var(--white);color:var(--ink);transition:border-color .2s;box-sizing:border-box}
.finput:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(58,157,181,.1)}
.finput::placeholder{color:#A0AEC0}
.input-group{margin-bottom:16px}
.input-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block}

.task-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;background:var(--white);transition:all .2s}
.task-item:hover{border-color:var(--teal-light);transform:translateX(3px)}
.task-check{width:22px;height:22px;border-radius:7px;border:2px solid var(--teal-light);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.task-check:hover{border-color:var(--teal)}
.task-check.done{background:var(--teal);border-color:var(--teal)}

.milestone-step{display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:12px;margin-bottom:4px;transition:all .2s}
.milestone-step:hover{background:var(--teal-mist);transform:translateX(4px)}
.ms-circle{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px}

.date-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:10px;margin-bottom:8px;border:1px solid transparent;transition:all .2s}
.date-item:hover{transform:translateX(3px)}
.date-upcoming{background:#EBF8FF;border-color:#BEE3F8}
.date-overdue{background:#FFF5F5;border-color:#FED7D7}
.date-complete{background:#F0FFF4;border-color:#C6F6D5}

.msg-bubble{border-radius:14px;padding:10px 14px;max-width:75%;font-size:14px;line-height:1.6}
.msg-in{background:var(--teal-mist);color:var(--ink);border-bottom-left-radius:4px}
.msg-out{background:var(--sidebar-active);color:#fff;border-bottom-right-radius:4px}

.contact-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .2s;margin-bottom:10px}
.contact-card:hover{border-color:var(--teal-light);box-shadow:var(--shadow-hover);transform:translateY(-2px)}

.prog-bar{background:var(--border);border-radius:50px;height:8px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal-light),var(--teal));border-radius:50px;transition:width .8s cubic-bezier(.4,0,.2,1)}

.avatar{border-radius:50%;background:linear-gradient(135deg,var(--teal-light),var(--teal));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex-shrink:0;overflow:hidden;transition:transform .2s}
.avatar:hover{transform:scale(1.08)}
.avatar img{width:100%;height:100%;object-fit:cover}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;animation:fadeIn .25s cubic-bezier(.4,0,.2,1)}
.modal-box{background:var(--white);border-radius:20px;border:1px solid var(--border);box-shadow:0 24px 64px rgba(0,0,0,.18);max-width:520px;width:100%;padding:36px;animation:slideUp .35s cubic-bezier(.34,1.56,.64,1)}

.tour-highlight{position:fixed;border-radius:12px;box-shadow:0 0 0 4px var(--teal),0 0 0 9999px rgba(0,0,0,.5);transition:all .4s;z-index:2001;pointer-events:none}
.tour-tooltip{position:fixed;background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,.15);padding:20px 24px;max-width:300px;z-index:2002;animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}

.auth-left{flex:0 0 44%;background:linear-gradient(135deg,#1C2B32 0%,#2D4A5A 50%,#3A9DB5 100%);display:flex;flex-direction:column;justify-content:space-between;padding:48px 52px;position:relative;overflow:hidden}
.auth-right{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 32px;background:var(--main-bg)}
.auth-tab{flex:1;padding:10px 0;font-weight:700;font-size:12px;border:none;letter-spacing:.05em;text-transform:uppercase;transition:all .2s;cursor:pointer}

.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}

/* Admin */
.admin-wrap{display:flex;min-height:100vh;background:var(--main-bg)}
.admin-sidebar{width:240px;flex-shrink:0;background:linear-gradient(180deg,#1C2B32 0%,#2D4A5A 100%);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(28,43,50,.2)}
.admin-main{flex:1;background:var(--main-bg);padding:28px 32px}
.admin-topbar{height:64px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.admin-nav-label{font-size:9px;font-weight:800;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.12em;padding:6px 8px 6px;display:block}
.admin-nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;font-size:13px;font-weight:500;color:rgba(255,255,255,.55);cursor:pointer;transition:all .2s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;letter-spacing:.01em}
.admin-nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.admin-nav-item.active{background:rgba(58,157,181,.18);color:#fff;font-weight:700;border-left:3px solid var(--teal);padding-left:9px;box-shadow:inset 0 0 0 1px rgba(58,157,181,.15)}
.admin-card{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:22px 24px;box-shadow:var(--shadow);margin-bottom:20px;transition:box-shadow .2s}
.admin-stat{background:var(--white);border-radius:14px;padding:18px 20px;border:1px solid var(--border);transition:all .2s;box-shadow:var(--shadow)}
.admin-stat:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover)}
.admin-row{display:flex;align-items:center;gap:14px;padding:11px 14px;border-radius:10px;margin-bottom:6px;background:var(--main-bg);border:1px solid var(--border);transition:all .2s;cursor:pointer}
.admin-row:hover{background:var(--teal-mist);border-color:var(--teal-light);transform:translateX(3px);box-shadow:0 2px 8px rgba(58,157,181,.1)}
.dark-input{padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;outline:none;background:var(--white);color:var(--ink);width:100%;box-sizing:border-box;font-family:inherit;transition:all .2s}
.dark-input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(58,157,181,.1);background:var(--white)}
.dark-input::placeholder{color:#A0AEC0}
.admin-tab-bar{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
.admin-tab{background:var(--white);border:1.5px solid var(--border);border-radius:20px;color:var(--muted);font-weight:600;font-size:12px;padding:7px 18px;cursor:pointer;white-space:nowrap;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.admin-tab:hover{border-color:var(--teal);color:var(--teal)}
.admin-tab.active{background:var(--sidebar-active);border-color:var(--sidebar-active);color:#fff;font-weight:700;box-shadow:0 3px 10px rgba(45,55,72,.25)}
.admin-label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:block}

.welcome-banner{background:linear-gradient(135deg,#1C2B32 0%,#2D4A5A 60%,#3A9DB5 100%);border-radius:20px;padding:24px 28px;color:#fff;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}

/* Key dates timeline */
.kd-timeline{display:flex;align-items:center;gap:0;margin:20px 0;overflow-x:auto;padding-bottom:8px}
.kd-node{display:flex;flex-direction:column;align-items:center;flex:1;min-width:80px}
.kd-dot{width:14px;height:14px;border-radius:50%;border:3px solid var(--border);background:var(--white);z-index:1;transition:all .2s;flex-shrink:0}
.kd-dot.done{background:var(--teal);border-color:var(--teal)}
.kd-dot.current{background:var(--sidebar-active);border-color:var(--sidebar-active);box-shadow:0 0 0 4px rgba(45,55,72,.15)}
.kd-line{flex:1;height:3px;background:var(--border);margin-top:-8px}
.kd-line.done{background:var(--teal)}

/* ── BUTTON SPINNER ── */
.btn-spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0;display:inline-block}
.btn-spinner-dark{width:14px;height:14px;border:2px solid rgba(58,157,181,.3);border-top-color:var(--teal);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0;display:inline-block}

/* ── SERVICE INCIDENT BANNER ── */
.incident-banner{display:none;background:linear-gradient(135deg,#742A2A,#C53030);color:#fff;padding:12px 24px;font-size:13px;font-weight:600;letter-spacing:.02em;text-align:center;position:relative;z-index:200;animation:slideDown .3s ease}
.incident-banner.active{display:flex;align-items:center;justify-content:center;gap:10px}
.incident-banner.restored{background:linear-gradient(135deg,#276749,#38A169)}

/* ── SMOOTH TRANSITIONS ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes slideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideDown{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes popIn{0%{transform:scale(.88);opacity:0}65%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.pulse{animation:pulse 2s ease-in-out infinite}
.fade-in{animation:fadeIn .35s cubic-bezier(.4,0,.2,1)}

#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1C2B32,#3A9DB5);color:#fff;flex-direction:column;gap:12px;font-size:15px;font-weight:600;letter-spacing:.05em}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}

/* ── MOBILE RESPONSIVENESS ── */
@media(max-width:768px){
  /* Client sidebar becomes a slide-in drawer (matches admin) */
  .sidebar{position:fixed!important;top:0;left:0;width:82%!important;max-width:300px!important;height:100vh!important;z-index:1200;flex-direction:column!important;transform:translateX(-105%);transition:transform .28s ease;box-shadow:4px 0 24px rgba(0,0,0,.3);border-right:1px solid var(--border)}
  .sidebar.mobile-open{transform:translateX(0)}
  .client-hamburger{display:flex!important}
  .main-area{margin-left:0;width:100%!important;max-width:100vw!important;min-width:0!important}
  .portal-wrap{flex-direction:column}
  #client-sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1100;display:none}
  /* Keep the profile dropdown fully on-screen on mobile (fixed to viewport top-right) */
  .user-dropdown{position:fixed!important;top:110px!important;right:10px!important;left:auto!important;min-width:180px!important;width:auto!important;max-width:calc(100vw - 20px)!important;box-shadow:0 12px 32px rgba(0,0,0,.22)!important}
  /* Topbar */
  .topbar{padding:10px 14px!important;height:auto;flex-wrap:wrap;gap:8px;width:100%!important;box-sizing:border-box!important}
  /* Property selector takes a full row on mobile so the bar never overflows */
  .topbar > div[style*="max-width:360px"]{max-width:none!important;flex:1 1 100%!important;margin:0!important}
  /* Content padding */
  .content{padding:14px;max-width:100vw;box-sizing:border-box;overflow-x:hidden}
  /* The timeline's flex scroll-row must be allowed to shrink so overflow-x:auto
     actually scrolls instead of widening the page (root cause of the Overview top-bar gap) */
  .content .card{min-width:0;max-width:100%;box-sizing:border-box}
  .content .card > div[style*="overflow-x:auto"]{min-width:0!important;width:100%!important}
  /* Cards */
  .card-pad{padding:14px 16px}
  /* Admin layout */
  .admin-topbar{padding:10px 14px!important;flex-wrap:wrap;gap:8px;height:auto!important;position:relative!important}
  /* Admin shell: content full width; sidebar becomes a slide-in drawer */
  .admin-wrap{flex-direction:column!important}
  .admin-hamburger{display:flex!important}
  .admin-sidebar{position:fixed!important;top:0;left:0;width:82%!important;max-width:300px!important;height:100vh!important;z-index:1200;transform:translateX(-105%);transition:transform .28s ease;box-shadow:4px 0 24px rgba(0,0,0,.3)}
  .admin-sidebar.mobile-open{transform:translateX(0)}
  .admin-main-wrap{margin-left:0!important}
  .admin-main{padding:16px 14px!important}
  #admin-sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1100;display:none}
  /* Stat cards */
  .stat-grid{grid-template-columns:1fr 1fr!important}
  /* Tables */
  .admin-row{flex-wrap:wrap;gap:8px}
  /* Auth pages */
  .auth-left{display:none}
  .auth-right{padding:24px 20px!important}
  /* Bulk toolbar */
  .bulk-toolbar{width:calc(100% - 32px);max-width:none;flex-wrap:wrap;justify-content:center;bottom:12px}
  /* Modals */
  .modal-overlay>div,div[style*="max-width:480px"],div[style*="max-width:420px"]{max-width:100%!important;margin:0 10px}
  /* Property selector */
  .property-selector{max-width:100%}
}
@media(max-width:480px){
  .stat-grid{grid-template-columns:1fr!important}
  .admin-row .btn{font-size:11px;padding:4px 8px}
  h1{font-size:16px!important}
}

/* ── RESPONSIVE LAYOUT LAYER (collapses inline grids that caused horizontal scroll) ── */
/* iPad / small laptop: ease the densest grids down */
@media(max-width:1024px){
  /* Admin 6-up stat cards → 3 across */
  div[style*="grid-template-columns:repeat(6,1fr)"]{grid-template-columns:repeat(3,1fr)!important}
  /* Client dashboard 3-column → 2 column (main + side) */
  div[style*="grid-template-columns:200px 1fr 220px"]{grid-template-columns:1fr 1fr!important}
}
@media(max-width:768px){
  /* Client dashboard 3-column → single stacked column */
  div[style*="grid-template-columns:200px 1fr 220px"]{grid-template-columns:1fr!important}
  /* Admin 6-up stat cards → 2 across */
  div[style*="grid-template-columns:repeat(6,1fr)"]{grid-template-columns:repeat(2,1fr)!important}
  /* Any 4-up row (deals-by-status, reports) → 2 across */
  div[style*="grid-template-columns:repeat(4,1fr)"]{grid-template-columns:repeat(2,1fr)!important}
  /* Any 3-up row (bottom dashboard panels) → single column */
  div[style*="grid-template-columns:1fr 1fr 1fr"]{grid-template-columns:1fr!important}
  /* Two-up form/field rows → single column */
  div[style*="grid-template-columns:1fr 1fr"]:not([style*="200px"]){grid-template-columns:1fr!important}
  /* Calendar: let it scroll horizontally instead of forcing page width */
  div[style*="min-width:640px"]{min-width:0!important}
  /* Clients card grid: comfortable single/double */
  div[style*="minmax(300px,1fr)"]{grid-template-columns:1fr!important}
  /* Admin topbar search shouldn't force width */
  div[style*="min-width:220px"]{min-width:0!important;width:100%}
  /* Tighten card padding a touch more */
  .admin-card{padding:16px 16px!important}
}
@media(max-width:480px){
  /* Phones: stat cards single file so numbers never clip */
  div[style*="grid-template-columns:repeat(6,1fr)"]{grid-template-columns:repeat(2,1fr)!important}

async function validateInviteCode(code,email=""){
  // Only unique codes from the database are accepted — no global fallback
  const{data:uc}=await sb.from("invite_codes").select("*").eq("code",code.toUpperCase()).single();
  if(!uc)return{valid:false,reason:"Invalid invite code. Contact your coordinator."};
  if(uc.used)return{valid:false,reason:"This invite code has already been used. Contact your coordinator for a new one."};
  // If code has an assigned email, it must match the registering email
  const assignedEmail=uc.assigned_email||uc.assigned_to||"";
  if(assignedEmail&&email&&assignedEmail.toLowerCase()!==email.toLowerCase()){
    return{valid:false,reason:"This invite code was issued to a different email address."};
  }
  return{valid:true,id:uc.id,type:"unique",assignedTo:assignedEmail};
}

  await sb.from("invite_codes").update({used:true}).eq("id",id);

// Sort files so double-close legs sit next to each other (A/B then B/C, grouped by address)
function sortFilesGrouped(arr){
  const list=(arr||[]).slice();
  const baseAddr=a=>String(a.address||"").replace(/\s*[—-]\s*(A\/B|B\/C|Buy|Sell).*$/i,"").trim().toLowerCase();
  return list.sort((a,b)=>{
    const ka=baseAddr(a),kb=baseAddr(b);
    if(ka!==kb)return ka<kb?-1:1;
    // same property: A/B leg comes before B/C leg, standard last
    const rank=x=>x.leg_side==="ab"?0:x.leg_side==="bc"?1:2;
    return rank(a)-rank(b);
  });
}

}

function saveSession(){
  if(SESSION){
    try{localStorage.setItem("cftc_session",JSON.stringify(SESSION));
        if(ACTIVE_FILE_ID)localStorage.setItem("cftc_active_file",ACTIVE_FILE_ID);
        else localStorage.removeItem("cftc_active_file");
    }catch(e){}
  }else{
    localStorage.removeItem("cftc_session");
    localStorage.removeItem("cftc_active_file");
  }
}

async function loadSession(){
  try{
    const raw=localStorage.getItem("cftc_session");
    if(!raw)return false;
    const sess=JSON.parse(raw);
    if(!sess||!sess.role)return false;
    // Re-verify user still exists and isn't deleted
    if(sess.role==="admin"&&sess.admin?.id){
      const{data}=await sb.from("admins").select("*").eq("id",sess.admin.id).single();
      if(!data)return false;
      SESSION={role:"admin",admin:data};
      return true;
    }
    if(sess.role==="client"&&sess.client?.id){
      const{data}=await sb.from("clients").select("*").eq("id",sess.client.id).is("deleted_at",null).single();
      if(!data)return false;
      SESSION={role:"client",client:data};
      ACTIVE_FILE_ID=localStorage.getItem("cftc_active_file")||null;
      return true;
    }
  }catch(e){}
  return false;
}

function clearSession(){
  SESSION=null;
  ACTIVE_FILE_ID=null;
  localStorage.removeItem("cftc_session");
  localStorage.removeItem("cftc_active_file");
}

function renderTourOverlay(step,total,renderFn){
  document.getElementById("tour-overlay")?.remove();
  document.getElementById("tour-tooltip")?.remove();
  const s=TOUR_STEPS[step];

  // Spotlight the highlighted nav button
  const navBtns=document.querySelectorAll(".client-nav-btn");
  const activeBtn=s.targetSel?document.querySelector(s.targetSel):Array.from(navBtns).find(b=>b.dataset.tab===s.tab);

  // Backdrop container (no dim of its own — dimming is done by 4 rects so the highlighted item shows through clean)
  const backdrop=document.createElement("div");
  backdrop.id="tour-overlay";
  backdrop.style.cssText="position:fixed;inset:0;z-index:2000;pointer-events:none";

  const DIM="rgba(0,0,0,.5)";
  const isMobile=window.innerWidth<=768;

  if(activeBtn&&!isMobile){
    const r=activeBtn.getBoundingClientRect();
    const pad=6;
    const top=r.top-pad, left=r.left-pad, w=r.width+pad*2, h=r.height+pad*2;
    // Four dim panels around the highlighted item — a true cutout, single 50% layer everywhere
    const mk=(css)=>{const d=document.createElement("div");d.style.cssText=`position:fixed;background:${DIM};z-index:2000;pointer-events:auto;${css}`;return d;};
    backdrop.appendChild(mk(`top:0;left:0;right:0;height:${Math.max(0,top)}px`));                       // above
    backdrop.appendChild(mk(`top:${top+h}px;left:0;right:0;bottom:0`));                                   // below
    backdrop.appendChild(mk(`top:${top}px;left:0;width:${Math.max(0,left)}px;height:${h}px`));            // left
    backdrop.appendChild(mk(`top:${top}px;left:${left+w}px;right:0;height:${h}px`));                      // right
    // Teal ring around the highlighted item (no big shadow — the rects do the dimming)
    const ring=document.createElement("div");
    ring.style.cssText=`position:fixed;top:${top}px;left:${left}px;width:${w}px;height:${h}px;border-radius:12px;box-shadow:0 0 0 3px var(--teal);pointer-events:none;z-index:2001`;
    backdrop.appendChild(ring);
  }else{
    // Mobile (or no target): single full dim, tooltip centered
    const full=document.createElement("div");
    full.style.cssText=`position:fixed;inset:0;background:${DIM};z-index:2000;pointer-events:auto`;
    backdrop.appendChild(full);
  }
  document.body.appendChild(backdrop);

  // Tooltip card — positioned after measuring its real height (no hardcoded guess)
  const tooltip=document.createElement("div");
  tooltip.id="tour-tooltip";
  tooltip.style.cssText=`position:fixed;z-index:2002;pointer-events:all;width:100%;max-width:420px;padding:0 16px;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);visibility:hidden`;
  tooltip.innerHTML=`
  <div style="background:var(--white);border-radius:24px;border:1px solid var(--border);box-shadow:0 24px 64px rgba(0,0,0,.3);overflow:hidden auto;max-height:calc(100vh - 32px)">
    <!-- Header -->
    <div style="background:linear-gradient(135deg,#1C2B32,#2D4A5A,#3A9DB5);padding:22px 24px 18px;display:flex;align-items:center;gap:14px">
      <div style="width:50px;height:50px;border-radius:14px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">${s.icon}</div>
      <div style="flex:1">
        <p style="font-size:10px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Step ${step+1} of ${total}</p>
        <h3 style="font-size:19px;font-weight:900;color:#fff;line-height:1.2">${s.title}</h3>
      </div>
      <button id="end-tour" style="background:rgba(255,255,255,.12);border:none;color:#fff;width:34px;height:34px;border-radius:8px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;transition:background .2s" onmouseover="this.style.background='rgba(255,255,255,.2)'" onmouseout="this.style.background='rgba(255,255,255,.12)'">×</button>
    </div>
    <!-- Progress bar -->
    <div style="display:flex;gap:4px;padding:14px 24px 0">
      ${TOUR_STEPS.map((_,i)=>`<div style="height:4px;border-radius:50px;background:${i===step?"var(--teal)":i<step?"var(--teal-light)":"var(--border)"};flex:${i===step?2:1};transition:all .3s"></div>`).join("")}
    </div>
    <!-- Body -->
    <div style="padding:18px 24px 0">
      <p style="font-size:14px;color:var(--ink);line-height:1.8;margin-bottom:16px">${s.body}</p>
      <div style="background:var(--teal-mist);border-left:4px solid var(--teal);border-radius:0 12px 12px 0;padding:14px 16px;margin-bottom:16px">
        <p style="font-size:11px;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px">👉 What to do now</p>
        <p style="font-size:13px;color:var(--ink);line-height:1.7">${s.action}</p>
      </div>
      <div style="background:var(--main-bg);border:1.5px dashed var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:4px">
        <div style="width:36px;height:36px;border-radius:10px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🎬</div>
        <div>
          <p style="font-size:12px;font-weight:700;color:var(--ink);margin-bottom:2px">Walkthrough video coming soon</p>
          <p style="font-size:11px;color:var(--muted)">Your CloseFlow TC coordinator will record a short video guide for this section.</p>
        </div>
      </div>
    </div>
    <!-- Footer -->
    <div style="padding:16px 24px 22px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);margin-top:16px">
      <button id="tour-back" class="btn btn-ghost btn-sm" style="visibility:${step>0?"visible":"hidden"}">← Back</button>
      <p style="font-size:12px;color:var(--muted);font-weight:500">${step+1} of ${total}</p>
      ${step<total-1
        ?`<button id="tour-next" class="btn btn-primary btn-sm">Next Step →</button>`
        :`<button id="tour-done" class="btn btn-teal btn-sm">Finish Tour 🎉</button>`}
    </div>
  </div>`;
  document.body.appendChild(tooltip);

  // Position the tooltip using its REAL measured size (fixes overflow / cut-off at 100% zoom)
  requestAnimationFrame(()=>{
    const tipH=tooltip.offsetHeight;
    const tipW=tooltip.offsetWidth;
    if(activeBtn&&!isMobile){
      const r=activeBtn.getBoundingClientRect();
      if(s.targetSel){
        // Target is a topbar element (e.g. property switcher): place tooltip just BELOW it
        let top=r.bottom+16;
        top=Math.min(top, window.innerHeight-tipH-16);
        let left=r.left+r.width/2-tipW/2;
        left=Math.max(16, Math.min(left, window.innerWidth-tipW-16));
        tooltip.style.top=`${top}px`;
        tooltip.style.left=`${left}px`;
        tooltip.style.transform="none";
      }else{
        const sidebarRight=Math.max(r.right, document.querySelector(".sidebar")?.getBoundingClientRect().right||220);
        // Sit just right of the sidebar, vertically centered on the highlighted item, clamped to viewport
        let top=r.top+r.height/2-tipH/2;
        top=Math.max(16, Math.min(top, window.innerHeight-tipH-16));
        let left=sidebarRight+20;
        // If it would run off the right edge, pull it back
        if(left+tipW>window.innerWidth-16)left=Math.max(16, window.innerWidth-tipW-16);
        tooltip.style.top=`${top}px`;
        tooltip.style.left=`${left}px`;
        tooltip.style.transform="none";
      }
    }else{
      // Centered (mobile or no target)
      tooltip.style.top="50%";
      tooltip.style.left="50%";
      tooltip.style.transform="translate(-50%,-50%)";
    }
    tooltip.style.visibility="visible";
  });

  function cleanUp(){
    document.getElementById("tour-overlay")?.remove();
    document.getElementById("tour-tooltip")?.remove();
  }
  document.getElementById("end-tour")?.addEventListener("click",()=>{TOUR_ACTIVE=false;cleanUp();});
  document.getElementById("tour-next")?.addEventListener("click",()=>{
    TOUR_STEP++;cleanUp();
    renderFn(TOUR_CLIENT_ID,ACTIVE_FILE_ID,TOUR_STEPS[TOUR_STEP].tab,false,true);
  });
  document.getElementById("tour-back")?.addEventListener("click",()=>{
    TOUR_STEP--;cleanUp();
    renderFn(TOUR_CLIENT_ID,ACTIVE_FILE_ID,TOUR_STEPS[TOUR_STEP].tab,false,true);
  });
  document.getElementById("tour-done")?.addEventListener("click",()=>{
    TOUR_ACTIVE=false;cleanUp();
    const c=document.createElement("div");
    c.style.cssText="position:fixed;inset:0;pointer-events:none;z-index:3000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px";
    c.innerHTML=`
      <div style="font-size:80px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)">🎉</div>
      <div style="background:var(--white);border-radius:16px;padding:18px 28px;box-shadow:0 8px 32px rgba(0,0,0,.2);text-align:center;animation:slideUp .4s ease">
        <p style="font-weight:900;font-size:17px;color:var(--ink);margin-bottom:5px">You are all set!</p>
        <p style="font-size:13px;color:var(--muted)">Your CloseFlow TC coordinator is ready when you are.</p>
      </div>`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  });
}

  const isEmoji=photo&&String(photo).startsWith("emoji:");
  const avatarHtml=isEmoji?photo.slice(6):(photo?`<img src="${photo}" alt="${name}"/>`:initials(name));
  const avatarStyle=isEmoji?`width:${size}px;height:${size}px;font-size:${Math.round(size*.52)}px;background:var(--teal-mist)`:`width:${size}px;height:${size}px;font-size:${fs}px`;
  const dropdownId=isAdmin?"admin-user-dropdown":"user-dropdown";
  const settingsClick=isAdmin?"showAdminProfileModal()":"renderClient(SESSION.client.id,ACTIVE_FILE_ID,'account')";
  return`<div class="user-avatar-wrapper">
    <div class="avatar" id="${isAdmin?"header-admin-avatar":"header-user-avatar"}" style="${avatarStyle}" onclick="document.getElementById('${dropdownId}').classList.toggle('active');event.stopPropagation()">${avatarHtml}</div>

      <button class="user-dropdown-item" onclick="${settingsClick}"><span>⚙️</span>Profile Settings</button>
      <button class="user-dropdown-item danger" onclick="confirmSignOut()"><span>🚪</span>Sign Out</button>

  </div>`;
}

        ${a.photo_url?`<button class="btn btn-ghost btn-sm" id="ap-remove-avatar" style="color:var(--danger);font-size:11px;display:inline-flex;margin-left:6px">Remove</button>`:""}
        <p style="font-size:11px;color:var(--muted)">…or pick an emoji:</p>

        </div>

      <div class="input-group"><label class="input-label">Phone</label><input class="finput" id="ap-phone" value="${(a.phone||"").replace(/"/g,"&quot;")}" placeholder="(555) 000-0000"/></div>

    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:12px">
      <button class="btn btn-ghost" id="ap-cancel">Cancel</button>
      <button class="btn btn-primary" id="ap-save">Save Profile</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.remove();});
  let pendingPhoto=a.photo_url||"";
  const refreshPreview=()=>{const p=overlay.querySelector("#ap-avatar-preview");if(p)p.innerHTML=avatarEl(overlay.querySelector("#ap-name")?.value||a.name,pendingPhoto,64);};
  overlay.querySelector("#ap-photo-file").addEventListener("change",e=>{

    reader.readAsDataURL(file);
  });
  overlay.querySelectorAll(".ap-emoji-btn").forEach(btn=>btn.addEventListener("click",()=>{
    pendingPhoto="emoji:"+btn.dataset.emoji;
    overlay.querySelectorAll(".ap-emoji-btn").forEach(b=>{b.style.background="none";b.style.borderColor="var(--border)";});

  }));

  overlay.querySelector("#ap-cancel").addEventListener("click",()=>overlay.remove());
  overlay.querySelector("#ap-save").addEventListener("click",async()=>{
    const name=overlay.querySelector("#ap-name")?.value.trim();

    const email=overlay.querySelector("#ap-email")?.value.trim();
    const msg=overlay.querySelector("#ap-msg");

    SESSION.admin=updated;
    saveSession();
    // Update header avatar in place
    const headerAv=document.getElementById("header-admin-avatar");
    if(headerAv){
      const isEm=updated.photo_url&&String(updated.photo_url).startsWith("emoji:");
      headerAv.innerHTML=isEm?updated.photo_url.slice(6):(updated.photo_url?`<img src="${updated.photo_url}" alt="${updated.name}"/>`:initials(updated.name));
      headerAv.style.fontSize=isEm?"18px":"12px";
      headerAv.style.background=isEm?"var(--teal-mist)":"";
    }
    btnLoad("ap-save",false,"✓ Saved!");
    setTimeout(()=>overlay.remove(),900);
  });
}

  overlay.querySelector("#send-reset-link").addEventListener("click",async()=>{
    const email=overlay.querySelector("#reset-email")?.value.trim().toLowerCase();
    const statusEl=overlay.querySelector("#reset-req-status");
    if(!email||!email.includes("@")){
      statusEl.style.display="block";statusEl.style.background="#FFF5F5";statusEl.style.color="var(--danger)";
      statusEl.textContent="Please enter a valid email address.";return;
    }
    const btn=overlay.querySelector("#send-reset-link");
    btn.textContent="Sending…";btn.disabled=true;
    // Check clients table first, then admins
    let userType=null;
    const{data:clientMatch}=await sb.from("clients").select("id,name").eq("email",email).maybeSingle();
    if(clientMatch)userType="client";
    if(!userType){
      const{data:adminMatch}=await sb.from("admins").select("id,name").eq("email",email).maybeSingle();
      if(adminMatch)userType="admin";
    }
    // Always show success (security best practice — don't reveal if email exists)
    const token=generateToken();
    if(userType){
      // Delete any existing unused tokens for this email
      await sb.from("password_resets").delete().eq("email",email).eq("used",false);
      // Insert new token
      const expiresAt=new Date(Date.now()+3600000).toISOString(); // 1 hour
      await sb.from("password_resets").insert({email,token,user_type:userType,used:false,expires_at:expiresAt});
      // Send reset email
      const resetLink=`${window.location.origin}${window.location.pathname}?reset=${token}`;
      try{
        await emailjs.send(EJS_SERVICE,"template_ajgunbg",{
          to_email:email,
          to_name:email,
          notification_type:"🔑 Password Reset Request",
          details:`We received a request to reset your CloseFlow TC portal password.\n\nClick the link below to set a new password. This link expires in 1 hour.\n\n${resetLink}\n\nIf you didn't request this, you can safely ignore this email.`,
          property_address:"",
          portal_link:resetLink,
          timestamp:new Date().toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit",hour12:true}),
        });
      }catch(e){console.error("Reset email failed:",e);}
    }
    statusEl.style.display="block";statusEl.style.background="#F0FFF4";statusEl.style.color="#276749";
    statusEl.textContent="✅ If that email is in our system, a reset link is on its way. Check your inbox.";
    btn.textContent="Sent!";btn.style.background="var(--success)";
    setTimeout(()=>overlay.remove(),4000);
  });
}

        <div class="input-group"><label class="input-label">Confirm New Password</label><input class="finput" id="new-pw-2" type="password" placeholder="Repeat new password"/></div>

        <button class="btn btn-primary" id="do-pw-reset" style="width:100%;padding:13px;font-size:15px;border-radius:12px;justify-content:center">Set New Password</button>
      `:`<button class="btn btn-primary" id="back-to-login" style="width:100%;padding:13px;font-size:15px;border-radius:12px;justify-content:center">Back to Login</button>`}
    </div>
  </div>`);
  on("#back-to-login","click",()=>{

  });

    if(pw1!==pw2){statusEl.style.display="block";statusEl.style.background="#FFF5F5";statusEl.style.color="var(--danger)";statusEl.textContent="Passwords don't match.";return;}
    btnLoad("do-pw-reset",true,"Saving…");
    // Update password in the correct table
    if(resetRecord.user_type==="client"){

    }else{
      await sb.from("admins").update({password:pw1}).eq("email",resetRecord.email);
    }

    await sb.from("password_resets").update({used:true}).eq("token",token);

      </div>
      <div>
        <label style="display:block;font-size:12px;font-weight:700;color:var(--ink);margin-bottom:6px">Page / Section (optional)</label>
        <input id="report-page" type="text" placeholder="e.g. Deals tab, Registration form…" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px"/>
      </div>
    </div>
    <div id="report-status" style="display:none;margin-top:12px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button id="cancel-report" class="btn btn-ghost">Cancel</button>
      <button id="send-report" class="btn btn-primary">Send Report</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector("#cancel-report").addEventListener("click",()=>overlay.remove());
  overlay.querySelector("#send-report").addEventListener("click",async()=>{
    const type=overlay.querySelector("#report-type")?.value||"bug";
    const description=overlay.querySelector("#report-body")?.value.trim();
    const page=overlay.querySelector("#report-page")?.value.trim()||"";
    const statusEl=overlay.querySelector("#report-status");
    if(!description){
      if(statusEl){statusEl.style.display="block";statusEl.style.background="#FFF5F5";statusEl.style.color="var(--danger)";statusEl.textContent="Please describe the issue before sending.";}
      return;
    }
    const btn=overlay.querySelector("#send-report");
    btn.textContent="Sending…";btn.disabled=true;
    try{
      // 1. Save to reports table — check for error explicitly
      const{data:newReport,error:insertErr}=await sb.from("reports").insert({
        submitted_by:userName||"Client",
        email:userEmail||"",
        type,
        description,
        page,
        status:"new"
      }).select().single();
      if(insertErr){
        console.error("Report insert failed:",insertErr);
        if(statusEl){statusEl.style.display="block";statusEl.style.background="#FFF5F5";statusEl.style.color="var(--danger)";statusEl.textContent=`Could not save report: ${insertErr.message}. Please email info@closeflowtc.com directly.`;}
        btn.textContent="Send Report";btn.disabled=false;
        return;
      }
      // 2. Email the admin team
      const typeLabels={bug:"🐛 Bug Report",feature:"💡 Feature Request",question:"❓ Question",other:"📝 Other"};
      await notifyAdmins(
        userName||"A client",
        `${typeLabels[type]||"Issue Report"} submitted`,
        `From: ${userName||"Unknown"}${userEmail?` (${userEmail})`:""}\nPage: ${page||"Not specified"}\n\n${description}`
      );
      // 3. Create admin bell notification
      await sb.from("notifications").insert({
        client_id:null,
        file_id:null,
        message:`🐞 New ${typeLabels[type]||"Issue"} from ${userName||"a client"}${page?` — ${page}`:""}`,
        type:"issue",
        is_read:false
      });
      if(statusEl){statusEl.style.display="block";statusEl.style.background="#F0FFF4";statusEl.style.color="var(--success)";statusEl.textContent="✅ Report sent! Our team will follow up shortly.";}
      btn.textContent="✓ Sent!";btn.style.background="var(--success)";
      setTimeout(()=>overlay.remove(),2000);
    }catch(err){
      console.error("Report submit failed:",err);
      if(statusEl){statusEl.style.display="block";statusEl.style.background="#FFF5F5";statusEl.style.color="var(--danger)";statusEl.textContent="Something went wrong. Please email info@closeflowtc.com directly.";}
      btn.textContent="Send Report";btn.disabled=false;
    }
  });
}

// Bulk selection system
let bulkSelected=new Set();
function initBulkSelection(itemType="deals"){
  document.addEventListener("click",()=>{
    document.querySelectorAll(".user-dropdown").forEach(d=>d.classList.remove("active"));
  });
  const toolbar=document.getElementById("bulk-toolbar");
  document.querySelectorAll(".bulk-checkbox:not(#select-all-checkbox)").forEach(cb=>{
    cb.addEventListener("change",e=>{
      const id=e.target.dataset.id;
      if(e.target.checked)bulkSelected.add(id);
      else bulkSelected.delete(id);
      updateBulkToolbar(itemType);
    });
  });
  const selectAll=document.getElementById("select-all-checkbox");
  if(selectAll){
    selectAll.addEventListener("change",e=>{
      document.querySelectorAll(".bulk-checkbox:not(#select-all-checkbox)").forEach(cb=>{
        cb.checked=e.target.checked;
        const id=cb.dataset.id;
        if(e.target.checked)bulkSelected.add(id);
        else bulkSelected.delete(id);
      });
      updateBulkToolbar(itemType);
    });
  }
}
function updateBulkToolbar(itemType){
  let toolbar=document.getElementById("bulk-toolbar");
  if(bulkSelected.size>0){
    if(!toolbar){
      toolbar=document.createElement("div");
      toolbar.id="bulk-toolbar";
      toolbar.className="bulk-toolbar";
      document.body.appendChild(toolbar);
    }
    toolbar.innerHTML=`
      <span class="bulk-toolbar-count">${bulkSelected.size} selected</span>
      <button class="btn btn-ghost" style="color:#fff;border-color:rgba(255,255,255,.2)" onclick="clearBulkSelection()">Clear</button>
      ${itemType==="deals"?`<button class="btn" style="background:var(--teal-mist);color:var(--teal-dark);border:1px solid var(--teal-light);font-weight:700" onclick="confirmBulkArchive()">📦 Archive Selected</button>`:""}
      <button class="btn btn-danger" onclick="confirmBulkDelete('${itemType}')">🗑 Delete Selected</button>
    `;
  }else if(toolbar){
    toolbar.remove();
  }
}
function clearBulkSelection(){
  bulkSelected.clear();
  document.querySelectorAll(".bulk-checkbox").forEach(cb=>cb.checked=false);
  updateBulkToolbar();
}

async function confirmBulkDelete(itemType){
  const count=bulkSelected.size;
  const overlay=document.createElement("div");
  overlay.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px";
  overlay.innerHTML=`<div style="background:var(--white);border-radius:20px;padding:32px;max-width:420px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.2);animation:slideUp .3s ease">
    <div style="text-align:center;margin-bottom:20px">
      <div style="width:56px;height:56px;border-radius:50%;background:#FFF5F5;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px">🗑</div>
      <h3 style="font-size:18px;font-weight:800;color:var(--ink);margin-bottom:8px">Delete ${count} ${itemType}?</h3>
      <p style="font-size:13px;color:var(--muted);line-height:1.6">This will permanently delete the selected ${itemType}. This cannot be undone.</p>
    </div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button id="cancel-bulk-delete" class="btn btn-ghost">Cancel</button>
      <button id="confirm-bulk-delete" class="btn btn-danger" style="background:var(--danger);color:#fff">Yes, Delete ${count}</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector("#cancel-bulk-delete").addEventListener("click",()=>overlay.remove());
  overlay.querySelector("#confirm-bulk-delete").addEventListener("click",async()=>{
    const ids=Array.from(bulkSelected);
    if(itemType==="deals"||itemType==="files"){
      // Delete child records first so foreign-key constraints don't block the file delete
      await sb.from("tasks").delete().in("file_id",ids);
      await sb.from("key_dates").delete().in("file_id",ids);
      await sb.from("contacts").delete().in("file_id",ids);
      await sb.from("documents").delete().in("file_id",ids);
      await sb.from("activity_log").delete().in("file_id",ids);
      await sb.from("internal_notes").delete().in("file_id",ids);
      await sb.from("client_requests").delete().in("file_id",ids);
      await sb.from("notifications").delete().in("file_id",ids);
      const{error:delErr}=await sb.from("files").delete().in("id",ids);
      if(delErr){alert("Couldn't delete: "+delErr.message);return;}
    }else if(itemType==="clients"){
      for(const cid of ids){
        const{data:clientFiles}=await sb.from("files").select("id").eq("client_id",cid);
        const fileIds=(clientFiles||[]).map(f=>f.id);
        if(fileIds.length){
          await sb.from("tasks").delete().in("file_id",fileIds);
          await sb.from("key_dates").delete().in("file_id",fileIds);
          await sb.from("contacts").delete().in("file_id",fileIds);
          await sb.from("documents").delete().in("file_id",fileIds);
          await sb.from("activity_log").delete().in("file_id",fileIds);
          await sb.from("internal_notes").delete().in("file_id",fileIds);
          await sb.from("client_requests").delete().in("file_id",fileIds);
          await sb.from("notifications").delete().in("file_id",fileIds);
        }
        await sb.from("files").delete().eq("client_id",cid);
        await sb.from("messages").delete().eq("client_id",cid);
        await sb.from("notifications").delete().eq("client_id",cid);
        await sb.from("feedback").delete().eq("client_id",cid);
        const{error:cErr}=await sb.from("clients").delete().eq("id",cid);
        if(cErr){alert("Couldn't delete client: "+cErr.message);return;}
      }
    }else if(itemType==="documents"){
      await sb.from("documents").delete().in("id",ids);
    }else if(itemType==="tasks"){
      await sb.from("tasks").delete().in("id",ids);
    }
    overlay.remove();
    clearBulkSelection();
    window.location.reload();
  });
}

// ── BUTTON LOADING STATE ──────────────────────────────────────────────────────
function btnLoad(id,loading,loadingText="Saving…",doneText=null){
  const btn=qs(`#${id}`);if(!btn)return;
  if(loading){
    btn.disabled=true;
    btn.dataset.orig=btn.innerHTML;
    const isDark=btn.classList.contains("btn-primary")||btn.classList.contains("btn-teal");
    btn.innerHTML=`<span class="${isDark?"btn-spinner":"btn-spinner-dark"}"></span>${loadingText}`;
    btn.style.opacity=".75";btn.style.transform="none";
  }else{
    btn.disabled=false;
    btn.innerHTML=doneText||btn.dataset.orig||btn.innerHTML;
    btn.style.opacity="1";
    if(doneText){setTimeout(()=>{if(btn.dataset.orig)btn.innerHTML=btn.dataset.orig;},1800);}
  }
}

async function buildCoordDropdown(selectedName,id="f-coord"){
  const{data:admins}=await sb.from("admins").select("name").order("name");
  const names=(admins||[]).map(a=>a.name);

  if(selectedName&&!names.includes(selectedName))names.unshift(selectedName);
  return`<select class="dark-input" id="${id}">${names.map(n=>`<option value="${n}" ${n===selectedName?"selected":""}>${n}</option>`).join("")}</select>`;
}

    <button class="btn btn-primary" id="close-thanks" style="justify-content:center;width:100%">Close</button>
  </div>`;
  document.body.appendChild(el);
  el.querySelector("#close-thanks").addEventListener("click",()=>{el.remove();if(onDone)onDone();});
}

function googleCalLink(label,date,address){
  if(!date)return"#";
  const dt=date.replace(/-/g,"");
  const title=encodeURIComponent(`${label} — ${address||"CloseFlow TC"}`);
  const details=encodeURIComponent("Key closing date via CloseFlow TC portal | closeflowtc.com");
  return`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dt}/${dt}&details=${details}`;
}

      <div id="ob-step-1" class="ob-step">

        <h3 style="font-size:18px;font-weight:800;color:var(--ink);margin-bottom:4px">Your business</h3>

      <div id="ob-step-2" class="ob-step" style="display:none">
        <p style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Step 2 of 4</p>
        <h3 style="font-size:18px;font-weight:800;color:var(--ink);margin-bottom:4px">Your preferences</h3>
        <p style="font-size:13px;color:var(--muted);margin-bottom:20px">So we reach you the right way at the right time.</p>
        <div class="input-group">
          <label class="input-label">Time Zone <span style="color:var(--danger)">*</span></label>
          <select class="finput" id="ob-timezone">
            <option value="">Select your time zone…</option>
            <option>Eastern (ET)</option><option>Central (CT)</option>
            <option>Mountain (MT)</option><option>Pacific (PT)</option>
            <option>Alaska (AKT)</option><option>Hawaii (HT)</option>
          </select>
        </div>
        <div class="input-group">
          <label class="input-label">Preferred Communication <span style="color:var(--danger)">*</span> <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">(select all that apply)</span></label>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            ${["Email","Phone","Text"].map(opt=>`
            <label id="comm-label-${opt.toLowerCase()}" style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;font-size:13px;font-weight:600;color:var(--ink);transition:all .2s;background:var(--white);user-select:none">
              <input type="checkbox" name="ob-comm" value="${opt}" id="ob-comm-${opt.toLowerCase()}" style="accent-color:var(--teal);width:16px;height:16px;cursor:pointer"/>

      <!-- Step 3: Markets -->
      <div id="ob-step-3" class="ob-step" style="display:none">
        <p style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Step 3 of 4</p>
        <h3 style="font-size:18px;font-weight:800;color:var(--ink);margin-bottom:4px">Your markets</h3>
        <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Select all states where you are actively investing.</p>
        <!-- Search filter -->
        <div style="position:relative;margin-bottom:10px">
          <input id="ob-state-search" class="finput" placeholder="🔍  Search states…" style="padding-left:14px"/>
        </div>
        <!-- Selected tags -->
        <div id="ob-selected-states" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:0"></div>
        <!-- State checkboxes -->
        <div id="ob-state-list" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;max-height:220px;overflow-y:auto;padding:4px;border:1.5px solid var(--border);border-radius:10px;background:var(--white)">
          ${US_STATES.map(s=>`
          <label style="display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:var(--ink);transition:background .15s" onmouseover="this.style.background='var(--teal-mist)'" onmouseout="this.style.background='transparent'">
            <input type="checkbox" class="ob-state-cb" value="${s}" style="accent-color:var(--teal);width:14px;height:14px;cursor:pointer;flex-shrink:0"/> ${s}
          </label>`).join("")}
        </div>
        <p id="ob-state-count" style="font-size:11px;color:var(--muted);margin-top:8px">0 states selected</p>
        <p id="ob-state-error" style="display:none;font-size:12px;color:var(--danger);margin-top:6px">Please select at least one state.</p>
      </div>

      <!-- Step 4: Title -->
      <div id="ob-step-4" class="ob-step" style="display:none">
        <p style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Step 4 of 4 (Optional)</p>
        <h3 style="font-size:18px;font-weight:800;color:var(--ink);margin-bottom:4px">Title preferences</h3>
        <p style="font-size:13px;color:var(--muted);margin-bottom:20px">Do you have a preferred title company or attorney we should work with?</p>
        <div class="input-group"><label class="input-label">Preferred Title Company / Attorney</label><input class="finput" id="ob-title" placeholder="Name and state, or leave blank to use ours"/></div>
        <div style="background:#F0FFF4;border:1px solid #C6F6D5;border-radius:10px;padding:12px 14px;font-size:12px;color:#276749;line-height:1.6;margin-bottom:12px">✅ If you leave this blank, CloseFlow TC will coordinate with our vetted title partners on your behalf.</div>
        <button id="ob-skip-step4" class="btn btn-ghost btn-sm" style="width:100%;font-size:13px">⏭ I'll add this later</button>
      </div>

      <!-- Error message -->
      <div id="ob-error" style="display:none;margin-top:12px;padding:10px 14px;background:#FFF5F5;border:1px solid #FED7D7;border-radius:10px;font-size:12px;color:var(--danger)"></div>
    </div>

    <!-- Footer -->
    <div style="padding:16px 32px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-top:1px solid var(--border);margin-top:8px">
      <button id="ob-back" class="btn btn-ghost btn-sm" style="visibility:hidden">← Back</button>
      <button id="ob-next" class="btn btn-primary" style="min-width:140px;justify-content:center">Next →</button>
    </div>
  </div>`;
  document.body.appendChild(el);

  let currentStep=1;
  const totalSteps=4;

  // State search filter
  setTimeout(()=>{
    const searchInput=document.getElementById("ob-state-search");
    const stateList=document.getElementById("ob-state-list");
    if(searchInput&&stateList){
      searchInput.addEventListener("input",()=>{
        const v=searchInput.value.toLowerCase();
        stateList.querySelectorAll("label").forEach(lbl=>{
          lbl.style.display=lbl.textContent.toLowerCase().includes(v)?"flex":"none";
        });
      });
    }
    // State checkboxes — update tags + count
    document.querySelectorAll(".ob-state-cb").forEach(cb=>{
      cb.addEventListener("change",updateStateTags);
    });
    // Comm checkbox labels — highlight on check
    ["email","phone","text"].forEach(opt=>{
      const cb=document.getElementById(`ob-comm-${opt}`);
      const lbl=document.getElementById(`comm-label-${opt}`);
      if(cb&&lbl){
        cb.addEventListener("change",()=>{
          lbl.style.borderColor=cb.checked?"var(--teal)":"var(--border)";
          lbl.style.background=cb.checked?"var(--teal-mist)":"var(--white)";
        });
      }
    });
  },100);

  function updateStateTags(){
    const selected=[...document.querySelectorAll(".ob-state-cb:checked")].map(c=>c.value);
    const tagsEl=document.getElementById("ob-selected-states");
    const countEl=document.getElementById("ob-state-count");
    if(tagsEl)tagsEl.innerHTML=selected.map(s=>`<span style="background:var(--teal-mist);color:var(--teal-dark);border:1px solid var(--teal-light);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">${s}</span>`).join("");
    if(countEl)countEl.textContent=`${selected.length} state${selected.length===1?"":"s"} selected`;
  }

  function getSelectedStates(){
    return[...document.querySelectorAll(".ob-state-cb:checked")].map(c=>c.value);
  }

  function getSelectedComms(){
    return[...document.querySelectorAll("input[name='ob-comm']:checked")].map(c=>c.value);
  }

  function updateProgress(){
    const pct=((currentStep-1)/totalSteps)*100;
    const bar=document.getElementById("ob-progress");
    if(bar)bar.style.width=pct+"%";
    const back=document.getElementById("ob-back");
    if(back)back.style.visibility=currentStep>1?"visible":"hidden";
    const next=document.getElementById("ob-next");
    if(next)next.textContent=currentStep===totalSteps?"Complete Setup ✓":"Next →";
  }

  function showStep(n){
    for(let i=1;i<=totalSteps;i++){
      const s=document.getElementById(`ob-step-${i}`);
      if(s)s.style.display=i===n?"block":"none";
    }
    currentStep=n;
    updateProgress();
    const err=document.getElementById("ob-error");
    if(err)err.style.display="none";
  }

  function validate(){
    const err=document.getElementById("ob-error");
    const showErr=(msg)=>{if(err){err.style.display="block";err.textContent=msg;}};
    if(currentStep===1){
      const biz=document.getElementById("ob-business")?.value.trim();
      if(!biz){showErr("Please enter your business or entity name.");return false;}
    }
    if(currentStep===2){
      const tz=document.getElementById("ob-timezone")?.value;
      const comms=getSelectedComms();
      if(!tz){showErr("Please select your time zone.");return false;}
      if(!comms.length){showErr("Please select at least one communication preference.");return false;}
    }
    if(currentStep===3){
      const states=getSelectedStates();
      if(!states.length){
        const se=document.getElementById("ob-state-error");
        if(se)se.style.display="block";
        showErr("Please select at least one state.");
        return false;
      }
    }
    return true;
  }

  const nextBtn=document.getElementById("ob-next");
  const backBtn=document.getElementById("ob-back");

  nextBtn.addEventListener("click",async()=>{
    if(!validate())return;
    if(currentStep<totalSteps){showStep(currentStep+1);return;}
    // Collect all data
    const business_name=document.getElementById("ob-business")?.value.trim()||"";
    const address=document.getElementById("ob-address")?.value.trim()||"";
    const time_zone=document.getElementById("ob-timezone")?.value||"";
    const comm_preference=getSelectedComms().join(", ");
    const market_radius=getSelectedStates().join(", ");
    const preferred_title=document.getElementById("ob-title")?.value.trim()||"";
    nextBtn.textContent="Saving…";nextBtn.disabled=true;
    await sb.from("clients").update({
      business_name,address,time_zone,comm_preference,
      market_radius,preferred_title,onboarding_complete:true
    }).eq("id",clientId);
    await notifyAdmins(
      SESSION?.client?.name||"New Client",
      "✅ Onboarding Complete",
      `Business: ${business_name} | Markets: ${market_radius} | Timezone: ${time_zone} | Comm: ${comm_preference} | Title Pref: ${preferred_title||"None"}`
    );
    const bar=document.getElementById("ob-progress");
    if(bar)bar.style.width="100%";
    nextBtn.textContent="✓ All set!";
    nextBtn.style.background="var(--success)";
    setTimeout(()=>{el.remove();onComplete();},700);
  });

  backBtn.addEventListener("click",()=>{if(currentStep>1)showStep(currentStep-1);});
  
  // Skip step 4 button
  const skipBtn=document.getElementById("ob-skip-step4");
  if(skipBtn){
    skipBtn.addEventListener("click",async()=>{
      // Collect data from steps 1-3 only
      const business_name=document.getElementById("ob-business")?.value.trim()||"";
      const address=document.getElementById("ob-address")?.value.trim()||"";
      const time_zone=document.getElementById("ob-timezone")?.value||"";
      const comm_preference=getSelectedComms().join(", ");
      const market_radius=getSelectedStates().join(", ");
      skipBtn.textContent="Saving…";skipBtn.disabled=true;
      await sb.from("clients").update({
        business_name,address,time_zone,comm_preference,
        market_radius,preferred_title:"",onboarding_complete:true
      }).eq("id",clientId);
      await notifyAdmins(
        SESSION?.client?.name||"New Client",
        "✅ Onboarding Complete",
        `Business: ${business_name} | Markets: ${market_radius} | Timezone: ${time_zone} | Comm: ${comm_preference} | Title Pref: Skipped (will add later)`
      );
      const bar=document.getElementById("ob-progress");
      if(bar)bar.style.width="100%";
      skipBtn.textContent="✓ All set!";
      skipBtn.style.background="var(--success)";
      setTimeout(()=>{el.remove();onComplete();},700);
    });
  }
  
  updateProgress();
}

          <div class="input-group"><label class="input-label">Password</label><input class="finput" id="f-pass" type="password" placeholder="Create a password" value="${preserveValues.pass||""}"/></div>
          <div class="input-group"><label class="input-label">Confirm Password</label><input class="finput" id="f-confirm" type="password" placeholder="Repeat password" value="${preserveValues.confirm||""}"/></div>

          <button class="btn btn-primary" id="do-reg" style="width:100%;padding:13px;font-size:15px;border-radius:12px;justify-content:center">Create Account →</button>
        `}
        <p style="font-size:11px;color:var(--muted);text-align:center;margin-top:16px">Need access? <a href="mailto:info@closeflowtc.com" style="font-weight:700">Contact your coordinator</a></p>
      </div>
    </div>
  </div>`);
  on("#tab-login","click",()=>renderLogin("login"));
  on("#tab-reg","click",()=>renderLogin("register"));
  on("#do-login","click",doLogin);
  on("#do-reg","click",doRegister);
  on("#forgot-pw-btn","click",()=>showForgotPasswordModal());
  on("#f-pass","keydown",e=>{if(e.key==="Enter"){mode==="login"?doLogin():doRegister();}});
}

async function doLogin(){
  const email=qs("#f-email")?.value.trim(),pass=qs("#f-pass")?.value;
  btnLoad("do-login",true,"Signing in…");
  const{data:adminData}=await sb.from("admins").select("*").eq("email",email).eq("password",pass).single();
  if(adminData){SESSION={role:"admin",admin:adminData};saveSession();await checkUpcomingReminders();await renderAdmin();return;}
  const{data,error}=await sb.from("clients").select("*").eq("email",email).eq("password",pass).is("deleted_at",null).single();
  if(error||!data){renderLogin("login","Incorrect email or password.");return;}
  SESSION={role:"client",client:data};
  const{data:files}=await sb.from("files").select("*").eq("client_id",data.id).order("created_at");
  ACTIVE_FILE_ID=(files&&files.length)?files[0].id:null;
  saveSession();
  await checkUpcomingReminders();
  startNotifPolling(data.id);
  await renderClient(data.id,ACTIVE_FILE_ID,"overview",false,false);
  await checkIncidentBanner();
  if(!data.onboarding_complete){showOnboardingModal(data.id,()=>renderClient(data.id,ACTIVE_FILE_ID));return;}
  await renderClient(data.id,ACTIVE_FILE_ID);
}
async function doRegister(){
  const name=qs("#f-name")?.value.trim(),email=qs("#f-email")?.value.trim();
  const phone=qs("#f-phone")?.value.trim()||"",pass=qs("#f-pass")?.value;
  const confirm=qs("#f-confirm")?.value,code=qs("#f-code")?.value.trim().toUpperCase();
  const values={name,email,phone,pass,confirm,code};
  if(!name||!email||!pass){renderLogin("register","Please fill in all required fields.",values);return;}
  if(pass!==confirm){renderLogin("register","Passwords don't match.",values);return;}
  btnLoad("do-reg",true,"Verifying…");
  const inviteResult=await validateInviteCode(code,email);
  if(!inviteResult.valid){renderLogin("register",inviteResult.reason||"Invalid invite code. Contact your coordinator.",values);return;}
  btnLoad("do-reg",true,"Creating account…");
  const{data:exists}=await sb.from("clients").select("id").eq("email",email).is("deleted_at",null).single();
  if(exists){renderLogin("register","An account with this email already exists.",values);return;}
  const{data:client,error}=await sb.from("clients").insert({name,email,password:pass,phone,address:"",photo_url:"",has_seen_welcome:false,onboarding_complete:false}).select().single();
  if(error){renderLogin("register","Something went wrong. Please try again.",values);return;}
  const{data:newFile}=await sb.from("files").insert({client_id:client.id,address:"",status:"Pending",milestone:0,closing_date:"",coordinator:"Danielle McCarter"}).select().single();
  await sb.from("messages").insert({client_id:client.id,from_name:"CloseFlow TC",text:`Welcome, ${name}! Your account is ready. Your coordinator will be in touch shortly.`,date:new Date().toISOString().slice(0,10),is_admin:true});
  await markInviteCodeUsed(inviteResult.id);
  // Notify the admin team a new client registered
  await notifyAdmins(name,"🎉 New Client Registered",`${name} (${email}) just created an account using invite code ${code}.`);
  SESSION={role:"client",client};
  ACTIVE_FILE_ID=newFile?.id||null;
  saveSession();
  await checkUpcomingReminders();
  startNotifPolling(client.id);
  await renderClient(client.id,ACTIVE_FILE_ID,"overview",false,false);
  showOnboardingModal(client.id,async()=>{
    const{data:updated}=await sb.from("clients").select("*").eq("id",client.id).single();
    if(updated)SESSION.client=updated;
    await renderClient(client.id,ACTIVE_FILE_ID,"overview",true,false);
  });
}

  on("#msg-input","keydown",async e=>{if(e.key!=="Enter")return;if(roBlock())return;const text=e.target.value.trim();if(!text)return;await sb.from("messages").insert({client_id:clientId,from_name:client.name,text,date:new Date().toISOString().slice(0,10),is_admin:false});await notifyAdmins(client.name,"💬 New Message",`"${text.slice(0,120)}"`);e.target.value="";await renderClient(clientId,fileId,"messages");});

  // ── TASK HANDLERS ───────────────────────────────────────────────────────────
  // Type 1: Checkbox tasks — client clicks to mark complete
  qsa(".task-check.client-checkable").forEach(el=>{
    el.addEventListener("click",async()=>{
      if(roBlock())return;
      const tid=el.dataset.tid;
      el.style.background="var(--teal)";el.style.borderColor="var(--teal)";
      el.innerHTML=`<span class="btn-spinner" style="width:10px;height:10px;border-width:1.5px"></span>`;
      await sb.from("tasks").update({status:"complete",done:true}).eq("id",tid);
      await renderClient(clientId,fileId,"tasks");
    });
  });

  // Type 2: Upload tasks — client submits a document
  qsa(".task-upload-btn").forEach(btn=>{
    btn.addEventListener("click",async()=>{
      if(roBlock())return;
      const tid=btn.dataset.tid;
      const urlInput=document.querySelector(`.task-doc-url[data-tid="${tid}"]`);
      const nameInput=document.querySelector(`.task-doc-name[data-tid="${tid}"]`);
      const url=urlInput?.value.trim();
      const name=nameInput?.value.trim()||"Document";
      if(!url){urlInput?.focus();return;}
      btn.disabled=true;btn.textContent="Submitting…";
      await sb.from("tasks").update({
        doc_url:url,doc_name:name,
        status:"pending_review",done:false
      }).eq("id",tid);
      await notifyAdmins(client.name,"📎 Task Document Uploaded",`Task document submitted for review. Document: "${name}" | Task: "${tasks?.find(t=>t.id===tid)?.text||""}"`);
      await createNotification(clientId,fileId,`Your document has been received and is pending review by your CloseFlow TC coordinator.`,"info");
      await renderClient(clientId,fileId,"tasks");
    });
  });

  on("#save-acc","click",async()=>{
    if(roBlock())return;
    const name=qs("#acc-name")?.value.trim();const phone=qs("#acc-phone")?.value.trim();
    const address=qs("#acc-address")?.value.trim();const email=qs("#acc-email")?.value.trim();
    btnLoad("save-acc",true,"Saving…");
    await sb.from("clients").update({name,phone,address,email}).eq("id",clientId);
    btnLoad("save-acc",false,"✓ Saved!","Save Profile");
    const msg=qs("#acc-msg");if(msg){msg.style.display="block";msg.style.background="#F0FFF4";msg.style.color="#276749";msg.textContent="✓ Profile saved!";}
    SESSION.client={...SESSION.client,name,phone,address,email};
  });
  on("#save-pw","click",async()=>{
    if(roBlock())return;
    const curr=qs("#pw-current")?.value;const nw=qs("#pw-new")?.value;const conf=qs("#pw-confirm")?.value;
    const msg=qs("#pw-msg");
    if(!curr||!nw||!conf){if(msg){msg.style.display="block";msg.style.background="#FFF5F5";msg.style.color="var(--danger)";msg.textContent="Please fill in all fields.";}return;}
    if(curr!==client.password){if(msg){msg.style.display="block";msg.style.background="#FFF5F5";msg.style.color="var(--danger)";msg.textContent="Current password is incorrect.";}return;}
    if(nw!==conf){if(msg){msg.style.display="block";msg.style.background="#FFF5F5";msg.style.color="var(--danger)";msg.textContent="Passwords don't match.";}return;}
    btnLoad("save-pw",true,"Updating…");
    await sb.from("clients").update({password:nw}).eq("id",clientId);
    btnLoad("save-pw",false,"✓ Updated!","Update Password");
    if(msg){msg.style.display="block";msg.style.background="#F0FFF4";msg.style.color="#276749";msg.textContent="✓ Password updated!";}
    SESSION.client={...SESSION.client,password:nw};
  });
  on("#photo-file","change",async e=>{if(roBlock())return;const file2=e.target.files[0];if(!file2)return;const reader=new FileReader();reader.onload=async ev=>{await sb.from("clients").update({photo_url:ev.target.result}).eq("id",clientId);await renderClient(clientId,fileId,"account");};reader.readAsDataURL(file2);});
  on("#show-upload-form","click",()=>{const f2=qs("#upload-form");if(f2)f2.style.display="block";const b=qs("#show-upload-form");if(b)b.style.display="none";});
  // If arriving from the Overview "Attach a Document" button, open the form automatically
  if(OPEN_UPLOAD_ON_DOCS&&tab==="documents"){OPEN_UPLOAD_ON_DOCS=false;const f2=qs("#upload-form");if(f2)f2.style.display="block";const b=qs("#show-upload-form");if(b)b.style.display="none";}
  on("#cancel-upload","click",()=>{const f2=qs("#upload-form");if(f2)f2.style.display="none";const b=qs("#show-upload-form");if(b)b.style.display="block";});
  on("#submit-cdoc","click",async()=>{
    if(roBlock())return;
    const name=qs("#cdoc-name")?.value.trim();let url=qs("#cdoc-url")?.value.trim();
    const category=qs("#cdoc-cat")?.value||"Other";const description=qs("#cdoc-desc")?.value.trim()||"";
    const msg=qs("#cdoc-msg");
    const fileInput=qs("#cdoc-file");const file=fileInput?.files?.[0];
    const showErr=(txt)=>{if(msg){msg.style.display="block";msg.style.background="#FFF5F5";msg.style.color="var(--danger)";msg.textContent=txt;}btnLoad("submit-cdoc",false,"Submit Document");};
    if(!name){showErr("Please enter a document name.");return;}
    if(!file&&!url){showErr("Please upload a file or paste a Google Drive link.");return;}
    btnLoad("submit-cdoc",true,"Submitting…");
    try{
      // If a file was chosen, upload it to private storage and store the path (secure, signed on open)
      if(file){
        if(file.size>20*1024*1024){showErr("File is too large. Maximum size is 20MB.");return;}
        const ext=(file.name.split(".").pop()||"file").toLowerCase();
        const path=`documents/${clientId}/${fileId}/${Date.now()}.${ext}`;
        const{error:upErr}=await sb.storage.from("portal-docs").upload(path,file,{cacheControl:"3600",upsert:false,contentType:file.type||undefined});
        if(upErr){showErr(`Upload failed: ${upErr.message}`);return;}
        url="storage:"+path;
      }
      const{error:insErr}=await sb.from("documents").insert({client_id:clientId,file_id:fileId,name,url,category,description,date:new Date().toISOString().slice(0,10),uploaded_by:"client"});
      if(insErr){showErr(`Couldn't save the document: ${insErr.message}`);return;}
      await notifyAdmins(client.name,"📄 New Document Upload",`"${name}" | Category: ${category} | Property: ${f.address||"TBD"}`);
      btnLoad("submit-cdoc",false,"✓ Upload Successful!");
      if(msg){msg.style.display="block";msg.style.background="#F0FFF4";msg.style.color="#276749";msg.textContent="✓ Document uploaded successfully! Your coordinator has been notified.";}
      setTimeout(()=>renderClient(clientId,fileId,"documents"),1400);
    }catch(e){
      showErr(`Something went wrong: ${e.message||e}`);
    }
  });
  on("#restart-tour","click",()=>startTour(clientId,renderClient));

  // Account tab star rating
  if(tab==="account"){
    let acctSelectedRating=0;
    const starLabels2=["","Not happy","It was okay","Pretty good","Really good","Excellent!"];
    window.highlightStars=n=>{
      document.querySelectorAll(".star-btn").forEach((b,i)=>{b.style.filter=i<n?"grayscale(0)":"grayscale(1)";b.style.opacity=i<n?"1":".4";b.style.transform=i<n?"scale(1.1)":"scale(1)";});
      const lbl=qs("#star-label");if(lbl)lbl.textContent=starLabels2[n]||"";
    };
    window.resetStars=()=>{
      document.querySelectorAll(".star-btn").forEach((b,i)=>{b.style.filter=i<acctSelectedRating?"grayscale(0)":"grayscale(1)";b.style.opacity=i<acctSelectedRating?"1":".4";b.style.transform="scale(1)";});
      const lbl=qs("#star-label");if(lbl)lbl.textContent=acctSelectedRating>0?starLabels2[acctSelectedRating]:"";
    };
    qsa(".star-btn").forEach(btn=>{btn.addEventListener("click",()=>{acctSelectedRating=parseInt(btn.dataset.val);resetStars();});});
    on("#submit-feedback","click",async()=>{
      if(roBlock())return;
      if(!acctSelectedRating){const msg=qs("#fb-msg");if(msg){msg.style.display="block";msg.style.background="#FFF5F5";msg.style.color="var(--danger)";msg.textContent="Please select a star rating first.";}return;}
      const comment=qs("#fb-comment")?.value.trim()||"";
      btnLoad("submit-feedback",true,"Submitting…");
      await sb.from("feedback").insert({client_id:clientId,client_name:client.name,rating:acctSelectedRating,comment,trigger_type:"manual"});
      await notifyAdmins(client.name,"⭐ New Feedback",`Rating: ${acctSelectedRating}/5${comment?` | "${comment}"`:""}`)
      btnLoad("submit-feedback",false,"✓ Submitted!","Submit Feedback");
      const msg=qs("#fb-msg");if(msg){msg.style.display="block";msg.style.background="#F0FFF4";msg.style.color="#276749";msg.textContent="✓ Thank you! Your feedback has been received.";}
      if(acctSelectedRating>=4){setTimeout(()=>showGoogleReviewPrompt(null),1200);}
      setTimeout(()=>renderClient(clientId,fileId,"account"),2000);
    });
  }
  if(isFirstLoad&&client&&!client.has_seen_welcome){showWelcomeModal(client.name,clientId,()=>{},()=>startTour(clientId,renderClient));}
  if(isTourStep&&TOUR_ACTIVE){setTimeout(()=>renderTourOverlay(TOUR_STEP,TOUR_STEPS.length,renderClient),200);}

  // Check service incident banner on every render
  await checkIncidentBanner();

  // Pulse feedback trigger — fires when file just reached Closed milestone
  if(isFirstLoad&&f.milestone===MILESTONES.length-1&&f.status==="Closed"){
    const{data:existingFb}=await sb.from("feedback").select("id").eq("client_id",clientId).limit(1);
    if(!existingFb||existingFb.length===0){
      setTimeout(()=>showFeedbackModal(clientId,client.name,"post_closing",null),2000);
    }
  }
}

// ── ADMIN PANEL ───────────────────────────────────────────────────────────────

  let client=null,file=null,docs=null,msgs=null,tasks=null,dates=null,contacts=null,internalNotes=null,activityLog=null,clientRequests=null;

    [{data:client},{data:file},{data:docs},{data:msgs},{data:tasks},{data:dates},{data:contacts},{data:internalNotes},{data:activityLog},{data:clientRequests}]=await Promise.all([
      sb.from("clients").select("*").eq("id",activeClientId).single(),

      activeFileId?sb.from("contacts").select("*").eq("file_id",activeFileId):{data:[]},
      activeFileId?sb.from("internal_notes").select("*").eq("file_id",activeFileId).order("created_at",{ascending:false}):{data:[]},
      activeFileId?sb.from("activity_log").select("*").eq("file_id",activeFileId).order("created_at",{ascending:false}).limit(20):{data:[]},
      activeFileId?sb.from("client_requests").select("*").eq("file_id",activeFileId).order("created_at",{ascending:false}):{data:[]},
    ]);
  }
  const f=file||{address:"",status:"Pending",milestone:0,closing_date:"",coordinator:"Danielle McCarter",deal_stage:"Deal Initiation",needs_attention:false};
  const active=allClients.length;
  const closed=allClients.filter(c=>c.status==="Closed").length;

  const needsAttention=(allFiles||[]).filter(f2=>f2.needs_attention).length;
  const tasksDueToday=(allTasks2||[]).filter(t=>t.status!=="complete").length;
  const overdueDates=(allDates2||[]).filter(d=>{const dt=new Date(d.date);return dt<today2;}).length;
  const pendingRequests=(allRequests||[]).filter(r=>r.status==="Submitted"||r.status==="Requested").length;

    </div>

            </div>
